  - id: gateway_contracts
    name: Gateway Contracts
    technology: C# / .NET 10 (Library)
    description: Dependency-free DTO contracts shared between the Gateway, the Control API and clients (Director/Session/Health metadata, prompt/buffer/wingman/handover/fanout requests and responses, recording manifests, chat/TTS, and agent/session state records)
    project: CcDirector.Gateway.Contracts
    components:
      - name: Director / Session / Health DTOs
        description: DirectorDto, SessionDto, HealthDto core metadata objects
        files:
          - DirectorDto.cs
          - SessionDto.cs
      - name: Request/Response contracts
        description: Prompt, Buffer, Wingman (ask/view), Handover, Fanout, NewSession (with ResumeSessionId), LaunchDirector, registration and update contracts
        files:
          - WingmanAskResult.cs
          - WingmanViewDto.cs
          - NewSessionRequest.cs
      - name: Cockpit parity DTOs
        description: DTOs for the Cockpit's remote new-session dialog - coaching categories, resumable Claude sessions, handover list/content, and filesystem directory entries (Browse) - plus CockpitInfoDto (GET /cockpit - tailnet URL, port, liveness).
        files:
