  - id: gateway
    name: Tailnet Gateway
    technology: C# / ASP.NET Core / Kestrel
    description: One-per-machine HTTP host that aggregates all local Directors and publishes them over the tailnet. Discovers Directors (filesystem watch + HTTP register/heartbeat), proxies to their Control APIs, serves a dashboard, accepts phone recording/voice uploads, exposes a read-only comm-queue view, and manages dev slots. Bearer-or-cookie auth; TLS terminates at Tailscale Serve.
    project: CcDirector.Gateway
    dependencies:
      - CcDirector.Gateway.Contracts
      - CcDirector.Core
      - CcDirector.Setup.Engine
    components:
      - name: GatewayHost
        description: Kestrel host runner; wires the registry, Tailscale provisioner and Director client; one instance per machine. Enables WebSockets (UseWebSockets) so the per-session proxy can accept inbound terminal/dictation upgrades
        file: GatewayHost.cs
      - name: GatewayEndpoints
        description: Main HTTP surface - Directors (register/heartbeat/doorbell/verify/registration for discovery + two-way handshake #223/#224, now 3-leg: the HTTP /verify/{nonce} callback plus a WebSocket /verify-ws upgrade that proves the Cockpit terminal-stream path and stamps StreamVerifiedAt/StreamVerifyError + push-down state #186), fleet-wide Sessions (aggregated with Gateway-owned assessed-state stamps), per-session turnbriefs history (#185), interrupted-sessions + /restore (#212), Recordings/Handovers/Fanout/Events, /about diagnostics, and GET /cockpit (unauthenticated) answering where this machine's Cockpit lives - the Tailscale front-door URL with a 500ms TCP liveness probe (null when Tailscale is down, never a loopback fallback)
        file: Api/GatewayEndpoints.cs
      - name: RecordingEndpoints
        description: Phone-recorder ingest - register, upload audio chunks, complete (audio completeness gate #586, returns 409 naming missing/bad indices), transcribe via the user-selected method (resolves the configured mode + vault key in-process to the resolved base URL/key/model, exactly like /transcription/routing, then routes through SelectedMethodRecordingTranscriber + the shared BatchTranscriptionPipeline, issue #591), promote, status, and dictionary endpoints
        file: Api/RecordingEndpoints.cs
      - name: CommQueueEndpoints
        description: Read-only tailnet view of the local Communication Manager SQLite approval queue
        file: Api/CommQueueEndpoints.cs
      - name: ExesEndpoints
        description: Local machine exe/slot management - list Directors+sessions, delete/build/launch dev slots 1-4
        file: Api/ExesEndpoints.cs
      - name: DirectorRegistry
        description: In-memory registry of live Directors via dual ingress (instances/*.json watch + HTTP register/heartbeat) with a 60s stale timeout
        file: Discovery/DirectorRegistry.cs
      - name: DirectorEndpointClient
        description: HttpClient wrapper for each Director's Control API (prompts, sessions, kills, wingman asks, image upload, recap); also runs the two handshake callbacks - leg 2 GET /verify/{nonce} (HTTP) and leg 3 VerifyStreamCallbackAsync, a ClientWebSocket upgrade to /verify-ws/{nonce} that proves the real terminal-stream path (a Director without the endpoint reads as "untested", not broken)
        file: Discovery/DirectorEndpointClient.cs
      - name: AdvertisedEndpointMonitor
        description: Re-verifies each HTTP-registered Director's advertised endpoint every heartbeat cycle (15s GET /healthz + directorId match); a failed probe flags the registration unreachable-by-name (distinct from heartbeat loss) and a later success auto-clears it (issue #325)
        file: Discovery/AdvertisedEndpointMonitor.cs
      - name: TailscaleServeProvisioner
        description: Keeps `tailscale serve` HTTPS mappings in sync with the live LOCAL fixed-range (7879-7898) Director set (443 -> gateway, per-Director ports); remote-machine and ephemeral-port (hosted-agent) Directors never get a mapping, and a 5-minute self-healing reconcile re-asserts the front door + missing live mappings and sweeps provisioner-shaped orphans on any port (issue #179)
        file: Tailscale/TailscaleServeProvisioner.cs
      - name: TailscaleIdentity
        description: Resolves this machine's Magic DNS name via `tailscale status --json`
        file: Tailscale/TailscaleIdentity.cs
      - name: GatewayAuth / AuthMiddleware
        description: Loads or generates a 32-byte URL-safe bearer token (persisted under config/director) and enforces bearer-or-cookie auth, whitelisting /healthz, /login, /logout
        files:
          - Util/GatewayAuth.cs
          - Util/AuthMiddleware.cs
      - name: KeyVault
        description: Fleet-wide central secret store (e.g. OPENAI_API_KEY) in a plain-JSON file outside git (%LOCALAPPDATA%\cc-director\config\keyvault.json), re-read on every request with atomic write-replace; the single source of truth Directors resolve at point of use instead of caching. Seeded once from the environment on Gateway start (SetIfAbsent - never clobbers).
        file: KeyVault.cs
      - name: VaultEndpoints
        description: REST surface over KeyVault (GET/PUT/DELETE /vault/keys/{name}, GET /vault/keys names-only) backing the Cockpit "API Keys" page; values leave the Gateway only via a single-key GET, never the list. Behind the host-wide auth middleware.
        file: Api/VaultEndpoints.cs
      - name: TranscriptionRoutingEndpoint
        description: The Gateway as the single source of truth for the whole transcription routing target (issues #497/#506/#513). GET /transcription/routing composes the (mode, baseUrl, model, transport, key) tuple server-side from the one pure TranscriptionEndpointResolver, so the bring-your-own OpenAI key is only ever paired with the OpenAI URL and never with the devthrottle.com URL. 404 (with an X-Transcription-Routing marker header) when no key is set for the configured mode - never a baked-in fallback URL.
        file: Api/TranscriptionRoutingEndpoint.cs
      - name: TranscriptionTestEndpoint
        description: One-shot transcription smoke test backing the Cockpit Settings > Transcription "Test it" panel. POST /transcription/test takes a short recorded audio clip and runs it through the SAME configured mode + key the live pipeline uses (always the OpenAI-compatible batch /audio/transcriptions, which both OpenAI and the DevThrottle/Groq proxy implement), returning the transcribed text - so the user can prove the stored key actually works, not just that one is stored. 409 when no key is set for the mode, 400 when no audio, 502 when the provider rejects the request. Behind the host-wide auth middleware.
        file: Api/TranscriptionTestEndpoint.cs
      - name: WorkListStore
        description: In-memory fleet-wide named work-list store (issue #273, child of #270). A named list is an ordered set of structured item refs { source, id, area? } plus a single-consumer claim; stores order + refs + claim ONLY (never item status). source github is runnable, devops/jira stored-only in v1; persistence across restart is OUT for v1.
        file: WorkListStore.cs
      - name: WorkListEndpoints
        description: REST surface over WorkListStore backing the queue-runner work lists (issue #273). POST/GET /lists, GET /lists/{name}, POST/PATCH /lists/{name}/items, DELETE /lists/{name}/items/{source}/{id}, POST/DELETE /lists/{name}/consumer (single-consumer claim, 409 on double-claim). Behind the host-wide auth middleware.
        file: Api/WorkListEndpoints.cs
      - name: WorkListRunner
        description: The thin Gateway queue runner (issue #274, child 3 of #270) - the heart of the autonomous work-item queue. Claims a named list's single-consumer claim (rides #273's 409), then drains it in GET /lists/{name} order ONE github item in flight at a time - for each source=github item it starts one implementation session on a Director seeded with /implementation-loop <id>, watches that session's transcript until it emits child 1's IMPL-LOOP-TERMINAL sentinel (#272), records the per-item signal (done/needs-human/failed), then advances; never re-drives a stuck item (retry is OUT v1). Source-gating rule v1 - non-github (devops/jira) refs are skipped (never started, left in the list). Releases the consumer claim when the list is drained. All orchestration lives here at the Gateway; the Director stays dumb.
        files:
          - Running/WorkListRunner.cs
          - Running/WorkListRunResult.cs
          - Running/IImplSessionDriver.cs
          - Running/DirectorImplSessionDriver.cs
          - Running/ImplLoopTerminalSignal.cs
      - name: WorkListRunnerManager
        description: Enforces the v1 same-machine single-drain guard (issue #274) - a machine has exactly one slot-5 test Director (one build output, one Control API port), so at most one list drains per machine at a time; a second concurrent drain on the same machine is refused. Cross-machine concurrency (different machine keys) is admitted - v1 parallelism is across machines only.
        file: Running/WorkListRunnerManager.cs
      - name: WorkListRunnerEndpoints
        description: The queue-runner REST surface (issue #274). POST /lists/{name}/run { directorId, repoPath, listConsumer?, machineKey? } resolves the target Director from the registry, applies the same-machine guard (409 if the machine is busy), then drains the list via WorkListRunner (409 if the list is already claimed) and returns the per-item timeline (source/id/outcome/signal/sessionId). Lives entirely at the Gateway - no runner logic in the Director host. Behind the host-wide auth middleware.
        file: Api/WorkListRunnerEndpoints.cs
      - name: SettingsEndpoints / GatewaySettingsHooks
        description: GET /gateway/settings snapshot (version, uptime, director count, brain state, Cockpit status, autostart), POST /gateway/brain/restart (warm-brain recovery), PUT /gateway/autostart; GatewaySettingsHooks is the optional IoC bridge the tray process injects so the library can report run-mode/autostart it cannot otherwise know (degrades to "unsupported" when null)
        files:
          - Api/SettingsEndpoints.cs
          - Api/GatewaySettingsHooks.cs
      - name: Wingman Gateway services
        description: The Gateway-hosted Wingman pieces - WingmanInstructionsStore (editable, versioned wingman instructions with a managed default and A/B testing, #537), WingmanMenu (menu handling), WingmanTranslator, WingmanTrainingStore (training-data capture, #531), and WingmanVoiceService (the gateway-owned voice mode: red->yellow->red state, gateway-owned explain), surfaced via GatewayWingmanVoiceEndpoint and WingmanInstructionsEndpoint.
        files:
          - Wingman/WingmanInstructionsStore.cs
          - Wingman/WingmanMenu.cs
          - Wingman/WingmanTranslator.cs
          - Wingman/WingmanTrainingStore.cs
          - Wingman/WingmanVoiceService.cs
          - Api/GatewayWingmanVoiceEndpoint.cs
          - Api/WingmanInstructionsEndpoint.cs
      - name: GatewayTurnBriefStore
        description: Append-only per-session .jsonl store of turn briefs (with an in-memory latest-brief cache for cheap polling), the raw TurnPackages that produced them, explain reports, and #207 feedback votes (replayable labeled examples); readers de-dupe by TurnNumber, latest wins. Issue #549 retired the always-on writer (GatewayTurnBriefAgent), so the store is now read-only-serving (effectively empty going forward); the read endpoints and interrupted/restore paths still consume it and degrade cleanly
        file: Briefing/GatewayTurnBriefStore.cs
      - name: TurnEndWatcher
        description: Fires the turn-end callback from push-fed observations (doorbell pings + heartbeat snapshots, with a 15s reconcile for non-pushing Directors, #186). Issue #549 retired the always-on turn-brief stamping pipeline (GatewayTurnBriefAgent) and the Gateway-owned assessed-state refutation (SessionAssessments, both removed); the watcher now runs unconditionally with one job - firing voice auto-refresh (WingmanVoiceService.GenerateAsync) for voice sessions on turn-end, and clearing the stale voice/text cache on the Working transition
        file: Briefing/TurnEndWatcher.cs
      - name: RestoreContextBuilder
        description: Builds a continuation first-prompt for a restored (interrupted) session from its durable turn-brief history - state at death, trajectory, and explicit marching orders that re-ask the user before resuming - backing the one-click Restore (issue #212)
        file: Recovery/RestoreContextBuilder.cs
      - name: CockpitProxy
        description: The one-URL front door (docs/plans/one-url-cockpit.md) - content-negotiated fallback proxy that forwards browser (text/html) requests to the loopback Cockpit and keeps /sessions|/directors|/cockpit dual-use (HTML page vs JSON API); serves an auto-refresh "Cockpit starting..." page during boot/crash/update
        file: Cockpit/CockpitProxy.cs
      - name: SessionWsProxyEndpoints
        description: Issues #268/#317 - reverse-proxies the per-session legs (live Terminal stream GET /sessions/{sid}/stream, dictation GET /sessions/{sid}/dictate, plain-HTTP screenshot bytes, and the generic /sessions/{sid}/{**rest} verb channel) to the owning Director so a remote Cockpit talks same-origin to the Gateway and never needs a Director's (possibly loopback) address. Uses a HAND-ROLLED proxy (SessionWsForwarder) - ClientWebSocket for the WS legs (connect to the Director first, then pump frames both ways) and HttpClient for the HTTP legs - NOT YARP's IHttpForwarder, which on Windows cannot complete the TLS handshake to a Tailscale Serve (https) backend (Schannel "the message received was unexpected or badly formatted"); that was the cross-machine streaming bug, since same-machine Directors use loopback http and were unaffected. Resolves the owning Director from the registry (404 unknown session, 503 offline/unreachable per the SessionOwnerCache)
        file: Api/SessionWsProxyEndpoints.cs
      - name: DirectorForwarding
        description: Single source of truth for how the Gateway dials a Director's Control API for the per-session proxy and the stream-leg verify probe - HttpClient/ClientWebSocket (not YARP, which fails the Schannel TLS handshake to a Tailscale Serve backend) with the WebSocket upgrade pinned to HTTP/1.1
        file: DirectorForwarding.cs
      - name: CronEngine + CronRunNotifier
        description: The scheduled-job firing engine (epic #479, #483) plus the run-complete notification path (issue #622). On each fire (success OR start-failure) the engine records a CronRunRecord and, when the job opts in via CronJobDto.NotifyOn (none|always|failure, default none - opt-in so existing/silent jobs never start notifying), delivers a notification through the EXISTING fleet notification channel - the per-Director doorbell event ring (DirectorEventLog, #330) observed at GET /directors/{id}/events - and, when the job sets NotifyWebhookUrl, ALSO POSTs the same CronRunCompletedPayload to that user-configured outbound webhook URL. The webhook is the one new EGRESS surface from the Gateway (best-effort, short-timeout HttpClient, http(s) only, never affecting the fire); it rides the same single-owner tailnet trust boundary as the rest of the Gateway.
        files:
          - Running/CronEngine.cs
          - Running/GatewayCronNotifier.cs
          - Running/ICronNotifier.cs

  - id: gateway_app
    name: Gateway Tray App
    technology: C# / Avalonia (net10.0-windows)
    description: Single-instance Windows tray application that hosts the Gateway in-process and provides Open Dashboard / Logs / Restart / Quit, autostart registration, and port-conflict diagnostics
    project: CcDirector.GatewayApp
    dependencies:
      - CcDirector.Gateway
      - CcDirector.Core
    components:
      - name: GatewayTrayController
        description: Owns the tray icon and in-process GatewayHost; distinguishes "our gateway already running" from a foreign port holder on startup
        file: GatewayTrayController.cs
      - name: Autostart
        description: Idempotent HKCU Run-key registration for launch at login
        file: Autostart.cs
      - name: Program / App / GatewayAppOptions
        description: STAThread entry with single-instance mutex, Avalonia app shell, and CLI option parsing (--port, --no-autostart)
        files:
          - Program.cs
          - App.axaml.cs
          - GatewayAppOptions.cs

  - id: cockpit
    name: Cockpit (Fleet Dashboard)
    technology: C# / Blazor Server / ASP.NET Core
    description: The whole-fleet web dashboard, served on loopback and exposed only behind the Gateway's one-URL front door (CockpitProxy). Renders the Gateway's aggregated roster, the structured wingman turn brief, per-session screen/git/tokens detail, and the brief-feedback flow; never talks to a Director directly (reads the Gateway REST surface).
    project: CcDirector.Cockpit
    dependencies:
      - CcDirector.Gateway.Contracts
    components:
      - name: BriefPane
        description: Renders the wingman turn brief tier-by-tier (wingman TurnBriefDto -> condenser -> raw) - YOU'RE DOING / YOU ASKED / NEEDS YOU (synthesized statement + verbatim evidence + option buttons + if-ignored) / ALL CLEAR / CLAUDE DID / mission-complete close / brief feedback vote
        file: Components/BriefPane.razor
      - name: Fleet / Sessions / SessionRail
        description: The fleet card view and session roster/rail, painting each session by its EffectiveColor (the one fold of Director StatusColor + Gateway BriefingState)
        files:
          - Components/Fleet.razor
          - Components/Sessions.razor
          - Components/SessionRail.razor
      - name: SessionDetail / DirectorDetail / Directors
        description: Detail pages - a session's brief history, screen tail, git and token usage; a Director's sessions, repos and registration
        files:
          - Components/SessionDetail.razor
          - Components/DirectorDetail.razor
          - Components/Directors.razor
      - name: TerminalPane
        description: Read-only xterm.js terminal mirror fed by the Director stream (proxied through the Gateway)
        file: Components/TerminalPane.razor
      - name: Feedback / About
        description: The /feedback brief-review corpus page (#207) and the /about diagnostics page (version, URLs, installed components)
        files:
          - Components/Feedback.razor
          - Components/About.razor

  - id: gateway_contracts
    name: Gateway Contracts
    technology: C# / .NET 10 (Library)
    description: Dependency-free DTO contracts shared between the Gateway, the Control API and clients (Director/Session/Health metadata, prompt/buffer/wingman/handover/fanout requests and responses, recording manifests, chat/TTS, and agent/session state records)
    project: CcDirector.Gateway.Contracts
    components:
      - name: Director / Session / Health DTOs
        description: DirectorDto, SessionDto, HealthDto core metadata objects
        files:
          - DirectorDto.cs
          - SessionDto.cs
      - name: Request/Response contracts
        description: Prompt, Buffer, Wingman (ask/view), Handover, Fanout, NewSession (with ResumeSessionId), LaunchDirector, registration and update contracts
        files:
          - WingmanAskResult.cs
          - WingmanViewDto.cs
          - NewSessionRequest.cs
      - name: Cockpit parity DTOs
        description: DTOs for the Cockpit's remote new-session dialog - coaching categories, resumable Claude sessions, handover list/content, and filesystem directory entries (Browse) - plus CockpitInfoDto (GET /cockpit - tailnet URL, port, liveness).
        files:
          - CockpitParityDtos.cs
          - CockpitInfoDto.cs
      - name: Recording / Chat / state records
        description: RecordingManifest, ChatRequest/Response, TtsRequest, GoalAssessment and related agent-state DTOs
        files:
          - RecordingManifest.cs
          - GoalAssessment.cs
      - name: TurnBrief contracts
        description: The wingman turn-brief DTOs every consumer renders verbatim - TurnBriefDto (headline, intent, did, needsYou with options/evidence/ifIgnored, allClear, suggestedAction), TurnBriefsResponse, ExplainReportDto, and the #207 feedback request/response/record types
        file: TurnBriefDto.cs
      - name: About / diagnostics DTO
        description: AboutDto - version, build, URLs and installed-component list surfaced by the Director About dialog and Cockpit /about
        file: AboutDto.cs
      - name: CockpitWsUrls
        description: Issue #268 - pure static builder for the Cockpit's per-session WebSocket URLs (live Terminal stream + dictation), built same-origin to the Gateway the page was served from (http->ws / https->wss, sid-scoped path); shared by TerminalPane and Cockpit.razor and unit-tested so a remote Cockpit never targets a Director's address
        file: CockpitWsUrls.cs
      - name: CockpitShotUrls
        description: Issue #317 - pure static builder for the Cockpit's per-session screenshot-bytes URL (thumbnail img src / View / Copy), built same-origin to the Gateway the page was served from (scheme preserved, sid-scoped path, URL-escaped file name) so a remote browser never fetches image bytes from a Director's (possibly loopback) address
        file: CockpitShotUrls.cs

  - id: agent_brain
    name: Agent Brain Contract Library
    technology: C# / .NET 10
    description: The shared brain contract and its result/health models (issue #184 v2 - the original Director-REST AgentBrainClient transport was retired; the brain must not depend on a Director being up). Holds IAgentBrain (Ask / Cancel / Clear / Restart / Kill / Health), AskResult / ClearResult / BrainHealth, AgentBrainException and the BrainLog default sink. The implementation lives in the hosted_agent container; consumers (the panel, the Gateway's brief agent) code against this interface.
    project: CcDirector.AgentBrain
    components:
      - name: IAgentBrain
        description: The shared brain contract - AskAsync, CancelAsync, ClearAsync, RestartAsync, KillAsync, GetHealthAsync + SessionId. Implemented by HostedAgent (in-process)
        file: IAgentBrain.cs
      - name: BrainLog
        description: Default daily-file log sink under %LOCALAPPDATA%\cc-director\logs\agent-brain (the library cannot depend on Core's FileLog)
        file: BrainLog.cs

  - id: hosted_agent
    name: Hosted Agent Library
    technology: C# / .NET 10
    description: In-process implementation of the brain contract - HOSTS its own agent CLI (claude.exe) inside an embedded ConPty pseudoconsole and drives it through an agent driver. No Director, no HTTP, zero external process dependency; many instances per host process, one CLI child each. Layering (docs/plans/agent-driver.md) - ISessionBackend is the terminal transport, IAgentDriver is the tool's protocol, this host owns lifecycle (spawn, readiness on the buffer's byte-quiet clock, restart-on-crash, health). Host process caveats are documented on the class - hosting from inside a Claude Code ConPty, from a console process with redirected stdio, or with working dirs outside a trusted tree all break the spawned CLI (live findings, docs/features/hosted-agent/QA_REPORT.html).
    project: CcDirector.HostedAgent
    dependencies:
      - CcDirector.Core
      - CcDirector.AgentBrain
    components:
      - name: HostedAgent
        description: The host - StartAsync (driver launch spec, preassigned session id), AskAsync (echo of IAgentBrain over the driver + transcript), CancelAsync, ClearAsync (in-place reset, new transcript id tracked from disk), RestartAsync, KillAsync, GetHealthAsync; HostedAgent.For(AgentKind) factory that fails loud for kinds without a verified driver
        file: HostedAgent.cs
      - name: HostedAgentOptions
        description: Configuration - working directory, executable override, agent args, pseudoconsole size, quiet/timeout/poll tuning, log sink
        file: HostedAgentOptions.cs
      - name: BrainSupervisor
        description: Owns ONE brain for a long-lived host process (the Gateway tray app, issue #184) - create on demand (first GetAsync spawns claude.exe), RestartAsync as the single recovery verb, NotStarted health without spawning, graceful Ctrl+C-then-kill dispose so the host never leaks a claude.exe; lifecycle serialized through one gate against concurrent consumers
        file: BrainSupervisor.cs

  - id: agent_brain_panel
    name: Agent Brain Control Panel
    technology: C# / Avalonia
    description: Desktop test application for the brain libraries - one window with a large button per IAgentBrain verb (create, ask, cancel turn, clear, restart, kill, health), a conversation log, an auto-clear-after-every-ask toggle and a live health strip. Hosted-only since issue #184 - the panel process owns claude.exe via CcDirector.HostedAgent (the Director-REST mode is retired). The libraries' first consumer and their manual QA harness (docs/features/hosted-agent/QA_REPORT.html).
    project: CcDirector.AgentBrain.Panel
    dependencies:
      - CcDirector.AgentBrain
      - CcDirector.HostedAgent
    components:
      - name: MainWindow
        description: The whole panel - async button handlers (entry-point try-catch), CANCEL TURN usable while an ask is in flight, 1.5s background health poll, status-line driven so UI Automation QA can wait on real completion signals
        file: MainWindow.axaml / MainWindow.axaml.cs

  - id: setup_engine
    name: Setup / Install / Update Engine
    technology: C# / .NET 10 (headless library)
    description: Shared engine for first-time install, uninstall, and per-component auto-update from GitHub releases. Used by the setup CLI, the WPF wizard, and (for tool auto-update) the Director.
    project: CcDirector.Setup.Engine
    dependencies: []
    components:
      - name: InstallLayout
        description: Canonical on-disk locations (per-user app/bin, machine ProgramFiles/ProgramData, setup-state dir)
        file: InstallLayout.cs
      - name: ComponentRegistry
        description: Canonical component list (Director, Gateway, Cockpit, tools) and role mapping; discovers tools from the manifest
        file: ComponentRegistry.cs
      - name: ReleaseSource
        description: Resolves a release (GitHub latest / local manifest / local dir), parses release-manifest.json, downloads + stages assets
        file: ReleaseSource.cs
      - name: UpdatePlanner / UpdatePins
        description: Pure per-component decision (Install/Update/UpToDate/MissingAsset/Pinned) using independent per-asset versions
        files:
          - UpdatePlanner.cs
          - UpdatePin.cs
      - name: UpdateRunner / InstallSwapper
        description: Download -> SHA-256 verify -> atomic swap with .old backup; records placed versions
        files:
          - UpdateRunner.cs
          - InstallSwapper.cs
      - name: InstalledManifest / PinStore
        description: Per-user install bookkeeping - recorded installed versions (installed.json) and rollback pins (update-pins.json)
        files:
          - InstalledManifest.cs
          - PinStore.cs
      - name: AutoUpdateConfig
        description: Reads the config.json autoUpdate section (enabled, intervalHours) that gates the resident apps' silent auto-update cadence; CC_AUTOUPDATE=0 is a global kill switch
        file: AutoUpdateConfig.cs
      - name: GatewayServiceInstaller / GatewayServiceCommands
        description: Registers cc-gateway-service as a native LocalSystem Windows service via sc.exe/reg.exe (no NSSM); NSSM->native migration; redacts secrets in logs
        files:
          - GatewayServiceInstaller.cs
          - GatewayServiceCommands.cs
      - name: CockpitPackage
        description: Downloads, verifies, and extracts the Cockpit zip into the machine cockpit dir
        file: CockpitPackage.cs
      - name: ToolUpdater
        description: Silent auto-update of installed CLI tools (refresh-only, honors pins); driven by the resident Director
        file: ToolUpdater.cs
      - name: CockpitUpdater
        description: Silent in-place Cockpit update (refresh-only, pin-aware); driven by the Gateway's Cockpit supervisor before launch
        file: CockpitUpdater.cs
      - name: GatewayUpdater / GatewaySelfUpdate
        description: Gateway self-update - stage the new exe, launch a detached LocalSystem helper (--apply-service-update) that stops the service, swaps the locked exe, restarts, health-checks, and AUTO-ROLLS-BACK + pins a bad build (DA-1)
        files:
          - GatewayUpdater.cs
          - GatewaySelfUpdate.cs
      - name: Uninstaller
        description: Removes only install-owned files (preserves user data); service + machine dirs + per-user app/bin + PATH + shortcut
        file: Uninstaller.cs
      - name: InstallFinalizer
        description: Per-user finalization - adds bin to PATH and creates the Start Menu shortcut
        file: InstallFinalizer.cs
      - name: TailnetResolver
        description: Resolves the Tailscale MagicDNS host so user-facing URLs use the tailnet, never localhost
        file: TailnetResolver.cs
      - name: Launcher install + self-update (cc-launcher fleet parity)
        description: Brings the CC Launcher tray app to full Gateway parity - LauncherTrayInstaller places, starts (--managed), health-checks (/healthz on :7900) and verifies the autostart Run key; LauncherAutostart registers logon autostart; LauncherUpdater + LauncherSelfUpdate do stage->swap->relaunch->health with auto-rollback + pin, mirroring GatewayUpdater/GatewaySelfUpdate
        files:
          - LauncherTrayInstaller.cs
          - LauncherAutostart.cs
          - LauncherUpdater.cs
          - LauncherSelfUpdate.cs

  - id: setup_cli
    name: Setup CLI
    technology: C# / .NET 10 (console)
    description: Headless front-end over the setup engine (components/status/plan/install/update/uninstall/rollback); the wizard shells it elevated for the Gateway install
    project: CcDirector.Setup.Cli
    dependencies:
      - CcDirector.Setup.Engine
    components:
      - name: Program / Commands
        description: Command dispatch, --log-file tee, JSON output
        files:
          - Program.cs
          - Commands.cs
      - name: FrameworkDetector
        description: Checks for an agent framework (Claude Code / Codex) prerequisite
        file: FrameworkDetector.cs

  - id: setup_wizard
    name: Setup Wizard (WPF)
    technology: C# / WPF
    description: Graphical installer with Workstation/Gateway role selection; does the per-user install and shells the elevated CLI for the Gateway service
    project: CcDirector.Setup (cc-director-setup)
    dependencies:
      - CcDirector.Setup.Engine
    components:
      - name: Wizard steps
        description: Welcome (role picker), Prerequisites, Skills, Install, Complete
        files:
          - Steps/WelcomeStep.xaml.cs
          - Steps/InstallStep.xaml.cs
      - name: EngineInstallRunner / GatewayServiceLauncher
        description: Drives the engine for the per-user install; shells the elevated CLI (runas) for the Gateway machine install
        files:
          - Services/EngineInstallRunner.cs
          - Services/GatewayServiceLauncher.cs

# Data flows
data_flows:
  - id: hook_event_flow
    name: Hook Event Flow
    description: Claude Code hook events to Director UI
    path:
      - Claude Code (claude.exe)
      - "hook-relay script (PowerShell on Windows, Python on Mac/Linux)"
      - "IPC channel (Named Pipe on Windows, Unix Socket on Mac/Linux)"
      - IDirectorServer
      - EventRouter
      - Session.HandlePipeEvent()
      - UI (INotifyPropertyChanged)

  - id: user_input_flow
    name: User Input Flow
    description: User input to Claude session
    path:
      - User input (keyboard)
      - conhost.exe
      - claude.exe (stdin)
      - Hook fires (UserPromptSubmit)
      - "[hook_event_flow]"

  - id: session_restore_flow
    name: Session Restore Flow
    description: Restoring sessions after application restart
    path:
      - Application startup
      - SessionStateStore.Load()
      - SessionManager.RestoreEmbeddedSession()
      - ClaudeSessionReader.VerifyWithTerminalContent()
      - Session verified/linked

  - id: voice_flow
    name: Desktop Voice Mode Flow
    description: Desktop voice mode (the eyes-free Voice tab and the full-screen FIFO takeover) push-to-talk input to the agent or the read-only wingman, transcribed once via the shared batch pipeline (issue #590 - no hardcoded realtime model, no live partials, no free-text cleanup)
    path:
      - "Push-to-talk: BatchDictationRecorder.StartAsync() captures the whole turn locally (MicAudioCapture); NO live transcript while recording"
      - "On Stop & Send: BatchDictationRecorder.TranscribeAsync() wraps the whole clip in WAV and sends it ONCE through the shared BatchTranscriptionPipeline using the Gateway/user-selected method (issue #587). Completeness gate (issue #586): an empty capture throws NoAudioCapturedException, handled as 'nothing heard' - a partial/interrupted turn never produces a transcript"
      - "Dictionary-only term correction inside the shared pipeline (no free-text cleanup; a no-dictionary-term turn returns byte-identical raw text)"
      - "Routing on the finished transcript (UI-only, does not alter the text): Ask Agent -> Session.SendTextAsync(); Ask Wingman -> WingmanService read-only answer, spoken back via DesktopTtsPlayer"

  - id: communication_dispatch_flow
    name: Communication Dispatch Flow
    description: Approved communications dispatched to platform-specific CLI tools
    path:
      - User approves item in Communication Manager
      - "SendAllAsync() fetches all approved non-hold items"
      - "DispatchItemAsync() routes by platform"
      - "Email: DispatchEmailItemAsync() -> cc-gmail or cc-outlook"
      - "Other platforms: logged as skipped (not yet supported)"
      - "RunToolAndMarkPostedAsync() executes CLI tool"
      - "MarkPosted() updates DB status to 'posted'"

  - id: remote_access_flow
    name: Remote Access Flow (tailnet)
    description: Owner's phone reaching local Directors over the tailnet via the Gateway
    path:
      - Phone (browser/mobile client) over tailnet
      - "Tailscale Serve (HTTPS, TLS terminated)"
      - GatewayHost (Kestrel, loopback)
      - DirectorRegistry (resolve target Director)
      - DirectorEndpointClient -> Director Control API (loopback)
      - ControlEndpoints route handler

  - id: dictation_flow
    name: In-Process Dictation Flow
    description: Desktop SpeakDialog dictation captured locally and transcribed in-process via one whole-audio batch call (issue #589 - no realtime streaming, no live partial preview)
    path:
      - "MicAudioCapture (NAudio WaveIn, 24kHz/16-bit mono); every PCM chunk buffered locally by BatchDictationRecorder for the whole turn"
      - "OnAudioBands -> SpeakDialog equalizer; OnInputRms -> level hint; NO live transcript while recording"
      - "On Insert/Send/Review: BatchDictationRecorder wraps the whole captured clip in WAV and sends it ONCE through the shared BatchTranscriptionPipeline using the Gateway/user-selected method (issue #587). Completeness gate (issue #586): an empty capture throws NoAudioCapturedException - a partial/interrupted turn never produces a transcript"
      - "Dictionary-only term correction inside the shared pipeline (no free-text cleanup; a no-dictionary-term turn returns byte-identical raw text)"
      - SpeakDialog inserts (Insert), auto-submits (Send), or shows for review (Review) the verbatim text (only dictionary terms corrected) into the prompt

  - id: recording_ingest_flow
    name: Phone Recording Ingest Flow
    description: Phone-captured audio transcribed and optionally filed to the vault
    path:
      - Phone uploads chunks -> Gateway RecordingEndpoints
      - "RecordingIngestService (SHA256-checked chunk store, state machine, audio completeness gate #586)"
      - "SelectedMethodRecordingTranscriber -> BatchTranscriptionPipeline: each segment one batch POST to the user-selected method's base URL (issue #591), then the dictionary corrector only on the assembled raw concatenation (no free-text cleanup)"
      - Assembled markdown transcript (raw per-segment concatenation + dictionary edits only)
      - "On promote: CcVaultFiler -> `cc-vault docs add`"

  - id: voice_utterance_flow
    name: Resumable Voice Utterance Flow
    description: Phone voice command uploaded resumably, transcribed, and executed
    path:
      - "Phone -> /voice/utterance register + chunk PUTs (idempotent, SHA256)"
      - "VoiceUtteranceService reassembles the complete blob"
      - "BatchTranscriptionPipeline: whole-audio batch transcription via the Gateway-selected method, then dictionary-only correction (no free-text cleanup, issue #587)"
      - "VoiceService intent parse -> SessionManager action"
      - "VoiceTurnLog records inbound/outbound for review"

  - id: phone_push_to_talk_turn_flow
    name: Phone Push-to-Talk Audio-Reply Turn Flow
    description: Phone push-to-talk records one clip, uploads it resumably, and the server transcribes the whole clip once via the shared batch pipeline using the user-selected method (issue #592 - no hardcoded whisper-1 path, dictionary-only correction, completeness gate), then summarizes and speaks the reply back
    path:
      - "Phone -> Gateway /sessions/{id}/voice-turn/upload chunk PUTs (idempotent, SHA256), then /complete"
      - "VoiceUploadStore reassembles the whole clip; completeness gate (issue #586): a missing OR zero-byte chunk is refused as 'incomplete' (409) with the indices to re-send - a truncated upload is never forwarded for transcription"
      - "Gateway GatewayVoiceTurnEndpoint forwards the assembled whole clip to the owning Director's POST /sessions/{id}/voice-turn (VoiceTurnEndpoint, SSE)"
      - "VoiceTurnEndpoint transcribes the whole clip ONCE through the shared BatchTranscriptionPipeline via VoiceService using the Gateway/user-selected method (issue #587 - no hardcoded whisper-1 endpoint), then dictionary-only correction (no free-text cleanup; a no-dictionary-term utterance returns byte-identical raw text)"
      - "Send the dictionary-corrected transcript to the session -> ClaudeSummarizer -> TtsService -> reply audio streamed back as the SSE reply event"

  - id: wingman_state_flow
    name: Wingman Terminal-State Flow
    description: Read-only derivation of session status from the terminal (timer only, no LLM)
    path:
      - Session terminal bytes (CircularTerminalBuffer)
      - "TerminalStateDetector: byte -> Working; 10s silence -> WaitingForInput"
      - "Session.SetActivityState records the transition + raises the change event"
      - "SessionStatusWingman maps state -> colour (blue=working, red=needs you)"

  - id: comm_queue_scheduling_flow
    name: Comm-Queue Scheduling Flow
    description: Leader Director periodically fires comm-queue runners
    path:
      - "MutexLeaderElection (one leader across Directors)"
      - "SchedulerService tick"
      - "CommQueueScheduler queries comm-queue DB + evaluates runner eligibility"
      - "Process.Start runner command (human-cadence jitter)"

  - id: state_vote_flow
    name: State Correction (Vote) Flow
    description: Human correction of the terminal-state detector
    path:
      - "POST /sessions/{sid}/state-vote"
      - "StateVoteService appends to local state-votes.jsonl (authoritative)"
      - "Best-effort gh issue create/comment"

  - id: voice_auto_refresh_flow
    name: Voice Auto-Refresh Flow (Gateway warm brain, voice mode)
    description: Issue #549 retired the always-on turn-brief stamping pipeline. The TurnEndWatcher stays and runs unconditionally with one job - keeping a voice session's spoken summary fresh on turn-end - using the same configured wingman brain (BrainSupervisor), which is kept. "Needs you" reverts to the Director's raw mechanical signal (the assessed-state refutation was dropped, Option A).
    path:
      - "Director pushes turn-end (doorbell) / heartbeat snapshot -> Gateway"
      - "TurnEndWatcher detects the Working -> Waiting/Idle boundary"
      - "For a VOICE session, TurnEndWatcher calls WingmanVoiceService.GenerateAsync directly (no brief agent): the configured wingman brain translates the reply, OpenAI text-to-speech synthesizes audio, and the result is stored as 'voice ready'"
      - "On the Working transition the watcher clears the stale voice/text cache (WingmanVoiceService.OnSessionWorking)"
      - "Note: GatewayTurnBriefStore is still served read-only by /sessions/{sid}/turnbriefs[/latest] and the interrupted/restore paths, but nothing writes new briefs since the stamping machine was removed"

  - id: key_vault_flow
    name: Key Vault Resolution Flow
    description: Centralized secret resolution so a Director never needs the key baked in
    path:
      - "Gateway start: KeyVault.SetIfAbsent seeds OPENAI_API_KEY from env (never clobbers)"
      - "Owner edits keys on the Cockpit API Keys page -> PUT /vault/keys/{name} (behind auth)"
      - "Director resolves the key at point of use: gateway-wins-when-connected, else local Settings, never an env fallback"

# Security boundaries
security_boundaries:
  - id: process_isolation
    name: Process Isolation
    description: Each Claude session runs in isolated conhost.exe process
    components:
      - conhost.exe (per session)
      - claude.exe (per session)

  - id: ipc_boundary
    name: IPC Boundary
    description: IPC channels are local-only, no network exposure
    components:
      - 'Windows: \\.\pipe\CC_ClaudeDirector (Named Pipe)'
      - 'Mac/Linux: ~/.cc_director/director.sock (Unix Socket)'
    security_note: IPC accessible only on local machine

  - id: file_system
    name: File System Locations
    description: Application data storage locations
    paths:
      - logs: "%LOCALAPPDATA%\\CcDirector\\logs\\"
      - sessions: "~/Documents/CcDirector/sessions.json"
      - repositories: "~/Documents/CcDirector/repositories.json"
      - root_directories: "%LOCALAPPDATA%\\CcDirector\\root-directories.json"
      - hooks_config: "~/.claude/settings.json"
      - gateway_token: "%LOCALAPPDATA%\\cc-director\\config\\director\\gateway-token.txt"
      - director_instances: "%LOCALAPPDATA%\\cc-director\\config\\director\\instances\\{directorId}.json"
      - scheduler_state: "%LOCALAPPDATA%\\cc-director\\config\\director\\ (runners.json, leader.json, state.json)"
      - transcripts: "%LOCALAPPDATA%\\cc-director\\transcripts\\ and vault\\transcripts\\"
      - voice_logs: "%LOCALAPPDATA%\\cc-director\\voice-utterances\\ and voice-turn-logs\\"
      - state_votes: "%LOCALAPPDATA%\\cc-director\\state-votes\\"

  - id: http_control_surface
    name: HTTP Control + Gateway Surface
    description: >
      Both the per-Director Control API and the per-machine Gateway run Kestrel.
      The Control API binds loopback-only (127.0.0.1, port 7879..7898). The Gateway
      listens for tailnet traffic, with TLS terminated by Tailscale Serve which then
      forwards plaintext to the local host. Remote access is exclusively via the
      tailnet - there is no plain-HTTP exposure to the LAN/internet.
    components:
      - "Control API: 127.0.0.1:{7879..7898} (loopback)"
      - "Gateway: Kestrel + Tailscale Serve (HTTPS 443 -> loopback)"
    auth: >
      Optional bearer-token / cookie auth backed by a per-machine 32-byte random
      token (gateway-token.txt); /healthz, /login, /logout are public. The trust
      boundary is the single-owner tailnet by design; the /file endpoint serves
      absolute paths without a sandbox and relies on that boundary.

  - id: key_vault
    name: Central Key Vault
    description: >
      Fleet secrets (e.g. OPENAI_API_KEY, DEVTHROTTLE_API_KEY - the two transcription
      keys, issue #497) live in a plain-JSON file OUTSIDE git at
      %LOCALAPPDATA%\cc-director\config\keyvault.json, served by the Gateway's
      /vault/keys endpoints behind the same bearer/cookie auth as the rest of the
      surface. GET /vault/keys returns names only; values leave only via a single-key
      GET. Secrets are stored in plaintext (no at-rest encryption) and rely on the
      single-owner machine + tailnet trust boundary; they are never logged and never
      committed.
    components:
      - "KeyVault.cs (file store)"
      - "Api/VaultEndpoints.cs (token-gated REST)"
    paths:
      - keyvault: "%LOCALAPPDATA%\\cc-director\\config\\keyvault.json"

# Design patterns used
patterns:
  - name: Strategy Pattern
    implementation: ISessionBackend interface with 4 implementations
    purpose: Abstracts terminal hosting modes across platforms
    files:
      - Backends/ISessionBackend.cs
      - Backends/EmbeddedBackend.cs
      - Backends/ConPtyBackend.cs
      - Backends/PipeBackend.cs
      - Backends/UnixPtyBackend.cs

  - name: Strategy Pattern (Agent)
    implementation: IAgent interface with ClaudeAgent, PiAgent, CodexAgent, GeminiAgent, and OpenCodeAgent implementations
    purpose: Abstracts which coding-agent CLI a session spawns (Claude Code, Pi, OpenAI Codex, Google Gemini CLI, opencode) so SessionManager can build per-agent launch specs without hard-coding Claude conventions.
    files:
      - Agents/IAgent.cs
      - Agents/AgentKind.cs
      - Agents/AgentLaunchSpec.cs
      - Agents/ClaudeAgent.cs
      - Agents/PiAgent.cs
      - Agents/CodexAgent.cs
      - Agents/GeminiAgent.cs
      - Agents/OpenCodeAgent.cs

  - name: Strategy Pattern (Terminal Renderer)
    implementation: ITerminalRenderer interface with OriginalRenderer, LiteRenderer, and ProRenderer implementations
    purpose: Abstracts how the parsed terminal grid is drawn in the Avalonia UI so the rendering backend can be swapped without changing the control or parser.
    files:
      - Rendering/ITerminalRenderer.cs
      - Rendering/OriginalRenderer.cs
      - Rendering/LiteRenderer.cs
      - Rendering/ProRenderer.cs

  - name: Observer Pattern
    implementation: Events (StatusChanged, OnActivityStateChanged)
    purpose: UI updates on state changes
    files:
      - Sessions/Session.cs

  - name: State Machine
    implementation: ActivityState enum with HandlePipeEvent()
    purpose: Claude cognitive state tracking
    files:
      - Sessions/ActivityState.cs
      - Sessions/Session.cs

  - name: Producer-Consumer
    implementation: BlockingCollection<string> in FileLog
    purpose: Thread-safe async logging
    files:
      - Utilities/FileLog.cs

  - name: Repository Pattern
    implementation: RecentSessionStore, RepositoryRegistry, SessionStateStore, RootDirectoryStore
    purpose: Persistence abstraction
    files:
      - Sessions/RecentSessionStore.cs
      - Sessions/SessionStateStore.cs
      - Configuration/RepositoryRegistry.cs
      - Configuration/RootDirectoryStore.cs
      - Configuration/RootDirectoryConfig.cs

  - name: Leader Election
    implementation: Global named kernel mutex with a dedicated election thread and a sidecar identity file
    purpose: Ensures only one Director instance runs the comm-queue scheduler at a time
    files:
      - Scheduler/MutexLeaderElection.cs
      - Scheduler/LeaderIdentityStore.cs

  - name: Idempotent Chunked Upload
    implementation: SHA256-checked chunk parts reassembled on complete, replay-safe
    purpose: Resumable phone audio/recording uploads that tolerate retries and partial transfers
    files:
      - Voice/VoiceUtteranceService.cs
      - Recording/RecordingIngestService.cs

  - name: Read-Only Observer (Wingman)
    implementation: One-shot claude --print classification/summarization that only writes Wingman-owned session fields (StatusColor, pending prompt, activity state)
    purpose: Derive session status and summaries from the terminal without ever writing to the PTY
    files:
      - Wingman/WingmanService.cs
      - Wingman/TerminalStateDetector.cs
      - Wingman/SessionStatusWingman.cs

  - name: CLI Delegation
    implementation: Sensitive side effects delegated to sanctioned CLIs via Process.Start
    purpose: Vault writes go through cc-vault; issue tracking through gh; remote ingress through the tailscale CLI
    files:
      - Recording/CcVaultFiler.cs
      - Feedback/StateVoteService.cs
      - Gateway/Tailscale/TailscaleServeProvisioner.cs
