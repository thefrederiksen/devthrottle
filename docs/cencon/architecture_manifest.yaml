# CC Director Architecture Manifest
# CenCon Method - Machine-readable C4 model
# Schema version: 1.0.0

schema_version: "1.0.0"
project:
  name: CC Director
  description: Cross-platform application for managing multiple Claude Code CLI sessions
  version: "1.1.0"
  framework: ".NET 10"
  platform: "Windows 10/11 (WPF), Mac/Linux (experimental backend)"

last_updated: "2026-05-15"

# C4 Level 1: System Context
context:
  system:
    name: CC Director
    description: Multi-session Claude Code management application
    technology: WPF Desktop Application

  actors:
    - id: developer
      name: Developer
      description: Software developer using Claude Code for coding tasks
      type: person
      relationship:
        target: cc-director
        description: Manages multiple Claude Code sessions

    - id: claude_code
      name: Claude Code CLI
      description: Anthropic's CLI for Claude AI assistance
      type: external_system
      relationship:
        target: cc-director
        description: Spawned and monitored by Director via ConPTY

    - id: git
      name: Git
      description: Version control system
      type: external_system
      relationship:
        target: cc-director
        description: Provides repository status information

    - id: openai_api
      name: OpenAI API
      description: Cloud API for speech-to-text and text-to-speech
      type: external_system
      relationship:
        target: cc-director
        description: Voice mode transcription and synthesis

# C4 Level 2: Container Diagram
containers:
  - id: wpf_ui
    name: WPF UI Layer
    technology: C# / WPF / XAML
    description: Desktop application user interface
    project: CcDirector.Wpf
    components:
      - name: MainWindow
        description: Primary window with session sidebar and content area
        file: MainWindow.xaml / MainWindow.xaml.cs
      - name: EmbeddedBackend
        description: Native console window overlay using Win32 SetParent
        file: Backends/EmbeddedBackend.cs
      - name: EmbeddedConsoleHost
        description: WPF control for hosting embedded console windows
        file: Controls/EmbeddedConsoleHost.cs
      - name: TerminalControl
        description: Custom control for terminal rendering with ANSI parsing
        file: Controls/TerminalControl.cs
      - name: Dialogs
        description: Modal dialogs for session management and Claude Code configuration
        files:
          - NewSessionDialog.xaml
          - RenameSessionDialog.xaml
          - RelinkSessionDialog.xaml
          - CloseDialog.xaml
          - CloneRepoDialog.xaml
          - GitHubRepoPickerDialog.xaml
          - RepositoryManagerDialog.xaml
          - RootDirectoryDialog.xaml
          - ClaudeConfigDialog.xaml
          - StatusDialog.xaml
          - HelpDialog.xaml
          - MemoryDialog.xaml
          - StatsDialog.xaml
          - ThemeDialog.xaml
          - OutputStyleDialog.xaml
          - ResumeDialog.xaml
      - name: CleanView
        description: Card-based conversation view with rewind buttons and Skill widget support
        file: Controls/CleanView.xaml / Controls/CleanView.xaml.cs
      - name: SettingsView
        description: Read-only settings overlay showing all configuration values grouped by category
        file: Controls/SettingsView.xaml / Controls/SettingsView.xaml.cs
      - name: Voice UI
        description: Voice mode controls and audio playback/recording
        directory: Voice/
      - name: File Viewers
        description: Document tab viewers for images, code, markdown, text, and PDF files
        files:
          - Controls/IFileViewer.cs
          - Controls/ImageViewerControl.xaml
          - Controls/CodeViewerControl.xaml
          - Controls/MarkdownViewerControl.xaml
          - Controls/TextViewerControl.xaml
          - Controls/PdfViewerControl.xaml

  - id: avalonia_ui
    name: Avalonia UI Layer
    technology: C# / Avalonia / AXAML
    description: Cross-platform desktop application user interface
    project: CcDirector.Avalonia
    dependencies:
      - CcDirector.Core
      - CcDirector.Engine
      - CcDirector.Terminal.Core
      - CcDirector.Terminal.Avalonia
    components:
      - name: MainWindow
        description: Primary window with session sidebar, content tabs, and right panel
        file: MainWindow.axaml / MainWindow.axaml.cs
      - name: CleanView
        description: Card-based conversation view with rewind support
        file: Controls/CleanView.axaml / Controls/CleanView.axaml.cs
      - name: GitChangesView
        description: Source control panel showing git changes
        file: Controls/GitChangesView.axaml / Controls/GitChangesView.axaml.cs
      - name: SessionBrowserView
        description: Browse and resume previous Claude Code sessions
        file: Controls/SessionBrowserView.axaml / Controls/SessionBrowserView.axaml.cs
      - name: UsageDashboardView
        description: Usage and cost tracking dashboard
        file: Controls/UsageDashboardView.axaml / Controls/UsageDashboardView.axaml.cs
      - name: File Viewers
        description: Document tab system for viewing images, code, markdown, text, and PDF
        files:
          - Controls/IFileViewer.cs
          - Controls/ImageViewerControl.axaml
          - Controls/CodeViewerControl.axaml
          - Controls/MarkdownViewerControl.axaml
          - Controls/TextViewerControl.axaml
          - Controls/PdfViewerControl.axaml
      - name: CommManagerView
        description: Communication Manager overlay for outbound communication queue with approval workflow and media preview
        files:
          - Controls/CommManager/CommManagerView.axaml
          - Controls/CommManager/CommManagerView.axaml.cs
          - Controls/CommManager/CommManagerViewModel.cs
          - Controls/CommManager/PlatformPreviewSelector.cs
          - Controls/CommManager/FilePathToImageConverter.cs
          - Controls/CommManager/ScheduleDialog.axaml
          - Controls/CommManager/SendProgressDialog.axaml
      - name: Dialogs
        description: Modal dialogs for session management
        files:
          - LoadWorkspaceDialog.axaml
          - RenameSessionDialog.axaml
          - RelinkSessionDialog.axaml
          - WorkspaceProgressDialog.axaml
          - Controls/InputDialog.axaml

  - id: terminal_core
    name: Terminal Core
    technology: C# / .NET 10
    description: Cross-platform terminal rendering with VT/ANSI parsing
    project: CcDirector.Terminal.Core
    components:
      - name: AnsiParser
        description: VT100/ANSI escape sequence parser with deferred line wrap, screen buffer, and scrollback
        file: AnsiParser.cs

  - id: terminal_avalonia
    name: Terminal Avalonia
    technology: C# / Avalonia
    description: Avalonia-native terminal control
    project: CcDirector.Terminal.Avalonia
    dependencies:
      - CcDirector.Terminal.Core
    components:
      - name: TerminalControl
        description: Avalonia UserControl for terminal rendering
        file: TerminalControl.cs

  - id: core_services
    name: Core Services Layer
    technology: C# / .NET 10
    description: Business logic and domain services
    project: CcDirector.Core
    components:
      - name: SessionManager
        description: Session lifecycle management. Accepts an IAgent strategy to pick the underlying CLI (Claude Code, Pi, Codex, or Gemini).
        file: Sessions/SessionManager.cs
      - name: Session
        description: Central session abstraction with activity state machine. Carries an AgentKind that identifies which CLI is bound to the session.
        file: Sessions/Session.cs
      - name: IAgent
        description: Strategy interface describing an agent CLI - executable path, argument conventions for new/resume, and capability flags (preassigned session IDs, Studio mode).
        file: Agents/IAgent.cs
      - name: AgentKind
        description: Enum identifying which agent CLI a session is running (ClaudeCode, Pi, Codex, Gemini). Persisted on the Session for restart restoration.
        file: Agents/AgentKind.cs
      - name: AgentLaunchSpec
        description: Record returned from IAgent.BuildLaunchSpec - fully formed command-line args plus any Director-known preassigned session ID.
        file: Agents/AgentLaunchSpec.cs
      - name: ClaudeAgent
        description: IAgent implementation for Claude Code. Builds --session-id / --resume args and prepends Studio mode wrapper.
        file: Agents/ClaudeAgent.cs
      - name: PiAgent
        description: IAgent implementation for the Pi coding agent (pi.cmd). V1 spawns pi with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/PiAgent.cs
      - name: CodexAgent
        description: IAgent implementation for the OpenAI Codex CLI (codex.cmd from @openai/codex). V1 spawns codex with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/CodexAgent.cs
      - name: GeminiAgent
        description: IAgent implementation for the Google Gemini CLI (gemini.cmd from @google/gemini-cli). V1 spawns gemini with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/GeminiAgent.cs
      - name: ActivityState
        description: Claude cognitive state enum (Idle, Working, WaitingForInput, etc.)
        file: Sessions/ActivityState.cs
      - name: DirectorPipeServer
        description: Named pipe IPC server for hook events
        file: Pipes/DirectorPipeServer.cs
      - name: EventRouter
        description: Routes pipe messages to appropriate sessions
        file: Pipes/EventRouter.cs
      - name: HookInstaller
        description: Manages Claude Code hooks in settings.json
        file: Hooks/HookInstaller.cs
      - name: GitStatusProvider
        description: Async git status polling
        file: Git/GitStatusProvider.cs
      - name: GitSyncStatusProvider
        description: Branch ahead/behind status tracking
        file: Git/GitSyncStatusProvider.cs
      - name: RemoteRepoProvider
        description: GitHub and Azure DevOps remote repo listing via CLI
        file: Git/RemoteRepoProvider.cs
      - name: RemoteRepoInfo
        description: Remote repository info model
        file: Git/RemoteRepoInfo.cs
      - name: ClaudeSessionReader
        description: Session verification via .jsonl transcript matching
        file: Claude/ClaudeSessionReader.cs
      - name: ClaudeClient
        description: Helper library for Claude CLI interactions
        file: Claude/ClaudeClient.cs
      - name: SessionHistory
        description: JSONL session history snapshots in zip archives for rewind/fork support
        file: Claude/SessionHistory.cs
      - name: SlashCommandProvider
        description: Provides slash command metadata for autocomplete in prompt input
        file: Skills/SlashCommandProvider.cs
      - name: VoiceModeController
        description: Orchestrates voice interaction flow
        file: Voice/Controllers/VoiceModeController.cs
      - name: CircularTerminalBuffer
        description: Thread-safe ring buffer for terminal output
        file: Memory/CircularTerminalBuffer.cs
      - name: AlphaMode
        description: Global alpha mode toggle for gating experimental features
        file: Configuration/AlphaMode.cs
      - name: CcStorage
        description: Single source of truth for all cc-director storage paths
        file: Storage/CcStorage.cs
      - name: FileLog
        description: Thread-safe async file logging
        file: Utilities/FileLog.cs
      - name: WorkflowTemplate
        description: Reusable workflow template with parameterization support
        file: Browser/WorkflowTemplate.cs
      - name: WorkflowRun
        description: Immutable execution record with per-step screenshots and timing
        file: Browser/WorkflowRun.cs
      - name: WorkflowStore
        description: Persistence for workflow templates and run records
        file: Browser/WorkflowStore.cs
      - name: ContentItem (Core)
        description: Cross-platform domain model for communications with platform-specific metadata
        file: Communications/Models/ContentItem.cs
      - name: ContentService (Core)
        description: Service layer for communication CRUD and approval workflows
        file: Communications/Services/ContentService.cs
      - name: DatabaseService (Core)
        description: SQLite persistence for communications (cross-platform, shared with Avalonia)
        file: Communications/Services/DatabaseService.cs

  - id: native_apis
    name: Platform-Specific APIs
    technology: Win32 / P/Invoke / libc
    description: Low-level platform API integration
    components:
      - name: ConPTY (Windows)
        description: Windows Pseudo Console (CreatePseudoConsole, ResizePseudoConsole)
        files:
          - ConPty/NativeMethods.cs
          - ConPty/PseudoConsole.cs
          - ConPty/ProcessHost.cs
      - name: Unix PTY (Mac/Linux)
        description: Unix pseudo-terminal (openpty, ioctl TIOCSWINSZ)
        files:
          - UnixPty/UnixNativeMethods.cs
          - UnixPty/UnixPseudoConsole.cs
          - UnixPty/UnixProcessHost.cs
      - name: Window Management (Windows only)
        description: SetParent, MoveWindow for console embedding
        file: Backends/EmbeddedBackend.cs
      - name: IPC Server
        description: Platform-appropriate IPC (Named Pipes on Windows, Unix Sockets on Mac/Linux)
        files:
          - Pipes/IDirectorServer.cs
          - Pipes/DirectorPipeServer.cs
          - Pipes/UnixSocketServer.cs
      - name: Process Management
        description: CreateProcessW (Windows) or fork/exec (Unix)
        files:
          - ConPty/ProcessHost.cs
          - UnixPty/UnixProcessHost.cs

  - id: communication_manager
    name: Communication Manager
    technology: C# / WPF / SQLite
    description: Multi-platform outbound communication queue with approval workflow
    project: CcDirector.CommunicationManager
    dependencies:
      - CcDirector.Core
    components:
      - name: MainViewModel
        description: MVVM view model for queue management and multi-platform dispatch
        file: ViewModels/MainViewModel.cs
      - name: ContentService
        description: Service layer for communication approval/rejection/posting workflows
        file: Services/ContentService.cs
      - name: DatabaseService
        description: SQLite persistence for communications and media attachments
        file: Services/DatabaseService.cs
      - name: ContentItem
        description: Domain model supporting 8 platform types with platform-specific metadata
        file: Models/ContentItem.cs
      - name: PlatformTemplateSelector
        description: WPF DataTemplateSelector routing items to platform-specific XAML templates
        file: Views/PlatformTemplateSelector.cs
      - name: TimelineView
        description: Visual timeline rendering of scheduled communications
        file: Views/TimelineView.xaml

  - id: engine
    name: Engine (Scheduler + Dispatcher)
    technology: C# / SQLite / Cronos
    description: Background scheduling engine for cron jobs and automated communication dispatch
    project: CcDirector.Engine
    dependencies:
      - CcDirector.Core
    components:
      - name: EngineHost
        description: Main controller that starts/stops scheduler and dispatcher
        file: EngineHost.cs
      - name: Scheduler
        description: Background loop checking due jobs every N seconds with cron expressions
        file: Scheduling/Scheduler.cs
      - name: JobExecutor
        description: Executes a single job, records results, updates next_run
        file: Scheduling/JobExecutor.cs
      - name: CommunicationDispatcher
        description: Polls approved communications and dispatches via cc-outlook or cc-gmail
        file: Dispatcher/CommunicationDispatcher.cs
      - name: EngineDatabase
        description: SQLite wrapper for jobs and runs tables
        file: Storage/EngineDatabase.cs
      - name: VaultArchiver
        description: Archives sent communications to vault (interactions and social posts)
        file: Archival/VaultArchiver.cs
      - name: ProcessJob
        description: Implements IJob to execute shell commands with timeout and output capture
        file: Jobs/ProcessJob.cs

  - id: vosk_stt
    name: Vosk Speech-to-Text
    technology: C# / Vosk
    description: Offline speech-to-text service using Vosk library
    project: CcDirector.VoskStt
    dependencies:
      - CcDirector.Core
    components:
      - name: VoskSttService
        description: Speech recognition service using Vosk for offline transcription
        file: VoskSttService.cs
      - name: CustomDictionary
        description: Custom vocabulary configuration for improved recognition
        file: CustomDictionary.cs

# Data flows
data_flows:
  - id: hook_event_flow
    name: Hook Event Flow
    description: Claude Code hook events to Director UI
    path:
      - Claude Code (claude.exe)
      - "hook-relay script (PowerShell on Windows, Python on Mac/Linux)"
      - "IPC channel (Named Pipe on Windows, Unix Socket on Mac/Linux)"
      - IDirectorServer
      - EventRouter
      - Session.HandlePipeEvent()
      - UI (INotifyPropertyChanged)

  - id: user_input_flow
    name: User Input Flow
    description: User input to Claude session
    path:
      - User input (keyboard)
      - conhost.exe
      - claude.exe (stdin)
      - Hook fires (UserPromptSubmit)
      - "[hook_event_flow]"

  - id: session_restore_flow
    name: Session Restore Flow
    description: Restoring sessions after application restart
    path:
      - Application startup
      - SessionStateStore.Load()
      - SessionManager.RestoreEmbeddedSession()
      - ClaudeSessionReader.VerifyWithTerminalContent()
      - Session verified/linked

  - id: voice_flow
    name: Voice Mode Flow
    description: Voice input to Claude and spoken response
    path:
      - AudioRecorder.StartAsync()
      - OpenAiSttService.TranscribeAsync()
      - Session.SendInputAsync()
      - ClaudeResponseExtractor.GetLatestResponse()
      - ClaudeSummarizer.SummarizeAsync()
      - OpenAiTtsService.SynthesizeAsync()
      - AudioPlayer.PlayAsync()

  - id: communication_dispatch_flow
    name: Communication Dispatch Flow
    description: Approved communications dispatched to platform-specific CLI tools
    path:
      - User approves item in Communication Manager
      - "SendAllAsync() fetches all approved non-hold items"
      - "DispatchItemAsync() routes by platform"
      - "Email: DispatchEmailItemAsync() -> cc-gmail or cc-outlook"
      - "Other platforms: logged as skipped (not yet supported)"
      - "RunToolAndMarkPostedAsync() executes CLI tool"
      - "MarkPosted() updates DB status to 'posted'"

# Security boundaries
security_boundaries:
  - id: process_isolation
    name: Process Isolation
    description: Each Claude session runs in isolated conhost.exe process
    components:
      - conhost.exe (per session)
      - claude.exe (per session)

  - id: ipc_boundary
    name: IPC Boundary
    description: IPC channels are local-only, no network exposure
    components:
      - 'Windows: \\.\pipe\CC_ClaudeDirector (Named Pipe)'
      - 'Mac/Linux: ~/.cc_director/director.sock (Unix Socket)'
    security_note: IPC accessible only on local machine

  - id: file_system
    name: File System Locations
    description: Application data storage locations
    paths:
      - logs: "%LOCALAPPDATA%\\CcDirector\\logs\\"
      - sessions: "~/Documents/CcDirector/sessions.json"
      - repositories: "~/Documents/CcDirector/repositories.json"
      - root_directories: "%LOCALAPPDATA%\\CcDirector\\root-directories.json"
      - hooks_config: "~/.claude/settings.json"

# Design patterns used
patterns:
  - name: Strategy Pattern
    implementation: ISessionBackend interface with 4 implementations
    purpose: Abstracts terminal hosting modes across platforms
    files:
      - Backends/ISessionBackend.cs
      - Backends/EmbeddedBackend.cs
      - Backends/ConPtyBackend.cs
      - Backends/PipeBackend.cs
      - Backends/UnixPtyBackend.cs

  - name: Strategy Pattern (Agent)
    implementation: IAgent interface with ClaudeAgent, PiAgent, CodexAgent, and GeminiAgent implementations
    purpose: Abstracts which coding-agent CLI a session spawns (Claude Code, Pi, OpenAI Codex, Google Gemini CLI) so SessionManager can build per-agent launch specs without hard-coding Claude conventions.
    files:
      - Agents/IAgent.cs
      - Agents/AgentKind.cs
      - Agents/AgentLaunchSpec.cs
      - Agents/ClaudeAgent.cs
      - Agents/PiAgent.cs
      - Agents/CodexAgent.cs
      - Agents/GeminiAgent.cs

  - name: Observer Pattern
    implementation: Events (StatusChanged, OnActivityStateChanged)
    purpose: UI updates on state changes
    files:
      - Sessions/Session.cs

  - name: State Machine
    implementation: ActivityState enum with HandlePipeEvent()
    purpose: Claude cognitive state tracking
    files:
      - Sessions/ActivityState.cs
      - Sessions/Session.cs

  - name: Producer-Consumer
    implementation: BlockingCollection<string> in FileLog
    purpose: Thread-safe async logging
    files:
      - Utilities/FileLog.cs

  - name: Repository Pattern
    implementation: RecentSessionStore, RepositoryRegistry, SessionStateStore, RootDirectoryStore
    purpose: Persistence abstraction
    files:
      - Sessions/RecentSessionStore.cs
      - Sessions/SessionStateStore.cs
      - Configuration/RepositoryRegistry.cs
      - Configuration/RootDirectoryStore.cs
      - Configuration/RootDirectoryConfig.cs
