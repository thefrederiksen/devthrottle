  - id: agent_brain
    name: Agent Brain Contract Library
    technology: C# / .NET 10
    description: The shared brain contract and its result/health models (issue #184 v2 - the original Director-REST AgentBrainClient transport was retired; the brain must not depend on a Director being up). Holds IAgentBrain (Ask / Cancel / Clear / Restart / Kill / Health), AskResult / ClearResult / BrainHealth, AgentBrainException and the BrainLog default sink. The implementation lives in the hosted_agent container; consumers (the panel, the Gateway's brief agent) code against this interface.
    project: CcDirector.AgentBrain
    components:
      - name: IAgentBrain
        description: The shared brain contract - AskAsync, CancelAsync, ClearAsync, RestartAsync, KillAsync, GetHealthAsync + SessionId. Implemented by HostedAgent (in-process)
        file: IAgentBrain.cs
      - name: BrainLog
        description: Default daily-file log sink under %LOCALAPPDATA%\cc-director\logs\agent-brain (the library cannot depend on Core's FileLog)
        file: BrainLog.cs

  - id: hosted_agent
    name: Hosted Agent Library
    technology: C# / .NET 10
    description: In-process implementation of the brain contract - HOSTS its own agent CLI (claude.exe) inside an embedded ConPty pseudoconsole and drives it through an agent driver. No Director, no HTTP, zero external process dependency; many instances per host process, one CLI child each. Layering (docs/plans/agent-driver.md) - ISessionBackend is the terminal transport, IAgentDriver is the tool's protocol, this host owns lifecycle (spawn, readiness on the buffer's byte-quiet clock, restart-on-crash, health). Host process caveats are documented on the class - hosting from inside a Claude Code ConPty, from a console process with redirected stdio, or with working dirs outside a trusted tree all break the spawned CLI (live findings, docs/features/hosted-agent/QA_REPORT.html).
    project: CcDirector.HostedAgent
    dependencies:
      - CcDirector.Core
      - CcDirector.AgentBrain
    components:
      - name: HostedAgent
        description: The host - StartAsync (driver launch spec, preassigned session id), AskAsync (echo of IAgentBrain over the driver + transcript), CancelAsync, ClearAsync (in-place reset, new transcript id tracked from disk), RestartAsync, KillAsync, GetHealthAsync; HostedAgent.For(AgentKind) factory that fails loud for kinds without a verified driver
        file: HostedAgent.cs
      - name: HostedAgentOptions
        description: Configuration - working directory, executable override, agent args, pseudoconsole size, quiet/timeout/poll tuning, log sink
        file: HostedAgentOptions.cs
      - name: BrainSupervisor
        description: Owns ONE brain for a long-lived host process (the Gateway tray app, issue #184) - create on demand (first GetAsync spawns claude.exe), RestartAsync as the single recovery verb, NotStarted health without spawning, graceful Ctrl+C-then-kill dispose so the host never leaks a claude.exe; lifecycle serialized through one gate against concurrent consumers
        file: BrainSupervisor.cs

  - id: agent_brain_panel
    name: Agent Brain Control Panel
    technology: C# / Avalonia
    description: Desktop test application for the brain libraries - one window with a large button per IAgentBrain verb (create, ask, cancel turn, clear, restart, kill, health), a conversation log, an auto-clear-after-every-ask toggle and a live health strip. Hosted-only since issue #184 - the panel process owns claude.exe via CcDirector.HostedAgent (the Director-REST mode is retired). The libraries' first consumer and their manual QA harness (docs/features/hosted-agent/QA_REPORT.html).
    project: CcDirector.AgentBrain.Panel
    dependencies:
      - CcDirector.AgentBrain
      - CcDirector.HostedAgent
    components:
      - name: MainWindow
        description: The whole panel - async button handlers (entry-point try-catch), CANCEL TURN usable while an ask is in flight, 1.5s background health poll, status-line driven so UI Automation QA can wait on real completion signals
        file: MainWindow.axaml / MainWindow.axaml.cs

  - id: setup_engine
    name: Setup / Install / Update Engine
    technology: C# / .NET 10 (headless library)
    description: Shared engine for first-time install, uninstall, and per-component auto-update from GitHub releases. Used by the setup CLI, the WPF wizard, and (for tool auto-update) the Director.
    project: CcDirector.Setup.Engine
    dependencies: []
    components:
      - name: InstallLayout
        description: Canonical on-disk locations (per-user app/bin, machine ProgramFiles/ProgramData, setup-state dir)
        file: InstallLayout.cs
      - name: ComponentRegistry
        description: Canonical component list (Director, Gateway, Cockpit, tools) and role mapping; discovers tools from the manifest
        file: ComponentRegistry.cs
      - name: ReleaseSource
        description: Resolves a release (GitHub latest / local manifest / local dir), parses release-manifest.json, downloads + stages assets
        file: ReleaseSource.cs
      - name: UpdatePlanner / UpdatePins
        description: Pure per-component decision (Install/Update/UpToDate/MissingAsset/Pinned) using independent per-asset versions
        files:
          - UpdatePlanner.cs
          - UpdatePin.cs
      - name: UpdateRunner / InstallSwapper
        description: Download -> SHA-256 verify -> atomic swap with .old backup; records placed versions
        files:
          - UpdateRunner.cs
          - InstallSwapper.cs
      - name: InstalledManifest / PinStore
        description: Per-user install bookkeeping - recorded installed versions (installed.json) and rollback pins (update-pins.json)
        files:
          - InstalledManifest.cs
          - PinStore.cs
      - name: AutoUpdateConfig
        description: Reads the config.json autoUpdate section (enabled, intervalHours) that gates the resident apps' silent auto-update cadence; CC_AUTOUPDATE=0 is a global kill switch
        file: AutoUpdateConfig.cs
      - name: GatewayServiceInstaller / GatewayServiceCommands
        description: Registers cc-gateway-service as a native LocalSystem Windows service via sc.exe/reg.exe (no NSSM); NSSM->native migration; redacts secrets in logs
        files:
          - GatewayServiceInstaller.cs
          - GatewayServiceCommands.cs
      - name: CockpitPackage
        description: Downloads, verifies, and extracts the Cockpit zip into the machine cockpit dir
        file: CockpitPackage.cs
      - name: ToolUpdater
        description: Silent auto-update of installed CLI tools (refresh-only, honors pins); driven by the resident Director
        file: ToolUpdater.cs
      - name: CockpitUpdater
        description: Silent in-place Cockpit update (refresh-only, pin-aware); driven by the Gateway's Cockpit supervisor before launch
        file: CockpitUpdater.cs
      - name: GatewayUpdater / GatewaySelfUpdate
        description: Gateway self-update - stage the new exe, launch a detached LocalSystem helper (--apply-service-update) that stops the service, swaps the locked exe, restarts, health-checks, and AUTO-ROLLS-BACK + pins a bad build (DA-1)
        files:
          - GatewayUpdater.cs
          - GatewaySelfUpdate.cs
      - name: Uninstaller
        description: Removes only install-owned files (preserves user data); service + machine dirs + per-user app/bin + PATH + shortcut
        file: Uninstaller.cs
      - name: InstallFinalizer
        description: Per-user finalization - adds bin to PATH and creates the Start Menu shortcut
        file: InstallFinalizer.cs
      - name: TailnetResolver
        description: Resolves the Tailscale MagicDNS host so user-facing URLs use the tailnet, never localhost
        file: TailnetResolver.cs

