  - id: terminal_core
    name: Terminal Core
    technology: C# / .NET 10
    description: Cross-platform terminal rendering with VT/ANSI parsing
    project: CcDirector.Terminal.Core
    components:
      - name: AnsiParser
        description: VT100/ANSI escape sequence parser with deferred line wrap, screen buffer, and scrollback
        file: AnsiParser.cs

  - id: terminal_avalonia
    name: Terminal Avalonia
    technology: C# / Avalonia
    description: Avalonia-native terminal control
    project: CcDirector.Terminal.Avalonia
    dependencies:
      - CcDirector.Terminal.Core
    components:
      - name: TerminalControl
        description: Avalonia Control hosting the terminal; wires input, sizing, and the active renderer
        file: TerminalControl.cs
      - name: TerminalView
        description: Avalonia Control presenting the parsed terminal grid; owns its own AnsiParser bound to the live window size
        file: TerminalView.cs
      - name: ITerminalRenderer
        description: Strategy interface for drawing the terminal grid; selectable rendering backends
        files:
          - Rendering/ITerminalRenderer.cs
          - Rendering/OriginalRenderer.cs
          - Rendering/LiteRenderer.cs
          - Rendering/ProRenderer.cs
          - Rendering/BoxDrawingHelper.cs

  - id: core_services
    name: Core Services Layer
    technology: C# / .NET 10
    description: Business logic and domain services
    project: CcDirector.Core
    components:
      - name: SessionManager
        description: Session lifecycle management. Accepts an IAgent strategy to pick the underlying CLI (Claude Code, Pi, Codex, Gemini, or opencode).
        file: Sessions/SessionManager.cs
      - name: Session
        description: Central session abstraction with activity state machine. Carries an AgentKind that identifies which CLI is bound to the session. Owns a dedicated AnsiParser (120x40 grid, 5000-line scrollback) that is fed from CircularTerminalBuffer.OnBytesWritten and exposed via GetHtmlSnapshot() for the HTML "Raw terminal" tab; the Avalonia terminal keeps its own parser bound to the live window size.
        file: Sessions/Session.cs
      - name: HandoverScanner
        description: Scans the vault handover folder and parses frontmatter into handover summaries for the Cockpit's remote Handovers list/preview (GET /handovers).
        file: Sessions/HandoverScanner.cs
      - name: IAgent
        description: Strategy interface describing an agent CLI - executable path, argument conventions for new/resume, and capability flags (preassigned session IDs, Studio mode).
        file: Agents/IAgent.cs
      - name: AgentKind
        description: Enum identifying which agent CLI a session is running (ClaudeCode, Pi, Codex, Gemini, OpenCode). Persisted on the Session for restart restoration.
        file: Agents/AgentKind.cs
      - name: AgentLaunchSpec
        description: Record returned from IAgent.BuildLaunchSpec - fully formed command-line args plus any Director-known preassigned session ID.
        file: Agents/AgentLaunchSpec.cs
      - name: ClaudeAgent
        description: IAgent implementation for Claude Code. Builds --session-id / --resume args and prepends Studio mode wrapper.
        file: Agents/ClaudeAgent.cs
      - name: PiAgent
        description: IAgent implementation for the Pi coding agent (pi.cmd). V1 spawns pi with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/PiAgent.cs
      - name: CodexAgent
        description: IAgent implementation for the OpenAI Codex CLI (codex.cmd from @openai/codex). V1 spawns codex with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/CodexAgent.cs
      - name: GeminiAgent
        description: IAgent implementation for the Google Gemini CLI (gemini.cmd from @google/gemini-cli). V1 spawns gemini with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/GeminiAgent.cs
      - name: OpenCodeAgent
        description: IAgent implementation for the opencode CLI (the opencode binary from opencode.ai). V1 spawns opencode with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode; bare launch opens opencode's interactive TUI in the working directory.
        file: Agents/OpenCodeAgent.cs
      - name: ActivityState
        description: Claude cognitive state enum (Idle, Working, WaitingForInput, etc.)
        file: Sessions/ActivityState.cs
      - name: DirectorPipeServer
        description: Named pipe IPC server for hook events
        file: Pipes/DirectorPipeServer.cs
      - name: EventRouter
        description: Routes pipe messages to appropriate sessions
        file: Pipes/EventRouter.cs
      - name: HookInstaller
        description: Manages Claude Code hooks in settings.json
        file: Hooks/HookInstaller.cs
      - name: GitStatusProvider
        description: Async git status polling
        file: Git/GitStatusProvider.cs
      - name: GitSyncStatusProvider
        description: Branch ahead/behind status tracking
        file: Git/GitSyncStatusProvider.cs
      - name: RemoteRepoProvider
        description: GitHub and Azure DevOps remote repo listing via CLI
        file: Git/RemoteRepoProvider.cs
      - name: RemoteRepoInfo
        description: Remote repository info model
        file: Git/RemoteRepoInfo.cs
      - name: ClaudeSessionReader
        description: Session verification via .jsonl transcript matching; ListTranscripts reads the transcript files straight off disk (the deterministic source - sessions-index.json lags)
        file: Claude/ClaudeSessionReader.cs
      - name: IAgentDriver / DriverCapabilities
        description: The per-CLI interaction protocol layer - one driver class per agent CLI encoding how THAT tool is driven inside a terminal (submit semantics, cancel keystrokes, context reset, transcript access). Stateless behavior bundles on top of ISessionBackend; capability flags declare what each tool supports, unsupported verbs throw NotSupported (never emulated). Consumed by the hosted_agent container today, the Director's Session migration later (docs/plans/agent-driver.md)
        file: Drivers/IAgentDriver.cs
      - name: ClaudeDriver
        description: The Claude Code driver - launch args (--dangerously-skip-permissions, preassigned --session-id / --resume), ECHO-VERIFIED submit (type without Enter, verify the composer echo in the terminal byte stream incl. stray-"/" corruption detection, then Enter; one Esc-and-retype recovery, then fail loud with the ANSI-stripped terminal tail), Esc (0x1B) cancel, Ctrl+C interrupt, double-Esc Rewind picker (350ms gap - live-calibrated, 120ms gets coalesced), /clear context reset, JSONL transcript reads via the ITranscriptReader seam
        files:
          - Drivers/ClaudeDriver.cs
          - Drivers/ITranscriptReader.cs
      - name: PiDriver
        description: The Pi coding agent driver (live-verified) - Esc cancel, /new context clear. Deliberately does NOT declare Interrupt (pi's Ctrl+C clears the editor and Ctrl+C twice QUITS pi) or History (pi's double-Esc opens /tree, not a rewind); transcript parsing is a v1 gap
        file: Drivers/PiDriver.cs
      - name: GenericDriver / AgentDrivers
        description: GenericDriver reproduces the pre-driver-layer keystrokes (blind submit, Esc, Ctrl+C) for CLIs without a verified driver (Codex/Gemini/OpenCode) with minimal declared capabilities; AgentDrivers is the per-kind singleton registry every host resolves drivers from. UI policy "verified driver = shipped" keys off GenericDriver (NewSessionDialog.HasVerifiedDriver)
        files:
          - Drivers/GenericDriver.cs
          - Drivers/AgentDrivers.cs
      - name: Session driver verbs
        description: Session.Driver + CancelTurnAsync / InterruptAsync / ShowHistoryAsync / ClearContextAsync (driver clear + post-clear transcript re-discovery; the caller relinks via SessionManager) + SendTextAsync routed through driver.SubmitAsync for ConPty backends only (non-PTY transports keep their own submit semantics)
        file: Sessions/Session.cs
      - name: ClaudeClient
        description: Helper library for Claude CLI interactions
        file: Claude/ClaudeClient.cs
      - name: SessionHistory
        description: JSONL session history snapshots in zip archives for rewind/fork support
        file: Claude/SessionHistory.cs
      - name: SlashCommandProvider
        description: Provides slash command metadata for autocomplete in prompt input
        file: Skills/SlashCommandProvider.cs
      - name: VoiceModeController
        description: Orchestrates voice interaction flow
        file: Voice/Controllers/VoiceModeController.cs
      - name: CircularTerminalBuffer
        description: Thread-safe ring buffer for terminal output. Exposes an OnBytesWritten event (fired outside the write lock, in producer-thread chronological order) so per-session consumers like the HTML view's AnsiParser can receive every byte without holding the buffer lock.
        file: Memory/CircularTerminalBuffer.cs
      - name: AlphaMode
        description: Global alpha mode toggle for gating experimental features
        file: Configuration/AlphaMode.cs
      - name: CcStorage
        description: Single source of truth for all cc-director storage paths
        file: Storage/CcStorage.cs
      - name: FileLog
        description: Thread-safe async file logging
        file: Utilities/FileLog.cs
      - name: WorkflowTemplate
        description: Reusable workflow template with parameterization support
        file: Browser/WorkflowTemplate.cs
      - name: WorkflowRun
        description: Immutable execution record with per-step screenshots and timing
        file: Browser/WorkflowRun.cs
      - name: WorkflowStore
        description: Persistence for workflow templates and run records
        file: Browser/WorkflowStore.cs
      - name: ContentItem (Core)
        description: Cross-platform domain model for communications with platform-specific metadata
        file: Communications/Models/ContentItem.cs
      - name: ContentService (Core)
        description: Service layer for communication CRUD and approval workflows
        file: Communications/Services/ContentService.cs
      - name: DatabaseService (Core)
        description: SQLite persistence for communications (cross-platform, shared with Avalonia)
        file: Communications/Services/DatabaseService.cs
      - name: SchedulerService
        description: Background scheduler singleton combining leader election, comm-queue runner dispatch, and hot-reload of the runners config
        file: Scheduler/SchedulerService.cs
      - name: CommQueueScheduler
        description: Per-tick body that queries the comm-queue DB, evaluates runner eligibility (cooldown, schedule, item count) and fires runners via Process.Start with human-cadence jitter
        file: Scheduler/CommQueueScheduler.cs
      - name: MutexLeaderElection
        description: Single-leader election across Director instances via a global named kernel mutex; followers poll to acquire on leader death
        file: Scheduler/MutexLeaderElection.cs
      - name: LeaderIdentityStore
        description: Sidecar JSON tracking the current leader PID/exe/timestamp so followers can display and detect a stale leader
        file: Scheduler/LeaderIdentityStore.cs
      - name: Cron
        description: Schedule factory (Daily, Weekdays, EveryMinutes) with ShouldFire/Describe
        file: Scheduler/Cron.cs
      - name: RunnersConfig
        description: On-disk runners.json loader/seeder with FileSystemWatcher hot-reload
        files:
          - Scheduler/RunnersConfig.cs
          - Scheduler/RunnerRegistration.cs
      - name: RecordingIngestService
        description: Server-side phone-recording ingest - register, store SHA256-checked audio chunks, transcribe, assemble markdown, optionally promote to vault (transient until promoted)
        file: Recording/RecordingIngestService.cs
      - name: IRecordingTranscriber / OpenAiRecordingTranscriber
        description: Transcriber abstraction and its OpenAI implementation (reuses the dictation STT + cleanup pipeline)
        files:
          - Recording/IRecordingTranscriber.cs
          - Recording/OpenAiRecordingTranscriber.cs
      - name: IVaultFiler / CcVaultFiler
        description: Vault filing abstraction and its implementation that files transcripts via the cc-vault CLI (idempotent)
        files:
          - Recording/IVaultFiler.cs
          - Recording/CcVaultFiler.cs
      - name: WingmanService
        description: Umbrella for read-only Wingman LLM tasks - terminal-state classification, voice-transcript cleanup, turn summarization, CLAUDE.md rule checks, git snapshot, recovery prompts, and free-text session Q&A (one-shot claude --print calls)
        file: Wingman/WingmanService.cs
      - name: TerminalStateDetector
        description: Content-aware quiet gate plus optional LLM judge that derives a session's activity state from the terminal alone (shadow-mode by default)
        file: Wingman/TerminalStateDetector.cs
      - name: SessionStatusWingman
        description: Per-Director single writer of Session.StatusColor; fast activity->color path plus a slow turn-summary/buffer refine path, with prompt-injection and output-activity watchers
        file: Wingman/SessionStatusWingman.cs
      - name: WingmanLlmThrottle
        description: Global per-session gate limiting Wingman LLM calls to at most one per 5 seconds
        file: Wingman/WingmanLlmThrottle.cs
      - name: StateVoteService
        description: Persists human corrections of the terminal-state detector to a local JSONL log and posts them best-effort to a GitHub tracking issue via gh
        file: Feedback/StateVoteService.cs
      - name: VoiceService
        description: End-to-end voice command pipeline - Whisper transcription, Wingman cleanup, intent parse, and execution against SessionManager
        file: Voice/VoiceService.cs
      - name: VoiceUtteranceService
        description: Resumable phone voice upload - SHA256-checked chunked parts reassembled on complete, transcribed once, cleaned, logged, then deleted (transient)
        file: Voice/VoiceUtteranceService.cs
      - name: VoiceTurnLog
        description: Disk-backed 5-day log pairing each voice turn's audio, inbound (raw/cleaned transcript) and outbound (agent vs spoken reply) for fidelity review
        file: Voice/VoiceTurnLog.cs
      - name: ClaudeSummarizer
        description: IResponseSummarizer implementation that summarizes agent responses (fidelity over brevity) and long-turn progress via Haiku
        file: Voice/Services/ClaudeSummarizer.cs
      - name: SessionType
        description: Immutable per-session playbook (Implement / Discuss / BugReport) set at creation and enforced via a pre-prompt gate; drives type badges and type-aware mission clauses (issue #211)
        file: Sessions/SessionType.cs
      - name: SessionGroupDefinition / GroupReorder
        description: Group-session model (issue #225) - a SessionGroupDefinition ties sessions into an ordered group with per-member Role (e.g. Submitter -> Implement -> QA); GroupReorder.MoveBlock moves a whole group as one unit and never splits it during drag reorder
        files:
          - Sessions/SessionGroupDefinition.cs
          - Sessions/GroupReorder.cs
      - name: AboutInfo
        description: Assembles the About/diagnostics payload (version, build, URLs, installed components) shared by the Director About dialog and the Cockpit /about page
        file: Diagnostics/AboutInfo.cs

  - id: native_apis
    name: Platform-Specific APIs
    technology: Win32 / P/Invoke / libc
    description: Low-level platform API integration
    components:
      - name: ConPTY (Windows)
        description: Windows Pseudo Console (CreatePseudoConsole, ResizePseudoConsole)
        files:
          - ConPty/NativeMethods.cs
          - ConPty/PseudoConsole.cs
          - ConPty/ProcessHost.cs
      - name: Unix PTY (Mac/Linux)
        description: Unix pseudo-terminal (openpty, ioctl TIOCSWINSZ)
        files:
          - UnixPty/UnixNativeMethods.cs
          - UnixPty/UnixPseudoConsole.cs
          - UnixPty/UnixProcessHost.cs
      - name: Window Management (Windows only)
        description: SetParent, MoveWindow for console embedding
        file: Backends/EmbeddedBackend.cs
      - name: IPC Server
        description: Platform-appropriate IPC (Named Pipes on Windows, Unix Sockets on Mac/Linux)
        files:
          - Pipes/IDirectorServer.cs
          - Pipes/DirectorPipeServer.cs
          - Pipes/UnixSocketServer.cs
      - name: Process Management
        description: CreateProcessW (Windows) or fork/exec (Unix)
        files:
          - ConPty/ProcessHost.cs
          - UnixPty/UnixProcessHost.cs

  - id: communication_manager
    name: Communication Manager
    technology: C# / WPF / SQLite
    description: Standalone multi-platform outbound communication queue with approval workflow. ARCHIVED as a separate WPF app (source under archived/CcDirector.CommunicationManager); the queue itself lives on as the CommManagerView inside the Avalonia UI plus the shared Communications services in Core, and is surfaced remotely by the Gateway CommQueue endpoints.
    status: archived
    project: archived/CcDirector.CommunicationManager
    dependencies:
      - CcDirector.Core
    components:
      - name: MainViewModel
        description: MVVM view model for queue management and multi-platform dispatch
        file: ViewModels/MainViewModel.cs
      - name: ContentService
        description: Service layer for communication approval/rejection/posting workflows
        file: Services/ContentService.cs
      - name: DatabaseService
        description: SQLite persistence for communications and media attachments
        file: Services/DatabaseService.cs
      - name: ContentItem
        description: Domain model supporting 8 platform types with platform-specific metadata
        file: Models/ContentItem.cs
      - name: PlatformTemplateSelector
        description: WPF DataTemplateSelector routing items to platform-specific XAML templates
        file: Views/PlatformTemplateSelector.cs
      - name: TimelineView
        description: Visual timeline rendering of scheduled communications
        file: Views/TimelineView.xaml

  - id: engine
    name: Engine (Scheduler + Dispatcher)
    technology: C# / SQLite / Cronos
    description: Background scheduling engine for cron jobs and automated communication dispatch
    project: CcDirector.Engine
    dependencies:
      - CcDirector.Core
    components:
      - name: EngineHost
        description: Main controller that starts/stops scheduler and dispatcher
        file: EngineHost.cs
      - name: Scheduler
        description: Background loop checking due jobs every N seconds with cron expressions
        file: Scheduling/Scheduler.cs
      - name: JobExecutor
        description: Executes a single job, records results, updates next_run
        file: Scheduling/JobExecutor.cs
      - name: CommunicationDispatcher
        description: Polls approved communications and dispatches via cc-outlook or cc-gmail
        file: Dispatcher/CommunicationDispatcher.cs
