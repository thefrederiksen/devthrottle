    name: WPF UI Layer
    technology: C# / WPF / XAML
    description: Original desktop UI. ARCHIVED - superseded by the Avalonia UI; source now lives under archived/CcDirector.Wpf and is not built into the shipping app.
    status: archived
    project: archived/CcDirector.Wpf
    components:
      - name: MainWindow
        description: Primary window with session sidebar and content area
        file: MainWindow.xaml / MainWindow.xaml.cs
      - name: EmbeddedBackend
        description: Native console window overlay using Win32 SetParent
        file: Backends/EmbeddedBackend.cs
      - name: EmbeddedConsoleHost
        description: WPF control for hosting embedded console windows
        file: Controls/EmbeddedConsoleHost.cs
      - name: TerminalControl
        description: Custom control for terminal rendering with ANSI parsing
        file: Controls/TerminalControl.cs
      - name: Dialogs
        description: Modal dialogs for session management and Claude Code configuration
        files:
          - NewSessionDialog.xaml
          - RenameSessionDialog.xaml
          - RelinkSessionDialog.xaml
          - CloseDialog.xaml
          - CloneRepoDialog.xaml
          - GitHubRepoPickerDialog.xaml
          - RepositoryManagerDialog.xaml
          - RootDirectoryDialog.xaml
          - ClaudeConfigDialog.xaml
          - StatusDialog.xaml
          - HelpDialog.xaml
          - MemoryDialog.xaml
          - StatsDialog.xaml
          - ThemeDialog.xaml
          - OutputStyleDialog.xaml
          - ResumeDialog.xaml
      - name: CleanView
        description: Card-based conversation view with rewind buttons and Skill widget support
        file: Controls/CleanView.xaml / Controls/CleanView.xaml.cs
      - name: SettingsView
        description: Settings overlay showing configuration values grouped by category; editable and persisted to config.json via the Control API (GET/PUT /settings) with live gateway re-apply
        file: Controls/SettingsView.xaml / Controls/SettingsView.xaml.cs
      - name: Voice UI
        description: Voice mode controls and audio playback/recording, including the Dictate dialog with microphone selection (WaveIn device picker, default = Windows default device) and an explicit named no-audio failure when the chosen mic captures nothing
