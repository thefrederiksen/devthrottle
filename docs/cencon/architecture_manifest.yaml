          - Controls/CommManager/CommManagerView.axaml.cs
          - Controls/CommManager/CommManagerViewModel.cs
          - Controls/CommManager/PlatformPreviewSelector.cs
          - Controls/CommManager/FilePathToImageConverter.cs
          - Controls/CommManager/ScheduleDialog.axaml
          - Controls/CommManager/SendProgressDialog.axaml
      - name: Dialogs
        description: Modal dialogs for session management
        files:
