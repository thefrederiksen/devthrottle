# CC Director Architecture Manifest
# CenCon Method - Machine-readable C4 model
# Schema version: 1.0.0

schema_version: "1.0.0"
project:
  name: CC Director
  description: Cross-platform application for managing multiple Claude Code CLI sessions, with a per-machine HTTP Control API, a tailnet Gateway for remote/mobile access, and background scheduling
  version: "0.6.18"
  framework: ".NET 10"
  platform: "Windows 10/11 (Avalonia primary; WPF archived), Mac/Linux (experimental backend)"

last_updated: "2026-06-11"

# C4 Level 1: System Context
context:
  system:
    name: CC Director
    description: Multi-session Claude Code management application
    technology: WPF Desktop Application

  actors:
    - id: developer
      name: Developer
      description: Software developer using Claude Code for coding tasks
      type: person
      relationship:
        target: cc-director
        description: Manages multiple Claude Code sessions

    - id: claude_code
      name: Claude Code CLI
      description: Anthropic's CLI for Claude AI assistance
      type: external_system
      relationship:
        target: cc-director
        description: Spawned and monitored by Director via ConPTY

    - id: git
      name: Git
      description: Version control system
      type: external_system
      relationship:
        target: cc-director
        description: Provides repository status information

    - id: openai_api
      name: OpenAI API
      description: Cloud API for speech-to-text (Whisper/Realtime) and text-to-speech
      type: external_system
      relationship:
        target: cc-director
        description: Voice mode + dictation transcription, recording transcription, and TTS synthesis

    - id: tailscale
      name: Tailscale
      description: WireGuard-based mesh VPN with Tailscale Serve HTTPS reverse proxy
      type: external_system
      relationship:
        target: gateway
        description: Gateway invokes the tailscale CLI to publish HTTPS mappings (443 -> loopback) so the dashboard/Directors are reachable from the owner's phone over the tailnet; TLS terminates at Tailscale

    - id: vault
      name: cc-vault Document Store
      description: Personal knowledge vault accessed exclusively through the cc-vault CLI
      type: external_system
      relationship:
        target: cc-director
        description: Recording transcripts and session handovers are filed into the vault via `cc-vault docs add` (the only sanctioned vault write path)

    - id: github
      name: GitHub (gh CLI)
      description: GitHub issue tracker reached through the gh CLI
      type: external_system
      relationship:
        target: cc-director
        description: Human corrections to the terminal-state detector are posted best-effort to a tracking issue via gh

    - id: phone_recorder
      name: Phone Recorder / Mobile Client
      description: Mobile app (CcRecorder / CcDirectorClient) used by the developer to capture audio and drive sessions remotely
      type: person
      relationship:
        target: gateway
        description: Uploads recordings and voice utterances and drives sessions over the tailnet via the Gateway

# C4 Level 2: Container Diagram
containers:
