# Data flows
data_flows:
  - id: hook_event_flow
    name: Hook Event Flow
    description: Claude Code hook events to Director UI
    path:
      - Claude Code (claude.exe)
      - "hook-relay script (PowerShell on Windows, Python on Mac/Linux)"
      - "IPC channel (Named Pipe on Windows, Unix Socket on Mac/Linux)"
      - IDirectorServer
      - EventRouter
      - Session.HandlePipeEvent()
      - UI (INotifyPropertyChanged)

  - id: user_input_flow
    name: User Input Flow
    description: User input to Claude session
    path:
      - User input (keyboard)
      - conhost.exe
      - claude.exe (stdin)
      - Hook fires (UserPromptSubmit)
      - "[hook_event_flow]"

  - id: session_restore_flow
    name: Session Restore Flow
    description: Restoring sessions after application restart
    path:
      - Application startup
      - SessionStateStore.Load()
      - SessionManager.RestoreEmbeddedSession()
      - ClaudeSessionReader.VerifyWithTerminalContent()
      - Session verified/linked

  - id: voice_flow
    name: Voice Mode Flow
    description: Voice input to Claude and spoken response
    path:
      - AudioRecorder.StartAsync()
      - OpenAiSttService.TranscribeAsync()
      - Session.SendInputAsync()
      - ClaudeResponseExtractor.GetLatestResponse()
      - ClaudeSummarizer.SummarizeAsync()
      - OpenAiTtsService.SynthesizeAsync()
      - AudioPlayer.PlayAsync()

  - id: communication_dispatch_flow
    name: Communication Dispatch Flow
    description: Approved communications dispatched to platform-specific CLI tools
    path:
      - User approves item in Communication Manager
      - "SendAllAsync() fetches all approved non-hold items"
      - "DispatchItemAsync() routes by platform"
      - "Email: DispatchEmailItemAsync() -> cc-gmail or cc-outlook"
      - "Other platforms: logged as skipped (not yet supported)"
      - "RunToolAndMarkPostedAsync() executes CLI tool"
      - "MarkPosted() updates DB status to 'posted'"

  - id: remote_access_flow
    name: Remote Access Flow (tailnet)
    description: Owner's phone reaching local Directors over the tailnet via the Gateway
    path:
      - Phone (browser/mobile client) over tailnet
      - "Tailscale Serve (HTTPS, TLS terminated)"
      - GatewayHost (Kestrel, loopback)
      - DirectorRegistry (resolve target Director)
      - DirectorEndpointClient -> Director Control API (loopback)
      - ControlEndpoints route handler

  - id: dictation_flow
    name: In-Process Dictation Flow
    description: Desktop SpeakDialog dictation captured and transcribed in-process
    path:
      - "MicAudioCapture (NAudio WaveIn, 24kHz/16-bit mono)"
      - "OnAudioBands -> SpeakDialog equalizer; OnInputRms -> level hint"
      - "OpenAiRealtimeProvider (streaming STT; bounded connect: 10s per-attempt timeout + 1 auto-retry, DictationConnectException on exhaustion)"
      - "CleanupOrchestrator (dictionary-only term correction via gpt-4.1-nano; strict prompt, never rewords/summarizes/removes fillers)"
      - SpeakDialog inserts/sends the verbatim text (only dictionary terms corrected) into the prompt

  - id: recording_ingest_flow
    name: Phone Recording Ingest Flow
    description: Phone-captured audio transcribed and optionally filed to the vault
    path:
      - Phone uploads chunks -> Gateway RecordingEndpoints
      - RecordingIngestService (SHA256-checked chunk store, state machine)
      - "OpenAiRecordingTranscriber (Whisper STT + cleanup)"
      - Assembled markdown transcript
      - "On promote: CcVaultFiler -> `cc-vault docs add`"

  - id: voice_utterance_flow
    name: Resumable Voice Utterance Flow
    description: Phone voice command uploaded resumably, transcribed, and executed
    path:
      - "Phone -> /voice/utterance register + chunk PUTs (idempotent, SHA256)"
      - "VoiceUtteranceService reassembles + transcribes once"
      - "WingmanService.CleanVoiceTranscriptAsync (cleanup)"
      - "VoiceService intent parse -> SessionManager action"
      - "VoiceTurnLog records inbound/outbound for review"

  - id: wingman_state_flow
    name: Wingman Terminal-State Flow
    description: Read-only derivation of session status from the terminal (timer only, no LLM)
    path:
      - Session terminal bytes (CircularTerminalBuffer)
      - "TerminalStateDetector: byte -> Working; 10s silence -> WaitingForInput"
      - "Session.SetActivityState records the transition + raises the change event"
      - "SessionStatusWingman maps state -> colour (blue=working, red=needs you)"

  - id: comm_queue_scheduling_flow
    name: Comm-Queue Scheduling Flow
    description: Leader Director periodically fires comm-queue runners
    path:
      - "MutexLeaderElection (one leader across Directors)"
      - "SchedulerService tick"
      - "CommQueueScheduler queries comm-queue DB + evaluates runner eligibility"
      - "Process.Start runner command (human-cadence jitter)"

  - id: state_vote_flow
    name: State Correction (Vote) Flow
    description: Human correction of the terminal-state detector
    path:
      - "POST /sessions/{sid}/state-vote"
      - "StateVoteService appends to local state-votes.jsonl (authoritative)"
      - "Best-effort gh issue create/comment"

  - id: turn_brief_flow
    name: Turn Brief Flow (Gateway warm brain)
    description: A completed turn becomes a structured brief every consumer renders verbatim
    path:
      - "Director pushes turn-end (doorbell) / heartbeat snapshot -> Gateway"
      - "TurnEndWatcher detects the Working -> Waiting/Idle boundary"
      - "GatewayTurnBriefAgent (single warm brain) generates the brief from the TurnBriefContract prompt, validates mechanically, degrades to a stub on failure"
      - "GatewayTurnBriefStore appends the brief (+ TurnPackage) to the per-session .jsonl, updates the latest-brief cache"
      - "Consumers (Cockpit BriefPane, rail, phone Wingman tab) GET /sessions/{sid}/turnbriefs[/latest] and render verbatim"
      - "Brief feedback: POST /sessions/{sid}/turnbriefs/feedback stores a labeled example (#207)"

  - id: key_vault_flow
    name: Key Vault Resolution Flow
    description: Centralized secret resolution so a Director never needs the key baked in
    path:
      - "Gateway start: KeyVault.SetIfAbsent seeds OPENAI_API_KEY from env (never clobbers)"
      - "Owner edits keys on the Cockpit API Keys page -> PUT /vault/keys/{name} (behind auth)"
      - "Director resolves the key at point of use: gateway-wins-when-connected, else local Settings, never an env fallback"

# Security boundaries
security_boundaries:
  - id: process_isolation
    name: Process Isolation
    description: Each Claude session runs in isolated conhost.exe process
    components:
      - conhost.exe (per session)
      - claude.exe (per session)

  - id: ipc_boundary
    name: IPC Boundary
    description: IPC channels are local-only, no network exposure
    components:
      - 'Windows: \\.\pipe\CC_ClaudeDirector (Named Pipe)'
      - 'Mac/Linux: ~/.cc_director/director.sock (Unix Socket)'
    security_note: IPC accessible only on local machine

  - id: file_system
    name: File System Locations
    description: Application data storage locations
    paths:
      - logs: "%LOCALAPPDATA%\\CcDirector\\logs\\"
      - sessions: "~/Documents/CcDirector/sessions.json"
      - repositories: "~/Documents/CcDirector/repositories.json"
      - root_directories: "%LOCALAPPDATA%\\CcDirector\\root-directories.json"
      - hooks_config: "~/.claude/settings.json"
      - gateway_token: "%LOCALAPPDATA%\\cc-director\\config\\director\\gateway-token.txt"
      - director_instances: "%LOCALAPPDATA%\\cc-director\\config\\director\\instances\\{directorId}.json"
      - scheduler_state: "%LOCALAPPDATA%\\cc-director\\config\\director\\ (runners.json, leader.json, state.json)"
      - transcripts: "%LOCALAPPDATA%\\cc-director\\transcripts\\ and vault\\transcripts\\"
      - voice_logs: "%LOCALAPPDATA%\\cc-director\\voice-utterances\\ and voice-turn-logs\\"
      - state_votes: "%LOCALAPPDATA%\\cc-director\\state-votes\\"

  - id: http_control_surface
    name: HTTP Control + Gateway Surface
    description: >
      Both the per-Director Control API and the per-machine Gateway run Kestrel.
      The Control API binds loopback-only (127.0.0.1, port 7879..7898). The Gateway
      listens for tailnet traffic, with TLS terminated by Tailscale Serve which then
      forwards plaintext to the local host. Remote access is exclusively via the
      tailnet - there is no plain-HTTP exposure to the LAN/internet.
    components:
      - "Control API: 127.0.0.1:{7879..7898} (loopback)"
      - "Gateway: Kestrel + Tailscale Serve (HTTPS 443 -> loopback)"
    auth: >
      Optional bearer-token / cookie auth backed by a per-machine 32-byte random
      token (gateway-token.txt); /healthz, /login, /logout are public. The trust
      boundary is the single-owner tailnet by design; the /file endpoint serves
      absolute paths without a sandbox and relies on that boundary.

  - id: key_vault
    name: Central Key Vault
    description: >
      Fleet secrets (e.g. OPENAI_API_KEY) live in a plain-JSON file OUTSIDE git at
      %LOCALAPPDATA%\cc-director\config\keyvault.json, served by the Gateway's
      /vault/keys endpoints behind the same bearer/cookie auth as the rest of the
      surface. GET /vault/keys returns names only; values leave only via a single-key
      GET. Secrets are stored in plaintext (no at-rest encryption) and rely on the
      single-owner machine + tailnet trust boundary; they are never logged and never
      committed.
    components:
      - "KeyVault.cs (file store)"
      - "Api/VaultEndpoints.cs (token-gated REST)"
    paths:
      - keyvault: "%LOCALAPPDATA%\\cc-director\\config\\keyvault.json"

# Design patterns used
patterns:
  - name: Strategy Pattern
    implementation: ISessionBackend interface with 4 implementations
    purpose: Abstracts terminal hosting modes across platforms
    files:
      - Backends/ISessionBackend.cs
      - Backends/EmbeddedBackend.cs
      - Backends/ConPtyBackend.cs
      - Backends/PipeBackend.cs
      - Backends/UnixPtyBackend.cs

  - name: Strategy Pattern (Agent)
    implementation: IAgent interface with ClaudeAgent, PiAgent, CodexAgent, GeminiAgent, and OpenCodeAgent implementations
    purpose: Abstracts which coding-agent CLI a session spawns (Claude Code, Pi, OpenAI Codex, Google Gemini CLI, opencode) so SessionManager can build per-agent launch specs without hard-coding Claude conventions.
    files:
      - Agents/IAgent.cs
      - Agents/AgentKind.cs
      - Agents/AgentLaunchSpec.cs
      - Agents/ClaudeAgent.cs
      - Agents/PiAgent.cs
      - Agents/CodexAgent.cs
      - Agents/GeminiAgent.cs
      - Agents/OpenCodeAgent.cs

  - name: Strategy Pattern (Terminal Renderer)
    implementation: ITerminalRenderer interface with OriginalRenderer, LiteRenderer, and ProRenderer implementations
    purpose: Abstracts how the parsed terminal grid is drawn in the Avalonia UI so the rendering backend can be swapped without changing the control or parser.
    files:
      - Rendering/ITerminalRenderer.cs
      - Rendering/OriginalRenderer.cs
      - Rendering/LiteRenderer.cs
      - Rendering/ProRenderer.cs

  - name: Observer Pattern
    implementation: Events (StatusChanged, OnActivityStateChanged)
    purpose: UI updates on state changes
    files:
      - Sessions/Session.cs

  - name: State Machine
    implementation: ActivityState enum with HandlePipeEvent()
    purpose: Claude cognitive state tracking
    files:
      - Sessions/ActivityState.cs
      - Sessions/Session.cs

  - name: Producer-Consumer
    implementation: BlockingCollection<string> in FileLog
    purpose: Thread-safe async logging
    files:
      - Utilities/FileLog.cs

  - name: Repository Pattern
    implementation: RecentSessionStore, RepositoryRegistry, SessionStateStore, RootDirectoryStore
    purpose: Persistence abstraction
    files:
      - Sessions/RecentSessionStore.cs
      - Sessions/SessionStateStore.cs
      - Configuration/RepositoryRegistry.cs
      - Configuration/RootDirectoryStore.cs
      - Configuration/RootDirectoryConfig.cs

  - name: Leader Election
    implementation: Global named kernel mutex with a dedicated election thread and a sidecar identity file
    purpose: Ensures only one Director instance runs the comm-queue scheduler at a time
    files:
      - Scheduler/MutexLeaderElection.cs
      - Scheduler/LeaderIdentityStore.cs

  - name: Idempotent Chunked Upload
    implementation: SHA256-checked chunk parts reassembled on complete, replay-safe
    purpose: Resumable phone audio/recording uploads that tolerate retries and partial transfers
    files:
      - Voice/VoiceUtteranceService.cs
      - Recording/RecordingIngestService.cs

  - name: Read-Only Observer (Wingman)
    implementation: One-shot claude --print classification/summarization that only writes Wingman-owned session fields (StatusColor, pending prompt, activity state)
    purpose: Derive session status and summaries from the terminal without ever writing to the PTY
    files:
      - Wingman/WingmanService.cs
      - Wingman/TerminalStateDetector.cs
      - Wingman/SessionStatusWingman.cs

  - name: CLI Delegation
    implementation: Sensitive side effects delegated to sanctioned CLIs via Process.Start
    purpose: Vault writes go through cc-vault; issue tracking through gh; remote ingress through the tailscale CLI
    files:
      - Recording/CcVaultFiler.cs
      - Feedback/StateVoteService.cs
      - Gateway/Tailscale/TailscaleServeProvisioner.cs
