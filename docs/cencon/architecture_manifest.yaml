      - name: CleanView
        description: Card-based conversation view with rewind support
        file: Controls/CleanView.axaml / Controls/CleanView.axaml.cs
      - name: GitChangesView
        description: Source control panel showing git changes
        file: Controls/GitChangesView.axaml / Controls/GitChangesView.axaml.cs
      - name: SessionBrowserView
        description: Browse and resume previous Claude Code sessions
        file: Controls/SessionBrowserView.axaml / Controls/SessionBrowserView.axaml.cs
      - name: UsageDashboardView
        description: Usage and cost tracking dashboard
        file: Controls/UsageDashboardView.axaml / Controls/UsageDashboardView.axaml.cs
      - name: File Viewers
        description: Document tab system for viewing images, code, markdown, text, and PDF
        files:
          - Controls/IFileViewer.cs
          - Controls/ImageViewerControl.axaml
          - Controls/CodeViewerControl.axaml
          - Controls/MarkdownViewerControl.axaml
          - Controls/TextViewerControl.axaml
          - Controls/PdfViewerControl.axaml
      - name: CommManagerView
        description: Communication Manager overlay for outbound communication queue with approval workflow and media preview
        files:
