# CC Director Architecture Manifest
# CenCon Method - Machine-readable C4 model
# Schema version: 1.0.0

schema_version: "1.0.0"
project:
  name: CC Director
  description: Cross-platform application for managing multiple Claude Code CLI sessions, with a per-machine HTTP Control API, a tailnet Gateway for remote/mobile access, and background scheduling
  version: "0.6.18"
  framework: ".NET 10"
  platform: "Windows 10/11 (Avalonia primary; WPF archived), Mac/Linux (experimental backend)"

last_updated: "2026-06-21"  # issue #549: retired the always-on turn-brief pipeline (GatewayTurnBriefAgent + SessionAssessments removed); TurnEndWatcher re-homed to voice auto-refresh only; wingman_enabled/CC_TURNBRIEFS flags removed

# C4 Level 1: System Context
context:
  system:
    name: CC Director
    description: Multi-session Claude Code management application
    technology: WPF Desktop Application

  actors:
    - id: developer
      name: Developer
      description: Software developer using Claude Code for coding tasks
      type: person
      relationship:
        target: cc-director
        description: Manages multiple Claude Code sessions

    - id: claude_code
      name: Claude Code CLI
      description: Anthropic's CLI for Claude AI assistance
      type: external_system
      relationship:
        target: cc-director
        description: Spawned and monitored by Director via ConPTY

    - id: git
      name: Git
      description: Version control system
      type: external_system
      relationship:
        target: cc-director
        description: Provides repository status information

    - id: openai_api
      name: OpenAI API
      description: Cloud API for speech-to-text (Whisper/Realtime) and text-to-speech
      type: external_system
      relationship:
        target: cc-director
        description: Voice mode + dictation transcription, recording transcription, and TTS synthesis

    - id: tailscale
      name: Tailscale
      description: WireGuard-based mesh VPN with Tailscale Serve HTTPS reverse proxy
      type: external_system
      relationship:
        target: gateway
        description: Gateway invokes the tailscale CLI to publish HTTPS mappings (443 -> loopback) so the dashboard/Directors are reachable from the owner's phone over the tailnet; TLS terminates at Tailscale

    - id: vault
      name: cc-vault Document Store
      description: Personal knowledge vault accessed exclusively through the cc-vault CLI
      type: external_system
      relationship:
        target: cc-director
        description: Recording transcripts and session handovers are filed into the vault via `cc-vault docs add` (the only sanctioned vault write path)

    - id: github
      name: GitHub (gh CLI)
      description: GitHub issue tracker reached through the gh CLI
      type: external_system
      relationship:
        target: cc-director
        description: Human corrections to the terminal-state detector are posted best-effort to a tracking issue via gh

    - id: phone_recorder
      name: Phone Recorder / Mobile Client
      description: Mobile app (CcRecorder / CcDirectorClient) used by the developer to capture audio and drive sessions remotely
      type: person
      relationship:
        target: gateway
        description: Uploads recordings and voice utterances and drives sessions over the tailnet via the Gateway

# C4 Level 2: Container Diagram
containers:
  - id: wpf_ui
    name: WPF UI Layer
    technology: C# / WPF / XAML
    description: Original desktop UI. ARCHIVED - superseded by the Avalonia UI; source now lives under archived/CcDirector.Wpf and is not built into the shipping app.
    status: archived
    project: archived/CcDirector.Wpf
    components:
      - name: MainWindow
        description: Primary window with session sidebar and content area
        file: MainWindow.xaml / MainWindow.xaml.cs
      - name: EmbeddedBackend
        description: Native console window overlay using Win32 SetParent
        file: Backends/EmbeddedBackend.cs
      - name: EmbeddedConsoleHost
        description: WPF control for hosting embedded console windows
        file: Controls/EmbeddedConsoleHost.cs
      - name: TerminalControl
        description: Custom control for terminal rendering with ANSI parsing
        file: Controls/TerminalControl.cs
      - name: Dialogs
        description: Modal dialogs for session management and Claude Code configuration
        files:
          - NewSessionDialog.xaml
          - RenameSessionDialog.xaml
          - RelinkSessionDialog.xaml
          - CloseDialog.xaml
          - CloneRepoDialog.xaml
          - GitHubRepoPickerDialog.xaml
          - RepositoryManagerDialog.xaml
          - RootDirectoryDialog.xaml
          - ClaudeConfigDialog.xaml
          - StatusDialog.xaml
          - HelpDialog.xaml
          - MemoryDialog.xaml
          - StatsDialog.xaml
          - ThemeDialog.xaml
          - OutputStyleDialog.xaml
          - ResumeDialog.xaml
      - name: CleanView
        description: Card-based conversation view with rewind buttons and Skill widget support
        file: Controls/CleanView.xaml / Controls/CleanView.xaml.cs
      - name: SettingsView
        description: Settings overlay showing configuration values grouped by category; editable and persisted to config.json via the Control API (GET/PUT /settings) with live gateway re-apply
        file: Controls/SettingsView.xaml / Controls/SettingsView.xaml.cs
      - name: Voice UI
        description: Voice mode controls and audio playback/recording, including the Dictate dialog with microphone selection (WaveIn device picker, default = Windows default device) and an explicit named no-audio failure when the chosen mic captures nothing
        directory: Voice/
      - name: File Viewers
        description: Document tab viewers for images, code, markdown, text, and PDF files
        files:
          - Controls/IFileViewer.cs
          - Controls/ImageViewerControl.xaml
          - Controls/CodeViewerControl.xaml
          - Controls/MarkdownViewerControl.xaml
          - Controls/TextViewerControl.xaml
          - Controls/PdfViewerControl.xaml

  - id: avalonia_ui
    name: Avalonia UI Layer
    technology: C# / Avalonia / AXAML
    description: Cross-platform desktop application user interface
    project: CcDirector.Avalonia
    dependencies:
      - CcDirector.Core
      - CcDirector.Engine
      - CcDirector.Terminal.Core
      - CcDirector.Terminal.Avalonia
      - CcDirector.Setup.Engine
    components:
      - name: MainWindow
        description: Primary window with session sidebar, content tabs, and right panel
        file: MainWindow.axaml / MainWindow.axaml.cs
      - name: AccountGateScreen
        description: The startup account gate screen (issue #580). Shown after the splash, in place of the main window, when no DevThrottle credential has ever been stored on this install (App.axaml.cs OnFrameworkInitializationCompleted applies the AccountGatePolicy decision). States that an account is required and why - the Director runs locally and quietly once the user is signed in - and offers the action that leads to login. The Sign in action drives the first-run login hand-off (issue #581) - it shows the FirstRunLoginDialog explanation, then runs the FirstRunLoginCoordinator (system-browser sign-in plus loopback capture), and on success calls App.ProceedToMainWindowAfterLogin to clear the gate and show the main window with no restart; on failure it surfaces a user-safe message and stays on the gate. When a credential is present the gate passes, the main window shows, and the online session validation runs in the background without blocking the window.
        file: AccountGateScreen.axaml / AccountGateScreen.axaml.cs
      - name: FirstRunLoginDialog
        description: The first-run explanation shown before the system-browser sign-in (issue #581). Tells the user that a DevThrottle account is required to run the Director and that first-time setup must be online, before the browser is opened. Owns no login logic - it is the explanatory gate the AccountGateScreen shows ahead of the hand-off so the user is never sent to the browser uninformed; returns confirmed/cancelled.
        file: FirstRunLoginDialog.axaml / FirstRunLoginDialog.axaml.cs
      - name: SessionActionBar
        description: Per-session action buttons (Stop / Interrupt / Clear context / History) rendered from the active session's agent-driver capability flags - a verb the session's CLI lacks is simply absent, no per-agent UI special cases. Lives inside the prompt bar
        file: Controls/SessionActionBar.axaml / Controls/SessionActionBar.axaml.cs
      - name: CleanView
        description: Card-based conversation view with rewind support
        file: Controls/CleanView.axaml / Controls/CleanView.axaml.cs
      - name: TranscriptionComponent
        description: Shared transcription UI component (issue #588) with two size variants (Full desktop dialog, Small inline strip) rendering one set of states - idle, recording, transcribing, review, used, error - and one set of Finish/Hold/Cancel controls. Presentation and state only - captures no audio and runs no transcription. During recording it shows a live waveform and timer but no transcript text (no live partial preview); the transcript appears only after transcribing, with a dictionary-correction count. Microphone selection is on the Full variant only. Host drives it via the public Show* / UpdateTimer / UpdateLevels methods and reacts to the output contract events Finished / Held / Cancelled / Errored. Intended to replace the bespoke Speak dialog and voice view presentation as surfaces are wired to it (the per-place issues; this issue builds the component only). A throwaway developer preview dialog (TranscriptionComponentPreviewDialog, behind the alpha-gated Tools menu) renders every state in the running app.
        files:
          - Controls/TranscriptionComponent.axaml
          - Controls/TranscriptionComponent.axaml.cs
          - Controls/TranscriptionComponentPreviewDialog.axaml
          - Controls/TranscriptionComponentPreviewDialog.axaml.cs
      - name: GitChangesView
        description: Source control panel showing git changes
        file: Controls/GitChangesView.axaml / Controls/GitChangesView.axaml.cs
      - name: File Viewers
        description: Document tab system for viewing images, code, markdown, text, and PDF
        files:
          - Controls/IFileViewer.cs
          - Controls/ImageViewerControl.axaml
          - Controls/CodeViewerControl.axaml
          - Controls/MarkdownViewerControl.axaml
          - Controls/TextViewerControl.axaml
          - Controls/PdfViewerControl.axaml
      - name: CommManagerView
        description: Communication Manager overlay for outbound communication queue with approval workflow and media preview
        files:
          - Controls/CommManager/CommManagerView.axaml
          - Controls/CommManager/CommManagerView.axaml.cs
          - Controls/CommManager/CommManagerViewModel.cs
          - Controls/CommManager/PlatformPreviewSelector.cs
          - Controls/CommManager/FilePathToImageConverter.cs
          - Controls/CommManager/ScheduleDialog.axaml
          - Controls/CommManager/SendProgressDialog.axaml
      - name: Dialogs
        description: Modal dialogs for session management and machine settings. SettingsDialog hosts the Agents tab's machine-level agent-tool library (per-tool command-line preset, default model, a live "This is what launches:" preview strip, and a split Quick check / Launch preview); Claude Code defaults to the Automatic (skip permissions) preset with the preview strip as the always-visible safety net. LaunchPreviewDialog is a throwaway ConPty-backed terminal popup (reuses CcDirector.Terminal.Avalonia) that boots an agent with its resolved command line so the user can preview startup without creating a real session (issues #391, #436).
        files:
          - LoadWorkspaceDialog.axaml
          - RenameSessionDialog.axaml
          - RelinkSessionDialog.axaml
          - WorkspaceProgressDialog.axaml
          - Controls/InputDialog.axaml
          - SettingsDialog.axaml
          - LaunchPreviewDialog.axaml
          - FeedbackDialog.axaml
          - AgentEditorDialog.axaml
          - ModelPickerDialog.axaml

  - id: terminal_core
    name: Terminal Core
    technology: C# / .NET 10
    description: Cross-platform terminal rendering with VT/ANSI parsing
    project: CcDirector.Terminal.Core
    components:
      - name: AnsiParser
        description: VT100/ANSI escape sequence parser with deferred line wrap, screen buffer, and scrollback
        file: AnsiParser.cs

  - id: terminal_avalonia
    name: Terminal Avalonia
    technology: C# / Avalonia
    description: Avalonia-native terminal control
    project: CcDirector.Terminal.Avalonia
    dependencies:
      - CcDirector.Terminal.Core
    components:
      - name: TerminalControl
        description: Avalonia Control hosting the terminal; wires input, sizing, and the active renderer
        file: TerminalControl.cs
      - name: TerminalView
        description: Avalonia Control presenting the parsed terminal grid; owns its own AnsiParser bound to the live window size
        file: TerminalView.cs
      - name: ITerminalRenderer
        description: Strategy interface for drawing the terminal grid; selectable rendering backends
        files:
          - Rendering/ITerminalRenderer.cs
          - Rendering/OriginalRenderer.cs
          - Rendering/LiteRenderer.cs
          - Rendering/ProRenderer.cs
          - Rendering/BoxDrawingHelper.cs

  - id: core_services
    name: Core Services Layer
    technology: C# / .NET 10
    description: Business logic and domain services
    project: CcDirector.Core
    components:
      - name: SessionManager
        description: Session lifecycle management. Accepts an IAgent strategy to pick the underlying CLI (Claude Code, Pi, Codex, Gemini, or opencode).
        file: Sessions/SessionManager.cs
      - name: Session
        description: Central session abstraction with activity state machine. Carries an AgentKind that identifies which CLI is bound to the session. Owns a dedicated AnsiParser (120x40 grid, 5000-line scrollback) that is fed from CircularTerminalBuffer.OnBytesWritten and exposed via GetHtmlSnapshot() for the HTML "Raw terminal" tab; the Avalonia terminal keeps its own parser bound to the live window size.
        file: Sessions/Session.cs
      - name: HandoverScanner
        description: Scans the vault handover folder and parses frontmatter into handover summaries for the Cockpit's remote Handovers list/preview (GET /handovers).
        file: Sessions/HandoverScanner.cs
      - name: IAgent
        description: Strategy interface describing an agent CLI - executable path, argument conventions for new/resume, and capability flags (preassigned session IDs, Studio mode).
        file: Agents/IAgent.cs
      - name: AgentKind
        description: Enum identifying which agent CLI a session is running (ClaudeCode, Pi, Codex, Gemini, OpenCode). Persisted on the Session for restart restoration.
        file: Agents/AgentKind.cs
      - name: AgentLaunchSpec
        description: Record returned from IAgent.BuildLaunchSpec - fully formed command-line args plus any Director-known preassigned session ID.
        file: Agents/AgentLaunchSpec.cs
      - name: ClaudeAgent
        description: IAgent implementation for Claude Code. Builds --session-id / --resume args and prepends Studio mode wrapper.
        file: Agents/ClaudeAgent.cs
      - name: PiAgent
        description: IAgent implementation for the Pi coding agent (pi.cmd). V1 spawns pi with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/PiAgent.cs
      - name: CodexAgent
        description: IAgent implementation for the OpenAI Codex CLI (codex.cmd from @openai/codex). V1 spawns codex with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/CodexAgent.cs
      - name: GeminiAgent
        description: IAgent implementation for the Google Gemini CLI (gemini.cmd from @google/gemini-cli). V1 spawns gemini with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/GeminiAgent.cs
      - name: OpenCodeAgent
        description: IAgent implementation for the opencode CLI (the opencode binary from opencode.ai). V1 spawns opencode with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode; bare launch opens opencode's interactive TUI in the working directory.
        file: Agents/OpenCodeAgent.cs
      - name: CursorAgent
        description: IAgent implementation for the Cursor CLI (cursor-agent). V1 spawns cursor-agent with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/CursorAgent.cs
      - name: GrokAgent
        description: IAgent implementation for the xAI Grok CLI. V1 spawns grok with user args - no preassigned session IDs, no Director-initiated resume, no Studio mode.
        file: Agents/GrokAgent.cs
      - name: AgentToolCatalog / ToolDetectionWizardModel
        description: AgentToolCatalog is the canonical catalog of known agent CLI tools (executable names, defaults) the machine-level Agents library and the tool-detection wizard draw from; ToolDetectionWizardModel backs the wizard that scans the machine for installed tools and writes them into the agent entries so they persist.
        files:
          - Agents/AgentToolCatalog.cs
          - Agents/ToolDetectionWizardModel.cs
      - name: LaunchMode
        description: Enum + persistence for an agent session's launch mode (e.g. the Automatic skip-permissions preset), persisted on the agent entry so the chosen launch mode survives restarts.
        file: Configuration/LaunchMode.cs
      - name: ActivityState
        description: Claude cognitive state enum (Idle, Working, WaitingForInput, etc.)
        file: Sessions/ActivityState.cs
      - name: DirectorPipeServer
        description: Named pipe IPC server for hook events
        file: Pipes/DirectorPipeServer.cs
      - name: EventRouter
        description: Routes pipe messages to appropriate sessions
        file: Pipes/EventRouter.cs
      - name: HookInstaller
        description: Manages Claude Code hooks in settings.json
        file: Hooks/HookInstaller.cs
      - name: GitStatusProvider
        description: Async git status polling
        file: Git/GitStatusProvider.cs
      - name: GitSyncStatusProvider
        description: Branch ahead/behind status tracking
        file: Git/GitSyncStatusProvider.cs
      - name: RemoteRepoProvider
        description: GitHub and Azure DevOps remote repo listing via CLI
        file: Git/RemoteRepoProvider.cs
      - name: RemoteRepoInfo
        description: Remote repository info model
        file: Git/RemoteRepoInfo.cs
      - name: ClaudeSessionReader
        description: Session verification via .jsonl transcript matching; ListTranscripts reads the transcript files straight off disk (the deterministic source - sessions-index.json lags)
        file: Claude/ClaudeSessionReader.cs
      - name: IAgentDriver / DriverCapabilities
        description: The per-CLI interaction protocol layer - one driver class per agent CLI encoding how THAT tool is driven inside a terminal (submit semantics, cancel keystrokes, context reset, transcript access). Stateless behavior bundles on top of ISessionBackend; capability flags declare what each tool supports, unsupported verbs throw NotSupported (never emulated). Consumed by the hosted_agent container today, the Director's Session migration later (docs/plans/agent-driver.md)
        file: Drivers/IAgentDriver.cs
      - name: ClaudeDriver
        description: The Claude Code driver - launch args (--dangerously-skip-permissions, preassigned --session-id / --resume), ECHO-VERIFIED submit (type without Enter, verify the composer echo in the terminal byte stream incl. stray-"/" corruption detection, then Enter; one Esc-and-retype recovery, then fail loud with the ANSI-stripped terminal tail), Esc (0x1B) cancel, Ctrl+C interrupt, double-Esc Rewind picker (350ms gap - live-calibrated, 120ms gets coalesced), /clear context reset, JSONL transcript reads via the ITranscriptReader seam
        files:
          - Drivers/ClaudeDriver.cs
          - Drivers/ITranscriptReader.cs
      - name: PiDriver
        description: The Pi coding agent driver (live-verified) - Esc cancel, /new context clear. Deliberately does NOT declare Interrupt (pi's Ctrl+C clears the editor and Ctrl+C twice QUITS pi) or History (pi's double-Esc opens /tree, not a rewind); transcript parsing is a v1 gap
        file: Drivers/PiDriver.cs
      - name: GenericDriver / AgentDrivers
        description: GenericDriver reproduces the pre-driver-layer keystrokes (blind submit, Esc, Ctrl+C) for CLIs without a verified driver (Codex/Gemini/OpenCode) with minimal declared capabilities; AgentDrivers is the per-kind singleton registry every host resolves drivers from. UI policy "verified driver = shipped" keys off GenericDriver (NewSessionDialog.HasVerifiedDriver)
        files:
          - Drivers/GenericDriver.cs
          - Drivers/AgentDrivers.cs
      - name: CursorDriver
        description: The Cursor CLI (cursor-agent) driver - launch args and the interaction protocol for driving Cursor inside a terminal, registered in AgentDrivers like the other per-kind drivers.
        file: Drivers/CursorDriver.cs
      - name: AgentSlashCommand / driver slash-command catalogs
        description: Driver-aware slash commands - AgentSlashCommand is the per-command metadata, and each CLI carries its own catalog (Codex/Cursor/Gemini/Grok/OpenCode/Pi) so the composer offers the slash commands that the active session's tool actually supports instead of a single shared list. AgentModelOption carries the per-driver selectable model list.
        files:
          - Drivers/AgentSlashCommand.cs
          - Drivers/AgentModelOption.cs
          - Drivers/CodexSlashCommands.cs
          - Drivers/CursorSlashCommands.cs
          - Drivers/GeminiSlashCommands.cs
          - Drivers/GrokSlashCommands.cs
          - Drivers/OpenCodeSlashCommands.cs
          - Drivers/PiSlashCommands.cs
      - name: SessionAskRunner
        description: Drives a one-shot question through a REAL agent session (not print mode) and reads back a formatted answer - launch (spec without -p), submit, read the reply, close - with a timeout (SessionAskTimeoutException) and a structured SessionAskResult. Backs the Wingman "ask via a real session" path (issue #509).
        files:
          - Drivers/SessionAskRunner.cs
          - Drivers/SessionAskResult.cs
          - Drivers/SessionAskTimeoutException.cs
      - name: Session driver verbs
        description: Session.Driver + CancelTurnAsync / InterruptAsync / ShowHistoryAsync / ClearContextAsync (driver clear + post-clear transcript re-discovery; the caller relinks via SessionManager) + SendTextAsync routed through driver.SubmitAsync for ConPty backends only (non-PTY transports keep their own submit semantics)
        file: Sessions/Session.cs
      - name: ClaudeClient
        description: Helper library for Claude CLI interactions
        file: Claude/ClaudeClient.cs
      - name: SessionHistory
        description: JSONL session history snapshots in zip archives for rewind/fork support
        file: Claude/SessionHistory.cs
      - name: SlashCommandProvider
        description: Provides slash command metadata for autocomplete in prompt input
        file: Skills/SlashCommandProvider.cs
      - name: VoiceModeController
        description: Orchestrates voice interaction flow
        file: Voice/Controllers/VoiceModeController.cs
      - name: CircularTerminalBuffer
        description: Thread-safe ring buffer for terminal output. Exposes an OnBytesWritten event (fired outside the write lock, in producer-thread chronological order) so per-session consumers like the HTML view's AnsiParser can receive every byte without holding the buffer lock.
        file: Memory/CircularTerminalBuffer.cs
      - name: AlphaMode
        description: Global alpha mode toggle for gating experimental features
        file: Configuration/AlphaMode.cs
      - name: CcStorage
        description: Single source of truth for all cc-director storage paths
        file: Storage/CcStorage.cs
      - name: FileLog
        description: Thread-safe async file logging
        file: Utilities/FileLog.cs
      - name: WorkflowTemplate
        description: Reusable workflow template with parameterization support
        file: Browser/WorkflowTemplate.cs
      - name: WorkflowRun
        description: Immutable execution record with per-step screenshots and timing
        file: Browser/WorkflowRun.cs
      - name: WorkflowStore
        description: Persistence for workflow templates and run records
        file: Browser/WorkflowStore.cs
      - name: ContentItem (Core)
        description: Cross-platform domain model for communications with platform-specific metadata
        file: Communications/Models/ContentItem.cs
      - name: ContentService (Core)
        description: Service layer for communication CRUD and approval workflows
        file: Communications/Services/ContentService.cs
      - name: DatabaseService (Core)
        description: SQLite persistence for communications (cross-platform, shared with Avalonia)
        file: Communications/Services/DatabaseService.cs
      - name: SchedulerService
        description: Background scheduler singleton combining leader election, comm-queue runner dispatch, and hot-reload of the runners config
        file: Scheduler/SchedulerService.cs
      - name: CommQueueScheduler
        description: Per-tick body that queries the comm-queue DB, evaluates runner eligibility (cooldown, schedule, item count) and fires runners via Process.Start with human-cadence jitter
        file: Scheduler/CommQueueScheduler.cs
      - name: MutexLeaderElection
        description: Single-leader election across Director instances via a global named kernel mutex; followers poll to acquire on leader death
        file: Scheduler/MutexLeaderElection.cs
      - name: LeaderIdentityStore
        description: Sidecar JSON tracking the current leader PID/exe/timestamp so followers can display and detect a stale leader
        file: Scheduler/LeaderIdentityStore.cs
      - name: Cron
        description: Schedule factory (Daily, Weekdays, EveryMinutes) with ShouldFire/Describe
        file: Scheduler/Cron.cs
      - name: RunnersConfig
        description: On-disk runners.json loader/seeder with FileSystemWatcher hot-reload
        files:
          - Scheduler/RunnersConfig.cs
          - Scheduler/RunnerRegistration.cs
      - name: RecordingIngestService
        description: Server-side phone-recording ingest - register, store SHA256-checked audio chunks, then an audio completeness gate (issue #586) verifies every manifest segment is present, hash-matches, and byte-totals before transcription; an incomplete/empty upload is refused (state "incomplete" naming the missing/bad indices, or a loud empty-capture error) and never transcribed. Passing uploads transcribe each segment in batch via the IRecordingTranscriber, assemble the raw per-segment concatenation, apply the dictionary corrector once, write markdown, and optionally promote to vault (transient until promoted)
        file: Recording/RecordingIngestService.cs
      - name: IRecordingTranscriber / SelectedMethodRecordingTranscriber
        description: Transcriber abstraction and its production implementation (issue #591) that routes the phone recorder through the ONE shared BatchTranscriptionPipeline using the user-SELECTED transcription method - each segment is one whole-segment batch POST to the resolved method's base URL (BYO -> api.openai.com, DevThrottle -> devthrottle.com), and the assembled raw concatenation runs through the dictionary corrector only (no free-text cleanup), so the assembled transcript is the per-segment raw concatenation plus dictionary edits only. OpenAiRecordingTranscriber remains as an OpenAI-only transcriber used by the real-key end-to-end test
        files:
          - Recording/IRecordingTranscriber.cs
          - Recording/SelectedMethodRecordingTranscriber.cs
          - Recording/OpenAiRecordingTranscriber.cs
      - name: IVaultFiler / CcVaultFiler
        description: Vault filing abstraction and its implementation that files transcripts via the cc-vault CLI (idempotent)
        files:
          - Recording/IVaultFiler.cs
          - Recording/CcVaultFiler.cs
      - name: WingmanService
        description: Umbrella for read-only Wingman LLM tasks - terminal-state classification, voice-transcript cleanup, turn summarization, CLAUDE.md rule checks, git snapshot, recovery prompts, and free-text session Q&A (one-shot claude --print calls)
        file: Wingman/WingmanService.cs
      - name: TerminalStateDetector
        description: Content-aware quiet gate plus optional LLM judge that derives a session's activity state from the terminal alone (shadow-mode by default)
        file: Wingman/TerminalStateDetector.cs
      - name: SessionStatusWingman
        description: Per-Director single writer of Session.StatusColor; fast activity->color path plus a slow turn-summary/buffer refine path, with prompt-injection and output-activity watchers
        file: Wingman/SessionStatusWingman.cs
      - name: WingmanLlmThrottle
        description: Global per-session gate limiting Wingman LLM calls to at most one per 5 seconds
        file: Wingman/WingmanLlmThrottle.cs
      - name: StateVoteService
        description: Persists human corrections of the terminal-state detector to a local JSONL log and posts them best-effort to a GitHub tracking issue via gh
        file: Feedback/StateVoteService.cs
      - name: FeedbackService
        description: Backs Help > Send Feedback - files a GitHub issue on the DevThrottle repository (optionally with a screenshot) via the GitHub REST client, so users can report feedback from inside the app (issue #568).
        file: Feedback/FeedbackService.cs
      - name: GitHubRestClient / IGitHubClient
        description: Minimal GitHub REST client (and its interface for testing) used to create issues and upload feedback assets without shelling out to the gh CLI.
        files:
          - Backends/GitHubRestClient.cs
          - Backends/IGitHubClient.cs
      - name: VoiceService
        description: End-to-end voice command pipeline - whole-audio batch transcription via the shared BatchTranscriptionPipeline using the Gateway-selected method (issue #587; no hardcoded whisper-1 endpoint), dictionary-only correction (no free-text Wingman cleanup in the transcription path), intent parse, and execution against SessionManager
        file: Voice/VoiceService.cs
      - name: BatchTranscriptionPipeline
        description: The ONE shared batch transcription entry point every surface calls (issue #587, gap G1/G4/G5) - takes a complete (already-gated) audio blob plus the resolved method, runs ONE whole-audio batch /audio/transcriptions request to the resolved base URL with the resolved key/model, then applies ONLY the validated dictionary corrector (model proposes find/replace, deterministic engine validates/applies). No streaming/partial path and no free-text language-model cleanup; reports exactly which dictionary terms changed and returns byte-identical text when none match
        file: Transcription/BatchTranscriptionPipeline.cs
      - name: VoiceUtteranceService
        description: Resumable phone voice upload - SHA256-checked chunked parts, gated on complete (issue #586) so an empty capture fails loud and a missing/zero-byte segment returns "incomplete" naming the indices (no partial transcription); a complete set is reassembled, transcribed once, cleaned, logged, then deleted (transient)
        file: Voice/VoiceUtteranceService.cs
      - name: VoiceTurnLog
        description: Disk-backed 5-day log pairing each voice turn's audio, inbound (raw/cleaned transcript) and outbound (agent vs spoken reply) for fidelity review
        file: Voice/VoiceTurnLog.cs
      - name: ClaudeSummarizer
        description: IResponseSummarizer implementation that summarizes agent responses (fidelity over brevity) and long-turn progress via Haiku
        file: Voice/Services/ClaudeSummarizer.cs
      - name: SessionType
        description: Immutable per-session playbook (Implement / Discuss / BugReport) set at creation and enforced via a pre-prompt gate; drives type badges and type-aware mission clauses (issue #211)
        file: Sessions/SessionType.cs
      - name: SessionGroupDefinition / GroupReorder
        description: Group-session model (issue #225) - a SessionGroupDefinition ties sessions into an ordered group with per-member Role (e.g. Submitter -> Implement -> QA); GroupReorder.MoveBlock moves a whole group as one unit and never splits it during drag reorder
        files:
          - Sessions/SessionGroupDefinition.cs
          - Sessions/GroupReorder.cs
      - name: AboutInfo
        description: Assembles the About/diagnostics payload (version, build, URLs, installed components) shared by the Director About dialog and the Cockpit /about page
        file: Diagnostics/AboutInfo.cs
      - name: DevThrottleAccountService
        description: The DevThrottle account credential and authentication service (issue #583) - the foundation for log-in-once-online-then-run-offline. Receives the access-plus-refresh token pair from the login-completion flow, stores it in the operating system credential store (encrypted at rest via the IProtectedTokenStore binding), answers "is this install logged in?" locally with NO network call (JwtAccessTokenValidator signature + expiry only), renews the access token in the background using the refresh token when online (ITokenRefresher), keeps running on the cached credential when offline, and clears the credential on logout. Records a logged-in event on first store and a logout event on clear via AuthEventLog (the always-on authentication floor; richer telemetry is #582). Distinct from ClaudeAccountStore (the Claude sign-in account at accounts.json, a different concern). The single foundation the startup gate (#580), first-run login (#581), and account area (#582) build on.
        files:
          - Account/DevThrottleAccountService.cs
          - Account/DevThrottleTokens.cs
          - Account/IProtectedTokenStore.cs
          - Account/JwtAccessTokenValidator.cs
          - Account/AuthEventLog.cs
          - Account/ITokenRefresher.cs
      - name: AccountGatePolicy
        description: The startup gate policy (issue #580). Consumes the DevThrottleAccountService offline logged-in check (issue #583) and decides whether the Director may reach a usable main window (Start) or must block and route the user to log in (Block); the decision is a fast local check with no network call. Owns the rule that, once started, the online session validation/refresh runs in the background without blocking the main window (StartBackgroundValidation). BackendUnavailableTokenRefresher is the ITokenRefresher wired in until the live backend sign-in exists (it reports the refresh unavailable, so the Director keeps running on the cached credential exactly as it does offline). DevThrottleAccountFactory builds the service for the running Director, resolving the signing secret from the DEVTHROTTLE_JWT_SIGNING_SECRET environment variable and honoring a documented test-credential seam (DEVTHROTTLE_TEST_SEED_TOKEN) so the gate is provable before the backend exists.
        files:
          - Account/AccountGatePolicy.cs
          - Account/GateDecision.cs
          - Account/BackendUnavailableTokenRefresher.cs
          - Account/DevThrottleAccountFactory.cs
      - name: FirstRunLoginCoordinator / LoopbackLoginListener
        description: The first-run login hand-off (issue #581) that the startup gate (#580) invokes when no credential exists. FirstRunLoginCoordinator opens the user's system browser (BrowserLauncher.OpenSystemDefault) at the DevThrottle sign-in address (DEVTHROTTLE_SIGNIN_URL env seam, default https://devthrottle.com/signin), carrying a loopback callback as the redirect_uri, then awaits the credential and stores it through DevThrottleAccountService (#583), returning a user-safe FirstRunLoginResult (no throw on expected failure/cancel). LoopbackLoginListener binds an HttpListener on 127.0.0.1 only (an OS-assigned ephemeral port - the loopback trust boundary in security rule DT-07), serves one callback path, and captures the access-plus-refresh token pair the sign-in completion hands back as query parameters (failing loud on a half-credential; token values never logged, security rule DT-05). The live sign-in page and token hand-back are the internal-repository backend (flagged dependency); until then the same callback is exercised by a local stand-in completion that posts a test-issued token, so the capture is provable in this repository.
        files:
          - Account/FirstRunLoginCoordinator.cs
          - Account/LoopbackLoginListener.cs

