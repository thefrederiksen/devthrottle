        file: Jobs/ProcessJob.cs

  - id: vosk_stt
    name: Vosk Speech-to-Text
    technology: C# / Vosk
    description: Offline speech-to-text service using Vosk library
    project: CcDirector.VoskStt
    dependencies:
      - CcDirector.Core
    components:
      - name: VoskSttService
        description: Speech recognition service using Vosk for offline transcription
        file: VoskSttService.cs
      - name: CustomDictionary
        description: Custom vocabulary configuration for improved recognition
        file: CustomDictionary.cs

  - id: control_api
    name: Director Control API
    technology: C# / ASP.NET Core / Kestrel
    description: Per-Director HTTP/WebSocket control surface. Binds loopback-only (127.0.0.1, stable port in 7879..7898) and is reached remotely only through Tailscale Serve. Exposes session control, terminal buffer reads, wingman, recap/turn summaries, voice/dictation, manager chat, and serves the HTML session/manager UI.
    project: CcDirector.ControlApi
    dependencies:
      - CcDirector.Core
      - CcDirector.Gateway.Contracts
    components:
      - name: ControlApiHost
        description: Kestrel host lifecycle - loopback bind, port allocation, optional auth, and Gateway registration
        file: ControlApiHost.cs
      - name: ControlEndpoints
        description: Maps the full Director REST surface (50+ routes) and HTML pages. Includes the screenshots gallery (GET /screenshots, GET/DELETE /screenshots/file - path-traversal-safe, browser-direct image serving) and the Cockpit new-session parity endpoints (DELETE /repos, GET /coaching/categories, /claude-sessions, /handovers (+content), /fs/list).
        file: ControlEndpoints.cs
      - name: DirectorAuth
        description: Optional bearer-token / cookie middleware; token read from the shared per-machine gateway-token.txt; whitelists /healthz, /login, /logout
        file: DirectorAuth.cs
      - name: GatewayClient
        description: Client for Director->Gateway register/heartbeat/unregister with exponential backoff (no-op if no gateway configured)
        file: GatewayClient.cs
      - name: DictationEndpoint
        description: WebSocket handler for /dictate streaming speech-to-text via the OpenAI Realtime API
        file: DictationEndpoint.cs
      - name: ProactiveExplainService
        description: Background Opus briefing generator that caches a session explanation on turn-end for instant mobile/voice retrieval
        file: ProactiveExplainService.cs
      - name: WingmanContextBuilder
        description: Assembles session history, turn summaries and buffer tail into context for the wingman /ask endpoint
        file: WingmanContextBuilder.cs
      - name: ChatService
        description: Manager-chat relay - sends user text to the configured session, waits for the agent turn, returns the reply (with optional TTS summary)
        file: Chat/ChatService.cs
      - name: PortAllocator / SingleInstanceGuard / InstanceRegistration / DirectorIdStore
        description: Stable per-Director port allocation, single-instance guarding, and instances/{id}.json registration + stable Director ID persistence
        files:
          - PortAllocator.cs
          - SingleInstanceGuard.cs
          - InstanceRegistration.cs
          - DirectorIdStore.cs
      - name: HandoverArchive
        description: Archives session handover context to the vault on /handover
        file: HandoverArchive.cs
      - name: SessionUsageEndpoint
        description: GET /sessions/{sid}/usage - token usage computed mechanically from the session's Claude JSONL transcript (session totals, current context size, per-turn deltas)
        file: SessionUsageEndpoint.cs
      - name: ClaudeTranscriptsEndpoint
        description: GET /claude-transcripts?repo= - the repo's transcript files (claude session ids + last-write times, newest first) read directly from the claude projects directory; the deterministic relink source for external brain drivers (sessions-index.json lags)
        file: ClaudeTranscriptsEndpoint.cs
      - name: Driver action endpoints
        description: POST /sessions/{sid}/interrupt + /escape (re-plumbed through the session's agent driver; 409 when the driver declares the verb unsupported, e.g. pi's interrupt), NEW /clear-context (driver clear + transcript re-discovery + automatic RelinkClaudeSession - closes the stale-relink-after-/clear gap), NEW /history-picker (claude's double-Esc Rewind); SessionDto.DriverCapabilities carries the per-session capability names for UIs
        file: ControlEndpoints.cs
      - name: Web UI assets
        description: Embedded HTML/JS served by the Control API (manager grid, per-session view, browser login, live dictation capture)
        files:
          - Web/manager.html
          - Web/session-view.html
          - Web/login.html
          - Web/dictate.html
          - Web/dictate-client.js
          - Web/dictate-worklet.js

  - id: gateway
    name: Tailnet Gateway
    technology: C# / ASP.NET Core / Kestrel
    description: One-per-machine HTTP host that aggregates all local Directors and publishes them over the tailnet. Discovers Directors (filesystem watch + HTTP register/heartbeat), proxies to their Control APIs, serves a dashboard, accepts phone recording/voice uploads, exposes a read-only comm-queue view, and manages dev slots. Bearer-or-cookie auth; TLS terminates at Tailscale Serve.
    project: CcDirector.Gateway
    dependencies:
      - CcDirector.Gateway.Contracts
      - CcDirector.Core
      - CcDirector.Setup.Engine
    components:
      - name: GatewayHost
        description: Kestrel host runner; wires the registry, Tailscale provisioner and Director client; one instance per machine
        file: GatewayHost.cs
      - name: GatewayEndpoints
        description: Main HTTP surface - Directors (register/heartbeat/doorbell/verify/registration for discovery + two-way handshake #223/#224 + push-down state #186), fleet-wide Sessions (aggregated with Gateway-owned assessed-state stamps), per-session turnbriefs history (#185), interrupted-sessions + /restore (#212), Recordings/Handovers/Fanout/Events, /about diagnostics, and GET /cockpit (unauthenticated) answering where this machine's Cockpit lives - the Tailscale front-door URL with a 500ms TCP liveness probe (null when Tailscale is down, never a loopback fallback)
        file: Api/GatewayEndpoints.cs
      - name: RecordingEndpoints
        description: Phone-recorder ingest - register, upload audio chunks, complete, transcribe, promote, status, and dictionary endpoints
        file: Api/RecordingEndpoints.cs
      - name: CommQueueEndpoints
        description: Read-only tailnet view of the local Communication Manager SQLite approval queue
        file: Api/CommQueueEndpoints.cs
      - name: ExesEndpoints
        description: Local machine exe/slot management - list Directors+sessions, delete/build/launch dev slots 1-4
        file: Api/ExesEndpoints.cs
      - name: DirectorRegistry
        description: In-memory registry of live Directors via dual ingress (instances/*.json watch + HTTP register/heartbeat) with a 60s stale timeout
        file: Discovery/DirectorRegistry.cs
      - name: DirectorEndpointClient
        description: HttpClient wrapper for each Director's Control API (prompts, sessions, kills, wingman asks, image upload, recap)
        file: Discovery/DirectorEndpointClient.cs
      - name: TailscaleServeProvisioner
        description: Keeps `tailscale serve` HTTPS mappings in sync with the live LOCAL fixed-range (7879-7898) Director set (443 -> gateway, per-Director ports); remote-machine and ephemeral-port (hosted-agent) Directors never get a mapping, and a 5-minute self-healing reconcile re-asserts the front door + missing live mappings and sweeps provisioner-shaped orphans on any port (issue #179)
        file: Tailscale/TailscaleServeProvisioner.cs
      - name: TailscaleIdentity
        description: Resolves this machine's Magic DNS name via `tailscale status --json`
        file: Tailscale/TailscaleIdentity.cs
      - name: GatewayAuth / AuthMiddleware
        description: Loads or generates a 32-byte URL-safe bearer token (persisted under config/director) and enforces bearer-or-cookie auth, whitelisting /healthz, /login, /logout
        files:
          - Util/GatewayAuth.cs
          - Util/AuthMiddleware.cs
      - name: KeyVault
        description: Fleet-wide central secret store (e.g. OPENAI_API_KEY) in a plain-JSON file outside git (%LOCALAPPDATA%\cc-director\config\keyvault.json), re-read on every request with atomic write-replace; the single source of truth Directors resolve at point of use instead of caching. Seeded once from the environment on Gateway start (SetIfAbsent - never clobbers).
        file: KeyVault.cs
      - name: VaultEndpoints
        description: REST surface over KeyVault (GET/PUT/DELETE /vault/keys/{name}, GET /vault/keys names-only) backing the Cockpit "API Keys" page; values leave the Gateway only via a single-key GET, never the list. Behind the host-wide auth middleware.
        file: Api/VaultEndpoints.cs
      - name: WorkListStore
        description: In-memory fleet-wide named work-list store (issue #273, child of #270). A named list is an ordered set of structured item refs { source, id, area? } plus a single-consumer claim; stores order + refs + claim ONLY (never item status). source github is runnable, devops/jira stored-only in v1; persistence across restart is OUT for v1.
        file: WorkListStore.cs
      - name: WorkListEndpoints
        description: REST surface over WorkListStore backing the queue-runner work lists (issue #273). POST/GET /lists, GET /lists/{name}, POST/PATCH /lists/{name}/items, DELETE /lists/{name}/items/{source}/{id}, POST/DELETE /lists/{name}/consumer (single-consumer claim, 409 on double-claim). Behind the host-wide auth middleware.
        file: Api/WorkListEndpoints.cs
      - name: WorkListRunner
        description: The thin Gateway queue runner (issue #274, child 3 of #270) - the heart of the autonomous work-item queue. Claims a named list's single-consumer claim (rides #273's 409), then drains it in GET /lists/{name} order ONE github item in flight at a time - for each source=github item it starts one implementation session on a Director seeded with /implementation-loop <id>, watches that session's transcript until it emits child 1's IMPL-LOOP-TERMINAL sentinel (#272), records the per-item signal (done/needs-human/failed), then advances; never re-drives a stuck item (retry is OUT v1). Source-gating rule v1 - non-github (devops/jira) refs are skipped (never started, left in the list). Releases the consumer claim when the list is drained. All orchestration lives here at the Gateway; the Director stays dumb.
        files:
          - Running/WorkListRunner.cs
          - Running/WorkListRunResult.cs
          - Running/IImplSessionDriver.cs
          - Running/DirectorImplSessionDriver.cs
          - Running/ImplLoopTerminalSignal.cs
      - name: WorkListRunnerManager
        description: Enforces the v1 same-machine single-drain guard (issue #274) - a machine has exactly one slot-5 test Director (one build output, one Control API port), so at most one list drains per machine at a time; a second concurrent drain on the same machine is refused. Cross-machine concurrency (different machine keys) is admitted - v1 parallelism is across machines only.
        file: Running/WorkListRunnerManager.cs
      - name: WorkListRunnerEndpoints
        description: The queue-runner REST surface (issue #274). POST /lists/{name}/run { directorId, repoPath, listConsumer?, machineKey? } resolves the target Director from the registry, applies the same-machine guard (409 if the machine is busy), then drains the list via WorkListRunner (409 if the list is already claimed) and returns the per-item timeline (source/id/outcome/signal/sessionId). Lives entirely at the Gateway - no runner logic in the Director host. Behind the host-wide auth middleware.
        file: Api/WorkListRunnerEndpoints.cs
      - name: SettingsEndpoints / GatewaySettingsHooks
        description: GET /gateway/settings snapshot (version, uptime, director count, brain state, Cockpit status, autostart), POST /gateway/brain/restart (warm-brain recovery), PUT /gateway/autostart; GatewaySettingsHooks is the optional IoC bridge the tray process injects so the library can report run-mode/autostart it cannot otherwise know (degrades to "unsupported" when null)
        files:
          - Api/SettingsEndpoints.cs
          - Api/GatewaySettingsHooks.cs
      - name: GatewayTurnBriefAgent
        description: The fleet's single warm-brain stamper - a coalescing work queue that, on each turn end, generates the TurnBrief (and on-demand ExplainReport, which outranks background stamping) via the TurnBriefContract prompt, validates mechanically, stores append-only, and degrades to an honest stub on failure; poisoned-brain detection restarts the brain after repeated validation rejections (issues #185/#187/#208/#217)
        file: Briefing/GatewayTurnBriefAgent.cs
      - name: GatewayTurnBriefStore
        description: Append-only per-session .jsonl store of turn briefs (with an in-memory latest-brief cache for cheap polling), the raw TurnPackages that produced them, explain reports, and #207 feedback votes (replayable labeled examples); readers de-dupe by TurnNumber, latest wins
        file: Briefing/GatewayTurnBriefStore.cs
      - name: TurnEndWatcher / SessionAssessments
        description: TurnEndWatcher fires the turn-end callback from push-fed observations (doorbell pings + heartbeat snapshots, with a 15s reconcile for non-pushing Directors, #186); SessionAssessments is the Gateway-owned activity judgment (WaitingForInput when the latest brief has NeedsYou, else Idle) that refutes a stale red dot
        files:
          - Briefing/TurnEndWatcher.cs
          - Briefing/SessionAssessments.cs
      - name: RestoreContextBuilder
        description: Builds a continuation first-prompt for a restored (interrupted) session from its durable turn-brief history - state at death, trajectory, and explicit marching orders that re-ask the user before resuming - backing the one-click Restore (issue #212)
        file: Recovery/RestoreContextBuilder.cs
      - name: CockpitProxy
        description: The one-URL front door (docs/plans/one-url-cockpit.md) - content-negotiated fallback proxy that forwards browser (text/html) requests to the loopback Cockpit and keeps /sessions|/directors|/cockpit dual-use (HTML page vs JSON API); serves an auto-refresh "Cockpit starting..." page during boot/crash/update
        file: Cockpit/CockpitProxy.cs
      - name: SessionWsProxyEndpoints
        description: Issues #268/#317 - reverse-proxies the per-session legs (live Terminal stream GET /sessions/{sid}/stream, dictation GET /sessions/{sid}/dictate, and the plain-HTTP screenshot bytes GET /sessions/{sid}/screenshots/file) to the owning Director via the shared YARP IHttpForwarder, so a remote Cockpit talks same-origin to the Gateway and never needs a Director's (possibly loopback) address; resolves the owning Director from the registry (404 unknown session, 503 offline/unreachable owning Director per the SessionOwnerCache)
        file: Api/SessionWsProxyEndpoints.cs

