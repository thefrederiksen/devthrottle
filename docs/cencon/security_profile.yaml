# CC Director Security Profile
# CenCon Method - Security scan rules and drift configuration
# Schema version: 1.0.0

schema_version: "1.0.0"
project:
  name: CC Director
  version: "0.6.18"

# Last verification date - used for drift detection
# Security profile is considered STALE if older than drift_threshold_days
last_verified: "2026-06-09"

# Drift configuration
drift:
  threshold_days: 30
  action_on_drift: FAIL_REVIEW

# OWASP Desktop Application Security Checks
# Based on OWASP Desktop Application Security Verification Standard
owasp_desktop:
  - id: DT-01
    name: Insecure Data Storage
    description: Check for sensitive data stored insecurely
    status: PASS
    checks:
      - No API keys in source code
      - Session state uses user documents folder (not world-readable)
      - Logs stored in %LOCALAPPDATA% (user-specific)
      - Central Key Vault file (keyvault.json) lives outside git and is never logged or committed
    mitigations:
      - Secrets resolved at point of use from the Gateway Key Vault or local Settings - never baked into source, never an env fallback
      - Key Vault REST (/vault/keys) is behind bearer/cookie auth; GET /vault/keys returns names only, values only via single-key GET
      - Logs truncate sensitive content to ~100 chars; secrets never logged
    notes:
      - "Accepted risk (by design): the Key Vault stores secrets in plaintext JSON with no at-rest encryption, relying on the single-owner machine + tailnet trust boundary - revisit if a non-owner ever shares the machine or tailnet"

  - id: DT-02
    name: Insufficient Input Validation
    description: Check for input validation on external data
    status: PASS
    checks:
      - All file paths validated before Process.Start
      - Pipe message JSON deserialized with schema validation
      - Git command output parsed, not executed
    mitigations:
      - Process arguments passed as arrays, not concatenated strings
      - No shell command construction from user input

  - id: DT-03
    name: Insecure Process Execution
    description: Check for command injection vulnerabilities
    status: PASS
    checks:
      - Process.Start uses argument arrays
      - No string concatenation for shell commands
      - Claude path validated before execution
    mitigations:
      - HookRelayScript uses fixed PowerShell template
      - No user-controlled command parameters

  - id: DT-04
    name: Insecure IPC
    description: Check for IPC security issues
    status: PASS
    checks:
      - Named pipes local-only (no network binding)
      - Pipe name is fixed (not user-controlled)
      - No sensitive data in pipe messages
    mitigations:
      - NamedPipeServerStream with local access only
      - PipeMessage validation before routing

  - id: DT-07
    name: HTTP Control + Gateway Surface
    description: Check the HTTP/WebSocket surfaces (per-Director Control API and per-machine Gateway)
    status: PASS
    checks:
      - Control API binds loopback only (127.0.0.1, port 7879..7898); never 0.0.0.0
      - Remote access only via Tailscale Serve (TLS terminated by Tailscale, forwarded to loopback); no plain-HTTP LAN/internet exposure
      - Bearer-token / cookie auth available, backed by a per-machine 32-byte random token (gateway-token.txt); /healthz, /login, /logout public
    mitigations:
      - Trust boundary is the single-owner tailnet by design (one node, the owner)
      - Process.Start callers (Tailscale, gh, cc-vault, dev-slot builds) use argument lists, not shell concatenation; dev-slot index validated to 1..4
    notes:
      - "By design: the /file endpoint serves absolute paths without a sandbox and relies on the tailnet trust boundary - revisit only if a non-owner ever joins the tailnet"
      - "Recording/voice IDs are GUID-validated and path-safed; chunks are SHA256-checked"
      - "Outbound cron run-complete webhook (issue #622): a per-job, owner-configured URL the Gateway POSTs the run summary to. EGRESS only (no new inbound surface), validated to http(s), passed as a typed HttpClient call (no shell/string concatenation), best-effort and isolated from the fire. The URL is set by the single owner per job - the same tailnet trust boundary applies; no SSRF mitigation beyond owner-trust in v1 (the owner already controls the machine)"

  - id: DT-05
    name: Information Disclosure
    description: Check for sensitive information leakage
    status: PASS
    checks:
      - Logs do not contain secrets
      - Error messages do not expose internal paths
      - Terminal buffer content not logged in full
    mitigations:
      - FileLog truncates large content
      - No stack traces in user-facing messages

  - id: DT-06
    name: Improper Error Handling
    description: Check for exception handling issues
    status: PASS
    checks:
      - No swallowed exceptions
      - Try-catch at entry points only
      - Specific exception types thrown
    mitigations:
      - CodingStyle.md enforces fail-fast pattern
      - All exceptions logged before rethrow

# SOC 2 Control Alignment
soc2_alignment:
  - id: CC6.1
    name: Logical Access Controls
    description: The entity implements logical access security software
    alignment: |
      - Application runs in user context (no elevation required)
      - Named pipes accessible only to local user
      - HTTP Control API binds loopback only; Gateway is reachable only over the owner's tailnet (Tailscale Serve), gated by a per-machine bearer token

  - id: CC6.6
    name: System Boundary Protection
    description: The entity implements controls to prevent unauthorized access
    alignment: |
      - Process isolation per Claude session
      - No plain-HTTP inbound exposure to the LAN/internet; remote ingress only via Tailscale Serve (TLS) to a single-owner tailnet
      - File system access limited to user directories

  - id: CC7.2
    name: Incident Response
    description: The entity responds to identified security incidents
    alignment: |
      - Comprehensive logging (FileLog)
      - Log files retained in %LOCALAPPDATA%
      - Session state persisted for recovery

# Custom security rules (grep patterns for code review)
custom_rules:
  - id: CCD-01
    name: No Hardcoded Credentials
    severity: BLOCKING
    pattern: "(password|apikey|secret|token)\\s*=\\s*[\"'][^\"']+[\"']"
    exclude_patterns:
      - "\\.(md|txt)$"
      - "test"
    description: Detect hardcoded credentials in source code

  - id: CCD-02
    name: No Null-Forgiving Operator
    severity: BLOCKING
    pattern: "!\\s*[;\\)]"
    file_types:
      - "*.cs"
    exclude_patterns:
      - "= null!"
    description: Null-forgiving operator (!) suppresses compiler warnings unsafely

  - id: CCD-03
    name: No Blocking Async
    severity: BLOCKING
    pattern: "\\.(Result|Wait)\\s*\\("
    file_types:
      - "*.cs"
    exclude_patterns:
      - "test"
      - "Task\\.Run\\(\\).Wait"
    description: Using .Result or .Wait() causes deadlocks in UI applications

  - id: CCD-04
    name: Logging in Public Methods
    severity: WARNING
    pattern: "public\\s+\\w+\\s+\\w+\\s*\\([^)]*\\)\\s*\\{(?![^}]*FileLog\\.Write)"
    file_types:
      - "*.cs"
    description: Public methods should log entry/exit

  - id: CCD-05
    name: PII in Paths
    severity: BLOCKING
    pattern: "C:\\\\Users\\\\[^\\\\\"]+\\\\"
    exclude_patterns:
      - "%USERPROFILE%"
      - "Environment.GetFolderPath"
    description: Hardcoded user paths expose PII

  - id: CCD-06
    name: Process Execution Validation
    severity: BLOCKING
    pattern: "Process\\.Start\\s*\\(\\s*[^)]*\\+"
    file_types:
      - "*.cs"
    description: Process paths should not use string concatenation

  - id: CCD-07
    name: Named Pipe Local Only
    severity: BLOCKING
    pattern: "NamedPipeServerStream.*PipeTransmissionMode\\.Message"
    file_types:
      - "*.cs"
    description: Named pipes must use PipeTransmissionMode.Message for security

# Security review checklist
review_checklist:
  - "No null! (null-forgiving operator) in new code"
  - "No .Result or .Wait() (deadlock risk)"
  - "No try-catch in helper methods"
  - "All public methods logged"
  - "No hardcoded credentials"
  - "No PII in source code"
  - "Process.Start paths validated"
  - "Named pipe messages validated"
  - "Secrets resolved via the central Key Vault or local Settings (never hardcoded, never an env fallback); keyvault.json stays outside git and out of logs"
