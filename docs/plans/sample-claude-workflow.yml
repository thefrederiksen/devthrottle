# Copy this to .github/workflows/claude.yml in the TARGET repo to enable
# cc-director GitHub (Remote) sessions (NewIssue / ExistingThread modes).
#
# One-time setup on the target repo:
#   1. Install the Claude GitHub App:  https://github.com/apps/claude
#   2. Auth (DEFAULT = subscription, cheaper than API rates):
#        a. Run `claude setup-token` in Claude Code (needs a Max subscription).
#           It mints a long-lived OAuth token tied to your plan.
#        b. Add it as repo secret CLAUDE_CODE_OAUTH_TOKEN (Settings > Secrets > Actions).
#      Runs then draw on your Claude subscription, NOT metered pay-as-you-go API billing.
#      (To use API billing instead, set ANTHROPIC_API_KEY and swap the `with:` line below.)
#   3. Commit this file. Pin the action version against current docs.
#
# After that, a cc-director "GitHub (Remote)" session that posts "@claude <task>"
# on an issue/PR will trigger this workflow on a GitHub-hosted runner.
#
# NOTE: subscription runs still consume your Max rate limits, and GitHub Actions
# minutes are billed either way (pennies next to model tokens).

name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when @claude is mentioned, to avoid burning minutes on every comment.
    if: >
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      # DEFAULT: subscription OAuth token (cheaper than API rates).
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # API-billing alternative (comment the line above, uncomment this):
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

