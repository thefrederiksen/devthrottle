# DevThrottle Feature Inventory
#
# This is the source-of-truth list of user-facing features in the cc-director
# desktop app (brand name DevThrottle). It is generated and maintained by the
# /document-features skill and consumed by:
#   - scripts/capture-feature-screenshots.ps1  (decides what to screenshot)
#   - docs/public/features/*.md                 (the published feature pages)
#   - .github/workflows/docs-drift.yml          (drift check vs. source)
#
# Each entry proves a feature exists by pointing at the source file(s) that
# implement it. "status" is decided from the code, NOT from intent:
#   implemented - the view/dialog exists and its commands are wired up
#   partial     - the surface exists but is framework-level / incomplete
#   planned     - referenced in code or docs but not yet built
#
# Editing rules:
#   - ids are lowercase-kebab-case and stable (used as screenshot stems)
#   - every "source" path is repo-relative and must exist on disk
#   - "screenshot" is the file under docs/public/features/assets/ ("" = none yet)
#   - keep this ASCII-only (no Unicode), per repo standards
#
# The desktop window title used by cc-click is "CC Director".

window_title: "CC Director"

categories:
  - id: main-window
    title: Main Window and Sessions
    page: docs/public/features/02-sessions-and-console.md
  - id: source-control
    title: Source Control and Repositories
    page: docs/public/features/03-source-control-and-repos.md
  - id: panels
    title: Built-in Panels (Home, Tools, Connections, Scheduler)
    page: docs/public/features/04-panels.md
  - id: voice-wingman
    title: Wingman and Voice
    page: docs/public/features/05-wingman-and-voice.md
  - id: mobile
    title: Mobile and In-Car (phone client)
    page: docs/public/features/06-mobile.md
  - id: dialogs
    title: Key Dialogs
    page: docs/public/features/07-dialogs.md

