<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a5276">
<title>CC Director - Manager Chat</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --panel-2: #2d2d2e;
    --border: #3c3c3c;
    --text: #dddddd;
    --muted: #888888;
    --accent: #0e639c;
    --accent-hover: #1177bb;
    --user-bg: #0e639c;
    --user-text: #ffffff;
    --agent-bg: #2a2a2c;
    --agent-text: #dddddd;
    --idle: #4ec9b0;
    --waiting: #dcdcaa;
    --working: #569cd6;
    --failed: #f44747;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 16px;
    height: 100%;
    overflow: hidden;
  }
  body { display: flex; flex-direction: column; }

  header {
    padding: 10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 14px;
    margin: 0;
    color: var(--text);
    letter-spacing: 0.5px;
    font-weight: 700;
    white-space: nowrap;
  }
  header .session-line {
    font-size: 12px;
    color: var(--muted);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  header .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    color: #1e1e1e;
    flex-shrink: 0;
  }
  header .badge.Idle           { background: var(--idle); }
  header .badge.Working        { background: var(--working); color: #fff; }
  header .badge.WaitingForInput{ background: var(--waiting); }
  header .badge.Failed, header .badge.Exited { background: var(--failed); color: #fff; }
  header .badge.Unknown        { background: var(--muted); color: #fff; }
  header a, header button.link {
    color: var(--accent);
    text-decoration: none;
    background: transparent;
    border: 0;
    font-size: 13px;
    cursor: pointer;
    padding: 8px 6px;
    border-radius: 6px;
    min-height: 44px;
    display: inline-flex; align-items: center;
  }
  header a:hover, header button.link:hover { background: rgba(14,99,156,0.15); }

  #chatBanner {
    background: rgba(244,71,71,0.16);
    color: #ffaaaa;
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 13px;
    display: none;
  }
  #chatBanner.show { display: block; }
  #chatBanner code { background: var(--bg); padding: 2px 6px; border-radius: 3px; font-family: "Cascadia Code", Consolas, monospace; }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .messages {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 760px;
    margin: 0 auto;
  }
  .msg {
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 16px;
  }
  .msg.user {
    background: var(--user-bg);
    color: var(--user-text);
    align-self: flex-end;
    max-width: min(90%, 600px);
    border-bottom-right-radius: 4px;
  }
  .msg.agent {
    background: var(--agent-bg);
    color: var(--agent-text);
    align-self: flex-start;
    max-width: min(95%, 720px);
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    background: transparent;
    color: var(--muted);
    align-self: center;
    font-size: 13px;
    font-style: italic;
  }
  .msg .ts {
    display: block;
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    margin-top: 4px;
  }
  .msg.user .ts { color: rgba(255,255,255,0.75); }
  .msg.agent .ts { color: var(--muted); }
  .msg.thinking {
    background: var(--agent-bg);
    color: var(--muted);
    align-self: flex-start;
    font-style: italic;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1.0; }
  }

  .composer {
    border-top: 1px solid var(--border);
    background: var(--panel);
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .composer textarea {
    width: 100%;
    min-height: 56px;
    max-height: 30vh;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 16px;
    resize: vertical;
    box-sizing: border-box;
  }
  .composer textarea:focus { outline: 2px solid var(--accent); outline-offset: 0; }
  .composer .row { display: flex; gap: 10px; align-items: center; }
  .composer .spacer { flex: 1; }
  .composer .hint { color: var(--muted); font-size: 12px; }
  .composer button {
    background: var(--accent);
    color: white;
    border: 0;
    padding: 0 22px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    min-height: 48px;
    min-width: 88px;
  }
  .composer button:hover:not(:disabled), .composer button:active:not(:disabled) { background: var(--accent-hover); }
  .composer button:disabled { opacity: 0.5; cursor: not-allowed; }

  @media (max-width: 520px) {
    header { padding: 8px 12px; padding-top: max(8px, env(safe-area-inset-top)); }
    header h1 { font-size: 13px; }
    main { padding: 10px; }
    .msg { font-size: 16px; padding: 10px 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>MANAGER</h1>
  <span class="session-line" id="sessionLine">Loading...</span>
  <span class="badge Unknown" id="sessionBadge">...</span>
  <a id="gatewayBtn" data-url="__GATEWAY_URL__" title="Gateway directory (all Directors)">Gateway</a>
  <a href="/cards" title="Legacy cards view">Cards</a>
  <a href="/logout" __LOGOUT_VISIBILITY__>Logout</a>
</header>
<script>
  // Gateway nav button: show only when this Director has a gateway.url configured.
  (function () {
    var g = document.getElementById('gatewayBtn');
    if (!g) return;
    var u = (g.dataset.url || '').trim();
    if (u) g.href = u; else g.style.display = 'none';
  })();
</script>

<div id="chatBanner"></div>

<main id="main">
  <div class="messages" id="messages"></div>
</main>

<form class="composer" id="composer" onsubmit="return false">
  <textarea id="input" placeholder="Type a message to the agent... (Ctrl+Enter to send)" autocomplete="off" autofocus></textarea>
  <div class="row">
    <span class="hint" id="hint">Ctrl+Enter (or Cmd+Enter) sends.</span>
    <span class="spacer"></span>
    <button id="sendBtn" type="submit">Send</button>
  </div>
</form>

<script>
(function () {
  const messagesEl   = document.getElementById('messages');
  const inputEl      = document.getElementById('input');
  const sendBtn      = document.getElementById('sendBtn');
  const sessionLine  = document.getElementById('sessionLine');
  const sessionBadge = document.getElementById('sessionBadge');
  const banner       = document.getElementById('chatBanner');
  const main         = document.getElementById('main');

  const STORAGE_KEY = 'cc-director-chat-history-v1';
  let sending = false;
  let chatStatus = null;

  // ---- Persistence: chat history lives in localStorage for v1. -----------------
  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      const list = JSON.parse(raw);
      return Array.isArray(list) ? list : [];
    } catch { return []; }
  }
  function saveHistory(list) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list.slice(-200))); } catch {}
  }
  let history = loadHistory();

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function renderMessage(m) {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    if (m.role === 'system') {
      div.innerHTML = escapeHtml(m.text);
    } else {
      const ts = m.ts ? new Date(m.ts).toLocaleTimeString() : '';
      div.innerHTML = escapeHtml(m.text) + (ts ? '<span class="ts">' + escapeHtml(ts) + '</span>' : '');
    }
    messagesEl.appendChild(div);
    return div;
  }

  function renderAll() {
    messagesEl.innerHTML = '';
    if (history.length === 0) {
      const greet = document.createElement('div');
      greet.className = 'msg system';
      greet.textContent = 'Manager chat. Phase 1: text only.  Type a message and the Manager will relay it to the configured agent.';
      messagesEl.appendChild(greet);
      return;
    }
    history.forEach(renderMessage);
    scrollToBottom();
  }

  function scrollToBottom() {
    requestAnimationFrame(() => { main.scrollTop = main.scrollHeight; });
  }

  function pushAndRender(msg) {
    history.push(msg);
    saveHistory(history);
    renderMessage(msg);
    scrollToBottom();
  }

  function showBanner(html) {
    banner.innerHTML = html;
    banner.classList.add('show');
  }
  function hideBanner() { banner.classList.remove('show'); }

  function setBadge(state) {
    const known = ['Idle', 'Working', 'WaitingForInput', 'WaitingForPerm', 'Starting', 'Exited', 'Failed'];
    const cls = known.includes(state) ? state : 'Unknown';
    sessionBadge.className = 'badge ' + cls;
    sessionBadge.textContent = state || 'Unknown';
  }

  async function loadStatus() {
    try {
      const r = await fetch('/chat/status', { credentials: 'same-origin' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const s = await r.json();
      chatStatus = s;
      if (s.available) {
        sessionLine.textContent = (s.sessionName || '(unnamed)') + '  -  ' + (s.repoPath || '');
        setBadge(s.activityState || 'Unknown');
        hideBanner();
        sendBtn.disabled = false;
        return;
      }
      sessionLine.textContent = 'No session configured';
      setBadge('Unknown');
      sendBtn.disabled = true;
      const repo = s.chatSessionRepoPath;
      if (repo) {
        showBanner('No live session matches <code>' + escapeHtml(repo) + '</code>. Start a session in the Director app first.');
      } else {
        showBanner('Set <code>Chat.SessionRepoPath</code> in appsettings.json (next to cc-director.exe) to point at the repo the Manager should relay to.');
      }
    } catch (e) {
      sessionLine.textContent = 'Status error';
      setBadge('Unknown');
      sendBtn.disabled = true;
      showBanner('Could not reach the Director: ' + escapeHtml(e.message));
    }
  }

  async function send() {
    if (sending) return;
    const text = inputEl.value.trim();
    if (!text) return;
    sending = true;
    sendBtn.disabled = true;

    pushAndRender({ role: 'user', text, ts: Date.now() });
    inputEl.value = '';

    // Inline "thinking" bubble that we replace when the reply arrives or fails.
    const thinking = document.createElement('div');
    thinking.className = 'msg thinking';
    thinking.textContent = 'Agent is thinking...';
    messagesEl.appendChild(thinking);
    scrollToBottom();

    try {
      const r = await fetch('/chat', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, timeoutMs: 120000 }),
      });
      const body = await r.json().catch(() => null);
      thinking.remove();
      if (!r.ok || !body) {
        const err = (body && body.error) || ('HTTP ' + r.status);
        pushAndRender({ role: 'system', text: 'Error: ' + err, ts: Date.now() });
        return;
      }
      const reply = (body.displayText || body.reply || '').trim();
      if (reply) {
        pushAndRender({ role: 'agent', text: reply, ts: Date.now() });
      } else {
        pushAndRender({ role: 'system', text: 'Agent finished but produced no visible output.', ts: Date.now() });
      }
      if (body.status === 'timeout') {
        pushAndRender({ role: 'system', text: 'Note: timed out waiting for the agent to finish; the reply above may be partial.', ts: Date.now() });
      }
      // Refresh badge after each reply so the user can see the state change.
      loadStatus();
    } catch (e) {
      thinking.remove();
      pushAndRender({ role: 'system', text: 'Network error: ' + e.message, ts: Date.now() });
    } finally {
      sending = false;
      sendBtn.disabled = chatStatus && !chatStatus.available;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', (e) => {
    // Ctrl+Enter / Cmd+Enter sends.  Mobile users tap Send; this keeps desktop fast.
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      send();
    }
  });

  renderAll();
  loadStatus();
  setInterval(loadStatus, 5000);
})();
</script>
</body>
</html>
