<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CC Director</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --border: #3c3c3c;
    --text: #dddddd;
    --muted: #888888;
    --accent: #0e639c;
    --accent-hover: #1177bb;
    --idle: #4ec9b0;
    --working: #569cd6;
    --waiting: #dcdcaa;
    --perm: #ce9178;
    --failed: #f44747;
    --starting: #9cdcfe;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  header {
    padding: 10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    font-size: 13px;
    margin: 0;
    color: var(--text);
    letter-spacing: 0.5px;
    font-weight: 700;
    flex-shrink: 0;
  }
  header .stats { color: var(--muted); font-size: 12px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  header .spacer { flex: 1; }
  header .info { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  header .info code { background: var(--bg); padding: 2px 6px; border-radius: 3px; color: var(--text); font-family: "Cascadia Code", Consolas, monospace; }
  header a {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    min-height: 44px;
    min-width: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
    border-radius: 6px;
  }
  header a:hover { background: rgba(14,99,156,0.15); }
  main {
    padding: 12px 14px;
    padding-bottom: calc(96px + env(safe-area-inset-bottom));
  }
  .sessions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    transition: background 0.08s, border-color 0.08s;
  }
  .card:hover, .card:active { background: #2d2d2e; border-color: #4a4a4a; }
  .card.state-Idle           { border-left: 4px solid var(--idle); }
  .card.state-Working        { border-left: 4px solid var(--working); }
  .card.state-WaitingForInput{ border-left: 4px solid var(--waiting); animation: pulse 1.6s ease-in-out infinite; }
  .card.state-WaitingForPerm { border-left: 4px solid var(--perm); animation: pulse 1.6s ease-in-out infinite; }
  .card.state-Starting       { border-left: 4px solid var(--starting); }
  .card.state-Exited, .card.state-Failed { border-left: 4px solid var(--failed); opacity: 0.7; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,220,170,0.0); }
    50%      { box-shadow: 0 0 0 4px rgba(220,220,170,0.18); }
  }
  .card .row { display: flex; align-items: center; gap: 8px; }
  .card .name { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .repopath { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .agent { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    color: #1e1e1e;
    flex-shrink: 0;
  }
  .badge.Idle           { background: var(--idle); }
  .badge.Working        { background: var(--working); }
  .badge.WaitingForInput{ background: var(--waiting); }
  .badge.WaitingForPerm { background: var(--perm); }
  .badge.Starting       { background: var(--starting); }
  .badge.Exited, .badge.Failed { background: var(--failed); }
  .meta { color: var(--muted); font-size: 12px; }
  .card input[type=checkbox] {
    width: 22px; height: 22px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .fanout {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(30,30,30,0.96);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 20;
  }
  .fanout textarea {
    width: 100%;
    min-height: 52px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 16px; /* >=16 so iOS Safari does not zoom on focus */
    resize: vertical;
    box-sizing: border-box;
  }
  .fanout .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .fanout button {
    background: var(--accent);
    color: white;
    border: 0;
    padding: 0 18px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
    min-height: 44px;
    min-width: 64px;
  }
  .fanout button:hover:not(:disabled) { background: var(--accent-hover); }
  .fanout button:disabled { opacity: 0.5; cursor: not-allowed; }
  .fanout label {
    color: var(--muted);
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    min-height: 44px;
  }
  .fanout label input[type=checkbox] { width: 22px; height: 22px; accent-color: var(--accent); }
  .fanout .selected-count { color: var(--text); font-weight: 600; }
  .fanout .summary { color: var(--muted); font-size: 13px; }

  .results {
    margin-top: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 12px;
    white-space: pre-wrap;
    max-height: 260px;
    overflow-y: auto;
  }
  .empty { color: var(--muted); text-align: center; padding: 32px; }

  /* ===== Voice mode ===== */
  .btn-voice {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--accent);
    padding: 0 14px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    min-height: 36px;
    flex-shrink: 0;
  }
  .btn-voice:hover, .btn-voice:active { background: rgba(14,99,156,0.18); }
  .btn-voice.active { background: var(--accent); color: white; }
  .btn-voice:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--border); color: var(--muted); }

  .voice-panel {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    background: rgba(30,30,30,0.97);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-top: 2px solid var(--accent);
    padding: 14px 16px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
    z-index: 30;
    display: none;
    flex-direction: column;
    gap: 10px;
    max-height: 60vh;
    overflow-y: auto;
    box-shadow: 0 -8px 24px rgba(0,0,0,0.4);
  }
  .voice-panel.open { display: flex; }
  .voice-panel .vp-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .voice-panel .vp-row .spacer { flex: 1; }
  .voice-panel h3 { margin: 0; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
  .voice-panel .vp-close {
    background: transparent;
    border: 0;
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 6px;
  }
  .voice-panel .vp-close:hover { background: var(--bg); color: var(--text); }

  .voice-mic-btn {
    background: var(--accent);
    color: white;
    border: 0;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
    min-height: 44px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .voice-mic-btn:hover { background: var(--accent-hover); }
  .voice-mic-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .voice-mic-btn.recording {
    background: var(--failed);
    animation: pulseMic 1.0s ease-in-out infinite;
  }
  @keyframes pulseMic {
    0%, 100% { box-shadow: 0 0 0 0 rgba(244,71,71,0.0); }
    50%      { box-shadow: 0 0 0 8px rgba(244,71,71,0.30); }
  }
  .voice-status { color: var(--muted); font-size: 12px; min-height: 16px; }
  .voice-status.error { color: var(--failed); }
  .voice-status.ok { color: var(--idle); }

  .voice-conversation {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 14px;
  }
  .voice-bubble { display: flex; gap: 10px; align-items: flex-start; }
  .voice-bubble .vb-tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    min-width: 64px;
    padding-top: 2px;
  }
  .voice-bubble .vb-text { flex: 1; line-height: 1.4; word-wrap: break-word; }
  .voice-bubble.user .vb-tag { color: var(--accent); }
  .voice-bubble.manager .vb-tag { color: var(--idle); }

  .voice-suggestions { display: flex; gap: 8px; flex-wrap: wrap; }
  .voice-suggestions button {
    background: #3c3c3c;
    color: var(--text);
    border: 0;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    min-height: 36px;
  }
  .voice-suggestions button:hover { background: #4a4a4a; }
  .voice-suggestions button.danger { background: #5d2424; }
  .voice-suggestions button.danger:hover { background: #7a3030; }

  .btn-new {
    background: var(--accent);
    color: white;
    border: 0;
    padding: 0 14px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    min-height: 36px;
    flex-shrink: 0;
  }
  .btn-new:hover, .btn-new:active { background: var(--accent-hover); }

  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 12px;
  }
  .modal-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .modal-close {
    background: transparent; border: 0; color: var(--muted);
    font-size: 28px; cursor: pointer;
    width: 44px; height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 8px;
    line-height: 1;
  }
  .modal-close:hover, .modal-close:active { background: var(--bg); color: var(--text); }
  .modal-panel label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
  .modal-panel input[type=text], .modal-panel select {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 16px; /* prevent iOS zoom on focus */
    box-sizing: border-box;
    min-height: 44px;
  }
  .modal-panel .row { display: flex; gap: 8px; }
  .modal-error {
    background: #4d1f1f;
    color: #ffaaaa;
    border: 1px solid #663030;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    margin-top: 8px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  .btn-primary {
    background: var(--accent); color: white; border: 0;
    padding: 0 18px; border-radius: 8px; cursor: pointer; font-weight: 600;
    font-size: 15px; min-height: 44px; min-width: 72px;
  }
  .btn-primary:hover:not(:disabled), .btn-primary:active:not(:disabled) { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: #3c3c3c; color: var(--text); border: 0;
    padding: 0 18px; border-radius: 8px; cursor: pointer;
    font-size: 15px; min-height: 44px; min-width: 72px;
  }
  .btn-secondary:hover, .btn-secondary:active { background: #4a4a4a; }

  .repo-list {
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    max-height: 240px;
    overflow-y: auto;
    margin-top: 4px;
  }
  .repo-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(14,99,156,0.4);
  }
  .repo-item:last-child { border-bottom: 0; }
  .repo-item:hover, .repo-item:active, .repo-item.selected {
    background: rgba(14,99,156,0.22);
  }
  .repo-item .name { font-weight: 600; }
  .repo-item .path { color: var(--muted); font-size: 11px; word-break: break-all; }
  .repo-item .when { color: var(--muted); font-size: 11px; float: right; }
  .repo-empty { padding: 16px; color: var(--muted); text-align: center; font-size: 12px; }
  .repo-custom {
    padding: 10px 12px;
    background: rgba(78,201,176,0.10);
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
  }
  .repo-custom .name { color: var(--idle); font-weight: 600; }

  /* ===== Detail view (ported from Gateway) ===== */
  .detail {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 920px;
    margin: 0 auto;
  }
  .detail .top-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .btn-back {
    background: #3c3c3c; color: var(--text); border: 0;
    padding: 0 14px; border-radius: 6px; cursor: pointer;
    font-size: 13px; min-height: 36px;
  }
  .btn-back:hover, .btn-back:active { background: #4a4a4a; }

  .detail .header-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .detail .header-panel.state-Idle           { border-left: 4px solid var(--idle); }
  .detail .header-panel.state-Working        { border-left: 4px solid var(--working); }
  .detail .header-panel.state-WaitingForInput{ border-left: 4px solid var(--waiting); }
  .detail .header-panel.state-WaitingForPerm { border-left: 4px solid var(--perm); }
  .detail .header-panel.state-Starting       { border-left: 4px solid var(--starting); }
  .detail .header-panel.state-Exited, .detail .header-panel.state-Failed { border-left: 4px solid var(--failed); }

  .name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .name-display { font-size: 20px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .name-edit { flex: 1; min-width: 0; }
  .name-edit input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 700;
    box-sizing: border-box;
    min-height: 40px;
  }
  .btn-icon {
    background: #3c3c3c; color: var(--text); border: 0;
    padding: 0 12px; border-radius: 6px; cursor: pointer;
    font-size: 12px; min-height: 36px;
  }
  .btn-icon:hover, .btn-icon:active { background: #4a4a4a; }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 18px;
    align-items: center;
    color: var(--muted);
    font-size: 12px;
  }
  .meta-row .repo-path { font-family: "Cascadia Code", Consolas, monospace; font-size: 11px; word-break: break-all; }
  .meta-row .agent-tag { text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; color: var(--text); }

  .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-row a, .action-row button {
    background: #3c3c3c; color: var(--text); border: 0;
    padding: 8px 14px; border-radius: 6px;
    font-size: 12px; text-decoration: none;
    min-height: 36px; cursor: pointer;
    display: inline-flex; align-items: center;
  }
  .action-row a:hover, .action-row a:active,
  .action-row button:hover, .action-row button:active { background: #4a4a4a; }

  .recap-panel, .send-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .recap-panel h2, .send-panel h2 {
    margin: 0 0 4px 0; font-size: 13px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;
  }
  .recap-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .recap-body { font-size: 14px; line-height: 1.5; }
  .recap-body h3 { font-size: 14px; margin: 12px 0 6px 0; color: var(--text); font-weight: 700; text-transform: none; letter-spacing: 0; }
  .recap-body h3:first-child { margin-top: 0; }
  .recap-body ul { margin: 4px 0 8px 0; padding-left: 22px; }
  .recap-body li { margin: 2px 0; }
  .recap-body p { margin: 6px 0; }
  .recap-empty { color: var(--muted); font-style: italic; font-size: 13px; }
  .recap-stale { color: var(--waiting); font-size: 11px; font-weight: 600; }

  .send-panel textarea {
    width: 100%;
    min-height: 80px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 16px;
    resize: vertical;
    box-sizing: border-box;
  }
  .send-panel .send-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .send-panel .send-row .spacer { flex: 1; }
  .send-panel button {
    background: var(--accent); color: white; border: 0;
    padding: 0 18px; border-radius: 8px; cursor: pointer;
    font-weight: 600; font-size: 15px; min-height: 44px; min-width: 80px;
  }
  .send-panel button:hover:not(:disabled), .send-panel button:active:not(:disabled) { background: var(--accent-hover); }
  .send-panel button:disabled { opacity: 0.5; cursor: not-allowed; }
  .send-feedback { color: var(--muted); font-size: 12px; min-height: 16px; }
  .send-feedback.error { color: var(--failed); }
  .send-feedback.ok { color: var(--idle); }

  @media (max-width: 520px) {
    header { padding: 8px 12px; padding-top: max(8px, env(safe-area-inset-top)); gap: 8px; }
    header h1 { font-size: 12px; flex: 0 0 auto; }
    header .info { display: none; }   /* director id + machine shown on the cards instead */
    header .stats {
      order: 99;
      flex-basis: 100%;
      margin-top: -2px;
      font-size: 11px;
    }
    .sessions { grid-template-columns: 1fr; gap: 8px; }
    .card { padding: 10px; }
    main {
      padding: 10px 12px;
      padding-bottom: calc(260px + env(safe-area-inset-bottom));
    }
    .name-display { font-size: 17px; }
  }
</style>
</head>
<body>
<header>
  <h1>CC DIRECTOR</h1>
  <span class="stats" id="stats">Loading...</span>
  <span class="spacer"></span>
  <span class="info">Director <code id="dirId">...</code> on <code id="machine">...</code></span>
  <button id="newSessionBtn" class="btn-new">+ New Session</button>
  <button id="voiceToggleBtn" class="btn-voice" disabled title="Voice mode (checking availability...)">Voice</button>
  <a href="/logout" __LOGOUT_VISIBILITY__>Logout</a>
</header>

<!-- Voice mode panel (hidden until enabled) -->
<div id="voicePanel" class="voice-panel" aria-live="polite">
  <div class="vp-row">
    <h3>Voice Mode</h3>
    <span class="spacer"></span>
    <button id="voiceClose" class="vp-close" title="Close voice mode">&times;</button>
  </div>
  <div class="vp-row">
    <button id="voiceMicBtn" class="voice-mic-btn">Hold space or this button to talk</button>
    <span id="voiceStatus" class="voice-status">Ready.</span>
  </div>
  <div id="voiceConversation" class="voice-conversation" style="display:none">
    <div id="voiceUserBubble" class="voice-bubble user" style="display:none">
      <div class="vb-tag">You</div>
      <div class="vb-text" id="voiceUserText"></div>
    </div>
    <div id="voiceManagerBubble" class="voice-bubble manager" style="display:none">
      <div class="vb-tag">Director</div>
      <div class="vb-text" id="voiceManagerText"></div>
    </div>
    <div id="voiceSuggestions" class="voice-suggestions"></div>
  </div>
</div>

<!-- New Session modal -->
<div id="newSessionModal" class="modal" style="display:none">
  <div class="modal-panel">
    <div class="modal-header">
      <strong>New Session</strong>
      <button class="modal-close" id="newSessionClose">&times;</button>
    </div>

    <label for="repoSearch">Repository</label>
    <input type="text" id="repoSearch" placeholder="Search or paste an absolute path..." autocomplete="off" autocapitalize="off" autocorrect="off" />

    <div id="repoList" class="repo-list">
      <div class="repo-empty">Loading repos...</div>
    </div>

    <label for="agentSelect">Agent</label>
    <select id="agentSelect">
      <option value="ClaudeCode" selected>Claude Code</option>
      <option value="Pi">Pi</option>
      <option value="Codex">Codex</option>
      <option value="Gemini">Gemini</option>
      <option value="OpenCode">OpenCode</option>
    </select>

    <div class="modal-error" id="newSessionError" style="display:none"></div>

    <div class="modal-actions">
      <button id="newSessionCancel" class="btn-secondary">Cancel</button>
      <button id="newSessionCreate" class="btn-primary">Start</button>
    </div>
  </div>
</div>

<main>
  <!-- List mode -->
  <div id="listMode">
  <div id="sessions" class="sessions"></div>
  <div id="empty" class="empty" style="display:none">No sessions yet. Start one in the Director app.</div>

  <div class="fanout">
    <div>
      <strong>Fan-out</strong> to <span id="selectedCount" class="selected-count">0</span> selected session(s):
    </div>
    <textarea id="prompt" placeholder="Type a prompt to send to every checked session..."></textarea>
    <div class="controls">
      <label><input type="checkbox" id="waitForIdle" checked> Wait for idle</label>
      <span class="spacer" style="flex:1"></span>
      <button id="sendBtn">Send</button>
    </div>
    <div id="results" class="results" style="display:none"></div>
  </div>
  </div><!-- /listMode -->
</main>

<script>
(function () {
  const sessionsEl = document.getElementById('sessions');
  const emptyEl = document.getElementById('empty');
  const statsEl = document.getElementById('stats');
  const dirIdEl = document.getElementById('dirId');
  const machineEl = document.getElementById('machine');
  const selectedCountEl = document.getElementById('selectedCount');
  const promptEl = document.getElementById('prompt');
  const waitForIdleEl = document.getElementById('waitForIdle');
  const sendBtn = document.getElementById('sendBtn');
  const resultsEl = document.getElementById('results');

  const selected = new Set();
  let cards = new Map();

  function fmtElapsed(iso) {
    if (!iso) return '';
    const t = new Date(iso).getTime();
    const s = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s/60) + 'm';
    return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
  }

  function displayName(s) {
    if (s && s.name && s.name.trim()) return s.name.trim();
    return repoName(s ? s.repoPath : '') || (s && s.sessionId ? s.sessionId.slice(0,8) : '');
  }

  function renderCard(s) {
    let card = cards.get(s.sessionId);
    if (!card) {
      card = document.createElement('div');
      card.className = 'card';
      card.dataset.sid = s.sessionId;
      card.innerHTML = `
        <div class="row">
          <input type="checkbox" class="sel" title="Select for fan-out" />
          <span class="name"></span>
          <span class="badge"></span>
        </div>
        <div class="row meta">
          <span class="agent"></span>
          <span class="spacer" style="flex:1"></span>
          <span class="elapsed"></span>
        </div>
        <div class="repopath"></div>
      `;
      const cb = card.querySelector('.sel');
      cb.addEventListener('change', () => {
        if (cb.checked) selected.add(s.sessionId); else selected.delete(s.sessionId);
        updateSelectedCount();
      });
      // Clicking the checkbox toggles fan-out selection; clicking anywhere else
      // opens the session view directly (no intermediate detail page).
      card.addEventListener('click', (e) => {
        if (e.target.closest('.sel')) return;
        window.location.href = '/sessions/' + s.sessionId + '/view';
      });
      sessionsEl.appendChild(card);
      cards.set(s.sessionId, card);
    }
    card.className = 'card state-' + (s.activityState || 'Unknown');
    card.querySelector('.name').textContent = displayName(s);
    const repopath = card.querySelector('.repopath');
    repopath.textContent = s.repoPath || '';
    repopath.title = s.repoPath || '';
    const badge = card.querySelector('.badge');
    badge.textContent = s.activityState;
    badge.className = 'badge ' + s.activityState;
    card.querySelector('.agent').textContent = s.agent;
    card.querySelector('.elapsed').textContent = 'started ' + fmtElapsed(s.createdAt) + ' ago';
    if (selected.has(s.sessionId)) card.querySelector('.sel').checked = true;
  }

  function repoName(p) {
    if (!p) return '';
    const parts = p.replace(/\\$/, '').replace(/\/$/, '').split(/[\\/]/);
    return parts[parts.length-1];
  }

  function updateSelectedCount() {
    selectedCountEl.textContent = selected.size;
    sendBtn.disabled = selected.size === 0 || !promptEl.value.trim();
  }
  promptEl.addEventListener('input', updateSelectedCount);

  async function refresh() {
    try {
      const r = await fetch('/sessions', { credentials: 'same-origin' });
      if (!r.ok) {
        statsEl.textContent = 'Refresh failed: HTTP ' + r.status;
        return;
      }
      const list = await r.json();
      // Drop cards for gone sessions
      const seen = new Set(list.map(s => s.sessionId));
      for (const [sid, card] of cards) {
        if (!seen.has(sid)) { card.remove(); cards.delete(sid); selected.delete(sid); }
      }
      list.forEach(renderCard);
      emptyEl.style.display = list.length === 0 ? '' : 'none';
      const idle = list.filter(s => s.activityState === 'Idle').length;
      const working = list.filter(s => s.activityState === 'Working').length;
      const waiting = list.filter(s => s.activityState === 'WaitingForInput' || s.activityState === 'WaitingForPerm').length;
      statsEl.textContent = list.length + ' sessions (' + idle + ' idle, ' + working + ' working, ' + waiting + ' waiting)';
      updateSelectedCount();
    } catch (e) {
      statsEl.textContent = 'Refresh error: ' + e.message;
    }
  }

  async function loadHealth() {
    try {
      const r = await fetch('/healthz');
      const h = await r.json();
      dirIdEl.textContent = h.directorId ? h.directorId.slice(0,8) : 'unknown';
      machineEl.textContent = h.machineName || 'localhost';
    } catch {
      dirIdEl.textContent = '?';
      machineEl.textContent = '?';
    }
  }

  sendBtn.addEventListener('click', async () => {
    const sessionIds = Array.from(selected);
    if (sessionIds.length === 0 || !promptEl.value.trim()) return;
    sendBtn.disabled = true;
    resultsEl.style.display = '';
    resultsEl.textContent = 'Sending to ' + sessionIds.length + ' session(s)...';
    try {
      const r = await fetch('/fanout-local', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionIds,
          text: promptEl.value,
          waitForIdle: waitForIdleEl.checked,
          timeoutMs: 300000,
        })
      });
      if (!r.ok) {
        resultsEl.textContent = 'Gateway returned ' + r.status + ': ' + await r.text();
        return;
      }
      const fan = await r.json();
      const elapsed = (new Date(fan.finishedAt) - new Date(fan.startedAt)) / 1000;
      let txt = 'Fan-out complete in ' + elapsed.toFixed(1) + 's.\n\n';
      for (const result of fan.results) {
        const sid = result.sessionId.slice(0,8);
        txt += '---- ' + sid + ' [' + result.status + '] (' + result.elapsedMs + 'ms) ----\n';
        if (result.error) txt += 'ERROR: ' + result.error + '\n';
        if (result.output) txt += result.output + '\n';
        txt += '\n';
      }
      resultsEl.textContent = txt;
    } catch (e) {
      resultsEl.textContent = 'Send failed: ' + e.message;
    } finally {
      sendBtn.disabled = false;
    }
  });

  // ====== New Session modal ======
  const newSessionBtn = document.getElementById('newSessionBtn');
  const newSessionModal = document.getElementById('newSessionModal');
  const newSessionClose = document.getElementById('newSessionClose');
  const newSessionCancel = document.getElementById('newSessionCancel');
  const newSessionCreate = document.getElementById('newSessionCreate');
  const repoSearch = document.getElementById('repoSearch');
  const repoList = document.getElementById('repoList');
  const agentSelect = document.getElementById('agentSelect');
  const newSessionError = document.getElementById('newSessionError');

  let allRepos = [];
  let selectedRepo = null; // full repo object OR { path: <typed-path>, custom: true }

  function fmtElapsedShort(iso) {
    if (!iso) return '';
    const t = new Date(iso).getTime();
    if (!t || isNaN(t)) return '';
    const s = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
  }

  function looksLikeAbsolutePath(s) {
    if (!s) return false;
    // Windows drive letter or forward-slash root
    if (/^[a-zA-Z]:[\\/]/.test(s)) return true;
    if (s.startsWith('/') || s.startsWith('\\\\')) return true;
    return false;
  }

  function renderRepoList(query) {
    repoList.innerHTML = '';
    const q = (query || '').trim().toLowerCase();
    const matched = q
      ? allRepos.filter(r => r.name.toLowerCase().includes(q) || r.path.toLowerCase().includes(q))
      : allRepos.slice();

    // If user typed what looks like an absolute path that isn't in the registry, offer a "Use this path" row.
    if (q && looksLikeAbsolutePath(query) && !allRepos.some(r => r.path.toLowerCase() === query.toLowerCase())) {
      const custom = document.createElement('div');
      custom.className = 'repo-custom';
      custom.innerHTML = '<div class="name">Use this path</div><div class="path"></div>';
      custom.querySelector('.path').textContent = query;
      custom.addEventListener('click', () => selectRepo({ path: query, name: 'custom', custom: true }));
      repoList.appendChild(custom);
    }

    if (matched.length === 0 && !q) {
      repoList.innerHTML = '<div class="repo-empty">No registered repos. Type an absolute path above to use one anyway.</div>';
      return;
    }
    if (matched.length === 0) {
      const note = document.createElement('div');
      note.className = 'repo-empty';
      note.textContent = 'No matches.';
      repoList.appendChild(note);
      return;
    }

    matched.forEach(repo => {
      const item = document.createElement('div');
      item.className = 'repo-item';
      if (selectedRepo && selectedRepo.path === repo.path) item.classList.add('selected');
      const whenLabel = fmtElapsedShort(repo.lastUsed);
      item.innerHTML = '<span class="when"></span><div class="name"></div><div class="path"></div>';
      item.querySelector('.when').textContent = whenLabel;
      item.querySelector('.name').textContent = repo.name;
      item.querySelector('.path').textContent = repo.path;
      item.addEventListener('click', () => selectRepo(repo));
      repoList.appendChild(item);
    });
  }

  function selectRepo(repo) {
    selectedRepo = repo;
    repoSearch.value = repo.path;
    renderRepoList(repo.path);
  }

  async function loadRepos() {
    try {
      const r = await fetch('/repos', { credentials: 'same-origin' });
      if (!r.ok) { allRepos = []; renderRepoList(''); return; }
      allRepos = await r.json();
      renderRepoList('');
    } catch {
      allRepos = [];
      renderRepoList('');
    }
  }

  function openNewSession() {
    newSessionError.style.display = 'none';
    selectedRepo = null;
    repoSearch.value = '';
    newSessionModal.style.display = '';
    loadRepos();
    setTimeout(() => repoSearch.focus(), 50);
  }
  function closeNewSession() { newSessionModal.style.display = 'none'; }

  newSessionBtn.addEventListener('click', openNewSession);
  newSessionClose.addEventListener('click', closeNewSession);
  newSessionCancel.addEventListener('click', closeNewSession);
  repoSearch.addEventListener('input', () => {
    selectedRepo = null;
    renderRepoList(repoSearch.value);
  });
  // Enter on the search box submits the form if we have a path
  repoSearch.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      newSessionCreate.click();
    }
  });

  newSessionCreate.addEventListener('click', async () => {
    const path = (selectedRepo?.path || repoSearch.value || '').trim();
    if (!path) {
      newSessionError.textContent = 'Pick a repo from the list or type a path.';
      newSessionError.style.display = '';
      return;
    }
    newSessionCreate.disabled = true;
    newSessionError.style.display = 'none';
    try {
      const r = await fetch('/sessions', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repoPath: path, agent: agentSelect.value })
      });
      if (!r.ok) {
        let msg = 'HTTP ' + r.status;
        try { const body = await r.json(); if (body && body.error) msg = body.error; } catch {}
        newSessionError.textContent = msg;
        newSessionError.style.display = '';
        return;
      }
      closeNewSession();
      refresh();
    } catch (e) {
      newSessionError.textContent = e.message;
      newSessionError.style.display = '';
    } finally {
      newSessionCreate.disabled = false;
    }
  });

  // ====== Voice mode ======
  const voiceToggleBtn = document.getElementById('voiceToggleBtn');
  const voicePanel = document.getElementById('voicePanel');
  const voiceClose = document.getElementById('voiceClose');
  const voiceMicBtn = document.getElementById('voiceMicBtn');
  const voiceStatus = document.getElementById('voiceStatus');
  const voiceConversation = document.getElementById('voiceConversation');
  const voiceUserBubble = document.getElementById('voiceUserBubble');
  const voiceUserText = document.getElementById('voiceUserText');
  const voiceManagerBubble = document.getElementById('voiceManagerBubble');
  const voiceManagerText = document.getElementById('voiceManagerText');
  const voiceSuggestions = document.getElementById('voiceSuggestions');

  let voiceAvailable = false;
  let voiceMediaRecorder = null;
  let voiceRecordedChunks = [];
  let voiceRecordingStartedAt = 0;
  let voiceRecordingTimer = null;
  let voiceBusy = false;

  function setVoiceStatus(text, cls) {
    voiceStatus.textContent = text;
    voiceStatus.className = 'voice-status' + (cls ? ' ' + cls : '');
  }

  async function loadVoiceStatus() {
    try {
      const r = await fetch('/voice/status', { credentials: 'same-origin' });
      if (!r.ok) { voiceAvailable = false; return; }
      const j = await r.json();
      voiceAvailable = !!j.available;
    } catch { voiceAvailable = false; }

    if (voiceAvailable) {
      voiceToggleBtn.disabled = false;
      voiceToggleBtn.title = 'Toggle voice mode';
    } else {
      voiceToggleBtn.disabled = true;
      voiceToggleBtn.title = 'Voice mode disabled: set Voice.OpenAiKey in appsettings.json or OPENAI_API_KEY env var.';
    }
  }

  function openVoicePanel() {
    voicePanel.classList.add('open');
    voiceToggleBtn.classList.add('active');
    setVoiceStatus('Ready. Hold space or the mic button to talk.');
  }

  function closeVoicePanel() {
    voicePanel.classList.remove('open');
    voiceToggleBtn.classList.remove('active');
    stopRecording(true); // discard
  }

  voiceToggleBtn.addEventListener('click', () => {
    if (voicePanel.classList.contains('open')) {
      closeVoicePanel();
    } else {
      openVoicePanel();
    }
  });
  voiceClose.addEventListener('click', closeVoicePanel);

  async function startRecording() {
    if (voiceBusy) return;
    if (voiceMediaRecorder && voiceMediaRecorder.state === 'recording') return;

    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      setVoiceStatus('Microphone permission denied: ' + e.message, 'error');
      return;
    }

    voiceRecordedChunks = [];
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : '';
    try {
      voiceMediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    } catch (e) {
      setVoiceStatus('MediaRecorder not supported: ' + e.message, 'error');
      stream.getTracks().forEach(t => t.stop());
      return;
    }

    voiceMediaRecorder.ondataavailable = (ev) => {
      if (ev.data && ev.data.size > 0) voiceRecordedChunks.push(ev.data);
    };
    voiceMediaRecorder.onstop = () => {
      // Release the mic track
      stream.getTracks().forEach(t => t.stop());
    };

    voiceMediaRecorder.start();
    voiceMicBtn.classList.add('recording');
    voiceMicBtn.textContent = 'Release to send';
    voiceRecordingStartedAt = Date.now();
    setVoiceStatus('Recording 0.0s...');
    voiceRecordingTimer = setInterval(() => {
      const s = ((Date.now() - voiceRecordingStartedAt) / 1000).toFixed(1);
      setVoiceStatus('Recording ' + s + 's...');
    }, 100);
  }

  async function stopRecording(discard) {
    if (!voiceMediaRecorder) return;
    if (voiceRecordingTimer) { clearInterval(voiceRecordingTimer); voiceRecordingTimer = null; }
    voiceMicBtn.classList.remove('recording');
    voiceMicBtn.textContent = 'Hold space or this button to talk';

    const rec = voiceMediaRecorder;
    voiceMediaRecorder = null;
    if (rec.state !== 'inactive') {
      // Wait for the final dataavailable
      await new Promise(resolve => {
        rec.addEventListener('stop', resolve, { once: true });
        rec.stop();
      });
    }

    if (discard) { voiceRecordedChunks = []; return; }
    if (voiceRecordedChunks.length === 0) {
      setVoiceStatus('No audio captured.', 'error');
      return;
    }

    const blob = new Blob(voiceRecordedChunks, { type: rec.mimeType || 'audio/webm' });
    voiceRecordedChunks = [];

    if (blob.size < 1000) {
      setVoiceStatus('Too short. Hold longer next time.', 'error');
      return;
    }

    await uploadVoiceCommand(blob);
  }

  async function uploadVoiceCommand(blob) {
    voiceBusy = true;
    setVoiceStatus('Transcribing...');
    try {
      const fd = new FormData();
      const ext = (blob.type.includes('webm')) ? 'webm' : 'audio';
      fd.append('file', blob, 'recording.' + ext);
      const r = await fetch('/voice/command', {
        method: 'POST',
        credentials: 'same-origin',
        body: fd,
      });
      const body = await r.json();
      renderVoiceResponse(body);
      if (body.status === 'ok' || body.status === 'unknown_command') {
        setVoiceStatus('Ready.', 'ok');
      } else {
        setVoiceStatus(body.error || body.status || 'Failed.', 'error');
      }
    } catch (e) {
      setVoiceStatus('Send failed: ' + e.message, 'error');
    } finally {
      voiceBusy = false;
    }
  }

  function renderVoiceResponse(resp) {
    voiceConversation.style.display = '';
    voiceSuggestions.innerHTML = '';

    if (resp.transcript) {
      voiceUserText.textContent = resp.transcript;
      voiceUserBubble.style.display = '';
    } else {
      voiceUserBubble.style.display = 'none';
    }

    if (resp.replyText) {
      voiceManagerText.textContent = resp.replyText;
      voiceManagerBubble.style.display = '';
      // Speak the reply via the browser's built-in TTS (free, local, no extra API spend)
      try {
        const u = new SpeechSynthesisUtterance(resp.replyText);
        u.rate = 1.05;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
      } catch {}
    } else {
      voiceManagerBubble.style.display = 'none';
    }

    if (Array.isArray(resp.suggestions)) {
      for (const sug of resp.suggestions) {
        const btn = document.createElement('button');
        btn.textContent = sug.label;
        if (sug.kind === 'interrupt') btn.classList.add('danger');
        btn.addEventListener('click', () => runSuggestion(sug));
        voiceSuggestions.appendChild(btn);
      }
    }
  }

  async function runSuggestion(sug) {
    if (!sug || !sug.kind) return;
    try {
      if (sug.kind === 'open') {
        if (!sug.sessionId) return;
        // Open the per-session view in a new tab.
        window.open('/sessions/' + encodeURIComponent(sug.sessionId) + '/view', '_blank', 'noopener');
        return;
      }
      if (sug.kind === 'send') {
        if (!sug.sessionId || !sug.promptText) return;
        const r = await fetch('/sessions/' + sug.sessionId + '/prompt', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: sug.promptText, appendEnter: true, waitForIdle: false, timeoutMs: 60000 }),
        });
        setVoiceStatus(r.ok ? 'Sent.' : ('Send failed: ' + r.status), r.ok ? 'ok' : 'error');
        return;
      }
      if (sug.kind === 'interrupt') {
        if (!sug.sessionId) return;
        const r = await fetch('/sessions/' + sug.sessionId + '/interrupt', {
          method: 'POST', credentials: 'same-origin',
        });
        setVoiceStatus(r.ok ? 'Interrupt sent.' : ('Interrupt failed: ' + r.status), r.ok ? 'ok' : 'error');
        return;
      }
    } catch (e) {
      setVoiceStatus('Action failed: ' + e.message, 'error');
    }
  }

  // Push-to-talk on the mic button (mouse + touch)
  voiceMicBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startRecording(); });
  voiceMicBtn.addEventListener('mouseup',   (e) => { e.preventDefault(); stopRecording(false); });
  voiceMicBtn.addEventListener('mouseleave', () => { if (voiceMicBtn.classList.contains('recording')) stopRecording(false); });
  voiceMicBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); }, { passive: false });
  voiceMicBtn.addEventListener('touchend',   (e) => { e.preventDefault(); stopRecording(false); }, { passive: false });

  // Push-to-talk on spacebar (only when voice panel is open and focus isn't in a text field)
  window.addEventListener('keydown', (e) => {
    if (e.code !== 'Space') return;
    if (!voicePanel.classList.contains('open')) return;
    if (e.repeat) return;
    const t = e.target;
    const tag = t && t.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || (t && t.isContentEditable)) return;
    e.preventDefault();
    startRecording();
  });
  window.addEventListener('keyup', (e) => {
    if (e.code !== 'Space') return;
    if (!voicePanel.classList.contains('open')) return;
    if (!voiceMicBtn.classList.contains('recording')) return;
    e.preventDefault();
    stopRecording(false);
  });

  loadHealth();
  loadVoiceStatus();
  refresh();
  setInterval(refresh, 1500);
})();
</script>
</body>
</html>
