<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CC Director - Session __SID__</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --border: #3c3c3c;
    --text: #dddddd;
    --muted: #888888;
    --accent: #0e639c;
    --accent-hover: #1177bb;
    --idle: #4ec9b0;
    --working: #569cd6;
    --waiting: #dcdcaa;
    --perm: #ce9178;
    --failed: #f44747;
    --starting: #9cdcfe;
    /* Widget colors (match Avalonia CleanView) */
    --w-bash: #22c55e;
    --w-read: #3b82f6;
    --w-write: #d97706;
    --w-edit: #d97706;
    --w-grep: #a855f7;
    --w-glob: #a855f7;
    --w-todo: #06b6d4;
    --w-agent: #f43f5e;
    --w-skill: #0d9488;
    --w-text: #64748b;
    --w-thinking: #4b5563;
    --w-user: #094771;
    --w-generic: #3c3c3c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    position: sticky; top: 0; z-index: 10;
    padding-top: max(10px, env(safe-area-inset-top));
  }
  header a.back {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 44px; min-height: 44px;
    color: var(--accent);
    text-decoration: none;
    font-size: 16px;
    margin-left: -10px;  /* compensate for tap padding so it visually aligns left */
  }
  header a.back:hover { background: rgba(14,99,156,0.15); border-radius: 8px; }
  header .title {
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  header .title .sid {
    color: var(--muted);
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 11px;
    font-weight: 400;
    margin-left: 6px;
  }
  header .state {
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 12px;
    color: #1e1e1e;
    background: var(--muted);
    font-weight: 700;
    flex-shrink: 0;
  }
  header .counts {
    color: var(--muted);
    font-size: 11px;
    flex-shrink: 0;
  }

  .tabs {
    display: flex;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0;
    position: sticky;
    top: calc(44px + env(safe-area-inset-top));
    z-index: 9;
  }
  .tab {
    flex: 1;
    padding: 12px 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    border-bottom: 2px solid transparent;
    text-align: center;
    min-height: 44px;
    -webkit-tap-highlight-color: rgba(14,99,156,0.4);
    user-select: none;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }
  .tab:hover:not(.active) { color: var(--text); }
  @media (min-width: 720px) {
    .tab { flex: 0 0 auto; padding: 12px 20px; min-width: 140px; }
  }

  /* ===== AGENT VIEW ===== */
  #agentView {
    padding: 10px 12px;
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .empty-agent { color: var(--muted); text-align: center; padding: 40px 16px; font-size: 13px; }
  .empty-agent .hint { font-size: 11px; opacity: 0.8; margin-top: 6px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(14,99,156,0.15);
  }
  .card.tool { margin-left: 22px; }
  .card.user {
    background: var(--w-user);
    border-color: var(--w-user);
    cursor: default;
  }
  .card.text, .card.thinking { cursor: default; }
  .card.thinking { opacity: 0.78; }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    min-height: 24px;
  }
  .card-icon {
    width: 24px; height: 24px;
    border-radius: 5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 12px;
    color: #fff;
    font-weight: 700;
    flex-shrink: 0;
  }
  .card-title-block {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .card-title {
    font-weight: 600;
    color: #e0e0e0;
    font-size: 13px;
    line-height: 1.3;
  }
  .card-subheader {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-content {
    color: #cccccc;
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.45;
    padding-top: 4px;
    margin-top: 4px;
    border-top: 1px dashed var(--border);
  }
  .card.user .card-content,
  .card.text .card-content,
  .card.thinking .card-content {
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    border-top: 0;
    padding-top: 4px;
    margin-top: 0;
  }
  .card.user .card-content { color: #ffffff; }
  .card.user .card-title { color: #ffffff; }
  .card.bash .card-content { color: var(--w-bash); }
  .card-result {
    color: #aaaaaa;
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 11px;
    border-top: 1px dashed var(--border);
    margin-top: 6px;
    padding-top: 6px;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.4;
  }
  .card-result.error { color: #ef4444; }
  .card.collapsed .card-content,
  .card.collapsed .card-result { display: none; }
  .card .toggle {
    color: var(--muted);
    font-size: 14px;
    user-select: none;
    padding: 4px 8px;
    min-width: 32px;
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-right: -4px;  /* visual flush with card edge */
    flex-shrink: 0;
  }
  .card .toggle:hover { color: var(--text); }
  .pending-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--waiting); animation: pulse 1.4s ease-in-out infinite;
    flex-shrink: 0;
    margin-top: 8px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 1.0; }
  }

  /* Per-kind icon backgrounds */
  .icon-Bash       { background: var(--w-bash); }
  .icon-Read       { background: var(--w-read); }
  .icon-Write      { background: var(--w-write); }
  .icon-Edit       { background: var(--w-edit); }
  .icon-Grep       { background: var(--w-grep); }
  .icon-Glob       { background: var(--w-glob); }
  .icon-TodoWrite  { background: var(--w-todo); }
  .icon-Agent      { background: var(--w-agent); }
  .icon-Skill      { background: var(--w-skill); }
  .icon-Text       { background: var(--w-text); }
  .icon-Thinking   { background: var(--w-thinking); }
  .icon-UserMessage{ background: var(--w-user); }
  .icon-GenericTool{ background: var(--w-generic); }

  /* ===== RAW VIEW ===== */
  #rawView {
    padding: 10px 14px 96px;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 12px;
    color: #ddd;
  }

  /* ===== INPUT BAR ===== */
  form.send {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    z-index: 20;
  }
  form.send input[type=text] {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 16px;  /* >=16px so iOS Safari doesn't zoom on focus */
    min-height: 44px;
  }
  form.send button {
    background: var(--accent);
    color: white; border: 0;
    padding: 0 18px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
    min-height: 44px;
    min-width: 64px;
  }
  form.send button:disabled { opacity: 0.5; cursor: not-allowed; }

  @media (max-width: 520px) {
    header { padding: 8px 10px; padding-top: max(8px, env(safe-area-inset-top)); }
    header .title { font-size: 13px; }
    header .title .sid { display: none; }   /* full id is too long for narrow header; back+state badge still clear */
    header .counts { font-size: 10px; }
    .card.tool { margin-left: 14px; }
    .card { padding: 8px 10px; border-radius: 6px; }
    #agentView { padding: 8px 10px; padding-bottom: calc(80px + env(safe-area-inset-bottom)); gap: 5px; }
  }
</style>
</head>
<body>
<header>
  <a href="/" class="back" aria-label="Back to Manager">&larr;</a>
  <div class="title">
    Session<span class="sid" id="sidShort">__SHORT_SID__</span>
  </div>
  <span class="state" id="state">?</span>
  <span class="counts" id="counts"></span>
</header>

<div class="tabs">
  <div class="tab active" data-view="agent">Agent</div>
  <div class="tab" data-view="raw">Raw terminal</div>
</div>

<div id="agentView"></div>
<div id="rawView" style="display:none">Loading...</div>

<form class="send" onsubmit="return send(event)">
  <input type="text" id="prompt" placeholder="Send to session... (Enter to submit)" autocomplete="off" />
  <button type="submit" id="sendBtn">Send</button>
</form>

<script>
(function () {
  const SID = "__SID__";
  const agentEl = document.getElementById('agentView');
  const rawEl = document.getElementById('rawView');
  const stateEl = document.getElementById('state');
  const countsEl = document.getElementById('counts');
  const tabs = document.querySelectorAll('.tab');

  let activeView = 'agent';
  let rawCursor = 0;
  let rawFirstLoad = true;
  let lastWidgetCount = 0;

  function stateColor(s) {
    return ({
      Idle: '#4ec9b0', Working: '#569cd6', WaitingForInput: '#dcdcaa',
      WaitingForPerm: '#ce9178', Starting: '#9cdcfe',
      Exited: '#f44747', Failed: '#f44747'
    })[s] || '#888';
  }

  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.toggle('active', x === t));
    activeView = t.dataset.view;
    agentEl.style.display = activeView === 'agent' ? '' : 'none';
    rawEl.style.display = activeView === 'raw' ? '' : 'none';
    if (activeView === 'agent') refreshAgent();
    else refreshRaw();
  }));

  function escapeHtml(s) {
    if (s == null) return '';
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderWidget(w) {
    const isTool = !['Text','Thinking','UserMessage'].includes(w.kind);
    const classes = ['card'];
    if (isTool) classes.push('tool');
    if (w.kind === 'UserMessage') classes.push('user');
    if (w.kind === 'Text') classes.push('text');
    if (w.kind === 'Thinking') classes.push('thinking');
    if (w.kind === 'Bash') classes.push('bash');
    if (isTool && !w.isPending && !w.result) classes.push('collapsed');

    const iconText = ({
      Bash: '$', Read: 'R', Write: 'W', Edit: 'E',
      Grep: '?', Glob: '*', TodoWrite: '#',
      Agent: 'A', Skill: '/',
      Text: 'T', Thinking: '...', UserMessage: '>',
    })[w.kind] || '>';

    const card = document.createElement('div');
    card.className = classes.join(' ');
    card.dataset.toolUseId = w.toolUseId || '';

    const header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = `
      <div class="card-icon icon-${w.kind}">${escapeHtml(iconText)}</div>
      <div class="card-title-block">
        <div class="card-title">${escapeHtml(w.header)}</div>
        ${w.subheader ? `<div class="card-subheader" title="${escapeHtml(w.subheader)}">${escapeHtml(w.subheader)}</div>` : ''}
      </div>
      ${w.isPending ? '<div class="pending-dot" title="waiting for result"></div>' : ''}
      ${(w.content || w.result) ? '<span class="toggle">' + (classes.includes('collapsed') ? '+' : '−') + '</span>' : ''}
    `;
    card.appendChild(header);

    if (w.content) {
      const c = document.createElement('div');
      c.className = 'card-content';
      c.textContent = w.content;
      card.appendChild(c);
    }
    if (w.result) {
      const r = document.createElement('div');
      r.className = 'card-result' + (w.isError ? ' error' : '');
      r.textContent = w.result;
      card.appendChild(r);
    }

    // Toggle collapse on header click
    header.addEventListener('click', e => {
      if (e.target.closest('.toggle') || !(w.content || w.result)) {
        card.classList.toggle('collapsed');
      } else if (e.target.tagName !== 'A') {
        card.classList.toggle('collapsed');
      }
    });

    return card;
  }

  function renderEmpty(reason) {
    agentEl.innerHTML = '';
    const e = document.createElement('div');
    e.className = 'empty-agent';
    e.innerHTML = `<div>${escapeHtml(reason)}</div><div class="hint">Switch to "Raw terminal" tab to see exactly what Claude is writing.</div>`;
    agentEl.appendChild(e);
  }

  async function refreshAgent() {
    try {
      const r = await fetch('/sessions/' + SID + '/turns', { credentials: 'same-origin' });
      if (!r.ok) {
        renderEmpty('Failed to load (HTTP ' + r.status + ')');
        return;
      }
      const body = await r.json();
      if (body.status === 'no_session_id') {
        renderEmpty('Session not yet linked to a Claude session id. The first hook event will link it.');
        return;
      }
      if (body.status === 'no_jsonl') {
        renderEmpty('Waiting for the Claude session log to appear...');
        return;
      }
      if (body.status === 'parse_error') {
        renderEmpty('Parse error: ' + (body.error || 'unknown'));
        return;
      }
      const widgets = body.widgets || [];
      if (widgets.length === 0) {
        renderEmpty('No turns yet. Send a prompt below.');
        lastWidgetCount = 0;
        return;
      }

      // Re-render entirely (cheap for a few hundred widgets). Could diff later.
      const nearBottom = window.scrollY + window.innerHeight > document.body.scrollHeight - 80;
      agentEl.innerHTML = '';
      widgets.forEach(w => agentEl.appendChild(renderWidget(w)));
      countsEl.textContent = widgets.length + ' turn(s)';

      // Auto-scroll to bottom when new widgets appear
      if (widgets.length > lastWidgetCount && nearBottom) {
        window.scrollTo(0, document.body.scrollHeight);
      }
      lastWidgetCount = widgets.length;
    } catch (e) {
      renderEmpty('Error: ' + e.message);
    }
  }

  async function refreshRaw() {
    try {
      const r = await fetch('/sessions/' + SID + '/buffer?since=' + rawCursor, { credentials: 'same-origin' });
      if (!r.ok) { rawEl.textContent = 'Lost connection (HTTP ' + r.status + ')'; return; }
      const body = await r.json();
      if (rawFirstLoad) {
        rawEl.textContent = body.text || '';
        rawFirstLoad = false;
      } else if (body.text) {
        rawEl.textContent += body.text;
      }
      rawCursor = body.newCursor || rawCursor;
      const nearBottom = window.scrollY + window.innerHeight > document.body.scrollHeight - 80;
      if (nearBottom) window.scrollTo(0, document.body.scrollHeight);
    } catch (e) {
      rawEl.textContent += '\n[lost connection: ' + e.message + ']';
    }
  }

  async function refreshState() {
    try {
      const r = await fetch('/sessions/' + SID, { credentials: 'same-origin' });
      if (!r.ok) return;
      const dto = await r.json();
      stateEl.textContent = dto.activityState;
      stateEl.style.background = stateColor(dto.activityState);
    } catch {}
  }

  window.send = async function (e) {
    e.preventDefault();
    const inp = document.getElementById('prompt');
    const text = inp.value;
    if (!text.trim()) return false;
    inp.value = '';
    inp.disabled = true;
    try {
      await fetch('/sessions/' + SID + '/prompt', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, appendEnter: true, waitForIdle: false }),
      });
    } finally {
      inp.disabled = false;
      inp.focus();
    }
    return false;
  };

  // Initial + recurring refresh
  refreshState();
  refreshAgent();
  setInterval(() => {
    refreshState();
    if (activeView === 'agent') refreshAgent();
    else refreshRaw();
  }, 1500);
})();
</script>
</body>
</html>
