<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CC Director - Directory</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --panel-2: #2d2d2e;
    --border: #3c3c3c;
    --text: #dddddd;
    --muted: #888888;
    --muted-2: #6a6a6a;
    --accent: #0e639c;
    --accent-hover: #1177bb;
    --red: #ef4444;     /* vivid red - "needs you" */
    --yellow: #eab308;  /* vivid amber - "warning" */
    --green: #22c55e;   /* vivid green - "ready" */
    --blue: #3b82f6;    /* vivid blue - "working" (distinct hue from green) */
    --orange: #ce9178;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  a { color: inherit; }

  header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--panel);
    position: sticky; top: 0; z-index: 10;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 14px;
    margin: 0;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  header .stats { color: var(--muted); font-size: 12px; }
  header .stats .red { color: var(--red); }
  header .stats .yellow { color: var(--yellow); }
  header .spacer { flex: 1; }
  header .view-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  header .view-toggle button {
    background: var(--panel);
    color: var(--muted);
    border: 0;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  header .view-toggle button.active { background: var(--accent); color: white; }
  header a.link {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 6px;
  }
  header a.link:hover { background: rgba(14,99,156,0.15); }

  main { padding: 16px 14px 40px; max-width: 1400px; margin: 0 auto; }

  .error {
    margin: 0 0 14px 0;
    padding: 10px 12px;
    background: rgba(244,71,71,0.10);
    border: 1px solid rgba(244,71,71,0.4);
    border-radius: 6px;
    color: var(--red);
    font-size: 13px;
  }

  .empty {
    margin-top: 40px;
    padding: 28px;
    text-align: center;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: 8px;
  }
  .empty code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 3px;
    color: var(--text);
    font-family: "Cascadia Code", Consolas, monospace;
  }

  .machine-group { margin-bottom: 24px; }
  .machine-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 4px 8px 4px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .machine-header .name { color: var(--text); font-weight: 700; font-size: 13px; }
  .machine-header .user { color: var(--muted-2); }
  .machine-header .count { color: var(--muted-2); }
  .machine-header .unreachable {
    color: var(--red);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 600;
  }

  /* Card view */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 120ms;
  }
  .card:hover { border-color: var(--muted-2); }
  .card .head { display: flex; align-items: center; gap: 10px; }
  .card .dot {
    flex-shrink: 0;
    width: 18px; height: 18px;
    border-radius: 50%;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  }
  .card .dot.red { background: var(--red); }
  .card .dot.yellow { background: var(--yellow); }
  .card .dot.green { background: var(--green); }
  .card .dot.blue { background: var(--blue); }
  .card .dot.unknown { background: var(--muted-2); }
  .card .dot { cursor: help; }
  .card .title {
    font-weight: 600;
    font-size: 14px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card .title.unnamed { color: var(--muted); font-style: italic; font-weight: 500; }
  .card .agent-pill {
    flex-shrink: 0;
    background: var(--panel-2);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .card .repo {
    color: var(--muted);
    font-size: 12px;
    font-family: "Cascadia Code", Consolas, monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card .state-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .card .state { color: var(--text); }
  .card .idle { color: var(--muted-2); }
  .card .open-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 2px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    transition: background 120ms;
  }
  .card .open-btn:hover { background: var(--accent-hover); }

  /* List view */
  table.list {
    width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border-radius: 8px;
    overflow: hidden;
  }
  table.list th, table.list td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  table.list thead th {
    background: rgba(14,99,156,0.10);
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  table.list tbody tr:last-child td { border-bottom: none; }
  table.list tbody tr:hover { background: rgba(255,255,255,0.02); }
  table.list .dot {
    display: inline-block;
    width: 14px; height: 14px;
    border-radius: 50%;
    vertical-align: middle;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  }
  table.list .dot.red { background: var(--red); }
  table.list .dot.yellow { background: var(--yellow); }
  table.list .dot.green { background: var(--green); }
  table.list .dot.blue { background: var(--blue); }
  table.list .dot.unknown { background: var(--muted-2); }
  table.list .dot { cursor: help; }
  table.list .agent-pill {
    background: var(--panel-2);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  table.list .repo { color: var(--muted); font-family: "Cascadia Code", Consolas, monospace; font-size: 11px; }
  table.list .name { font-weight: 600; }
  table.list .name.unnamed { font-style: italic; color: var(--muted); font-weight: 500; }
  table.list .idle { color: var(--muted-2); font-size: 12px; }
  table.list .open-btn {
    display: inline-block;
    background: var(--accent);
    color: white;
    text-decoration: none;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
  }
  table.list .open-btn:hover { background: var(--accent-hover); }

  @media (max-width: 720px) {
    .cards { grid-template-columns: 1fr; }
    table.list .repo, table.list th.repo { display: none; }
  }
</style>
</head>
<body>
<header>
  <h1>CC DIRECTOR</h1>
  <span class="stats" id="stats">loading...</span>
  <span class="spacer"></span>
  <div class="view-toggle" role="tablist" aria-label="View toggle">
    <button id="btn-cards" type="button" class="active" data-view="cards" role="tab" aria-selected="true">Cards</button>
    <button id="btn-list" type="button" data-view="list" role="tab" aria-selected="false">List</button>
  </div>
  <a class="link" href="/api">/api</a>
  <a class="link" href="/healthz">healthz</a>
  <a class="link" href="/logout" __LOGOUT_VISIBILITY__>logout</a>
</header>

<main>
  <div id="error" class="error" style="display:none"></div>
  <div id="content"></div>
</main>

<script>
const REFRESH_MS = 2000;

const state = {
  view: localStorage.getItem("gw_view") || "cards",
  sessions: [],
  machineErrors: [],
};

let inflight = null;

// ---------- helpers ----------

function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function relativeTime(iso) {
  if (!iso) return "-";
  const t = new Date(iso).getTime();
  if (Number.isNaN(t)) return "-";
  const seconds = Math.max(0, Math.floor((Date.now() - t) / 1000));
  if (seconds < 5) return "just now";
  if (seconds < 60) return seconds + "s";
  const mins = Math.floor(seconds / 60);
  if (mins < 60) return mins + "m";
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + "h";
  return Math.floor(hours / 24) + "d";
}

function repoBasename(p) {
  if (!p) return "(no repo)";
  const norm = p.replace(/\\/g, "/").replace(/\/+$/, "");
  const i = norm.lastIndexOf("/");
  return i >= 0 ? norm.slice(i + 1) : norm;
}

function humanizeState(s) {
  switch (s) {
    case "WaitingForInput": return "Waiting for input";
    case "WaitingForPerm": return "Waiting for permission";
    case "Idle": return "Idle";
    case "Working": return "Working";
    case "Starting": return "Starting";
    case "Exited": return "Exited";
    default: return s || "-";
  }
}

// The status color is OWNED by the Director's SessionStatusSupervisor. We render
// exactly what it returns. No derivation, no fallback. If the value isn't one of
// the five known colors, we render "unknown" (gray) - that's the truthful answer.
function statusColorOf(s) {
  const c = (s.statusColor || "").toLowerCase();
  if (c === "red" || c === "yellow" || c === "green" || c === "blue") return c;
  return "unknown";
}

function statusReasonOf(s) {
  return s.lastStatusReason || "";
}

// Dot tooltip - replaces the page-level legend. Combines the color's general
// meaning with the supervisor's specific reason for THIS session.
const COLOR_MEANING = {
  green:   "Green - ready",
  blue:    "Blue - agent working",
  yellow:  "Yellow - warning",
  red:     "Red - needs you",
  unknown: "Gray - unknown / unreachable",
};
function dotTooltipOf(s) {
  const color = statusColorOf(s);
  const reason = statusReasonOf(s);
  const meaning = COLOR_MEANING[color] || color;
  return reason ? `${meaning}\n(${reason})` : meaning;
}

function sessionSortKey(s) {
  const color = statusColorOf(s);
  const order = { red: 0, yellow: 1, blue: 2, green: 3, unknown: 4 };
  return [order[color] ?? 9, (s.name || s.repoPath || "").toLowerCase()];
}

function compareSessions(a, b) {
  const ka = sessionSortKey(a), kb = sessionSortKey(b);
  if (ka[0] !== kb[0]) return ka[0] - kb[0];
  return ka[1].localeCompare(kb[1]);
}

function groupByMachine(sessions) {
  const groups = new Map();
  for (const s of sessions) {
    const key = s.machineName || "(unknown)";
    if (!groups.has(key)) groups.set(key, { name: key, user: s.user || "", sessions: [] });
    groups.get(key).sessions.push(s);
  }
  // Inject error-only machines too so unreachable Directors still show a header.
  for (const me of state.machineErrors) {
    if (!groups.has(me.machineName)) {
      groups.set(me.machineName, { name: me.machineName, user: "", sessions: [], error: me.error });
    } else {
      groups.get(me.machineName).error = me.error;
    }
  }
  // Sort within each group, and sort groups alphabetically.
  for (const g of groups.values()) g.sessions.sort(compareSessions);
  return Array.from(groups.values()).sort((a, b) => a.name.localeCompare(b.name));
}

// ---------- rendering ----------

function renderHeader() {
  const sessions = state.sessions;
  const reds = sessions.filter(s => statusColorOf(s) === "red").length;
  const yellows = sessions.filter(s => statusColorOf(s) === "yellow").length;
  const total = sessions.length;
  const parts = [`${total} session${total === 1 ? "" : "s"}`];
  if (reds) parts.push(`<span class="red">${reds} red</span>`);
  if (yellows) parts.push(`<span class="yellow">${yellows} yellow</span>`);
  document.getElementById("stats").innerHTML = parts.join(" &middot; ");
}

function renderCardsView(groups) {
  let html = "";
  for (const g of groups) {
    if (g.sessions.length === 0 && !g.error) continue;
    html += `<section class="machine-group">`;
    html += `<div class="machine-header">`;
    html += `<span class="name">${escapeHtml(g.name)}</span>`;
    if (g.user) html += `<span class="user">&middot; ${escapeHtml(g.user)}</span>`;
    html += `<span class="count">&middot; ${g.sessions.length} session${g.sessions.length === 1 ? "" : "s"}</span>`;
    if (g.error) html += `<span class="unreachable">&middot; unreachable: ${escapeHtml(g.error)}</span>`;
    html += `</div>`;

    if (g.sessions.length > 0) {
      html += `<div class="cards">`;
      for (const s of g.sessions) {
        const color = statusColorOf(s);
        const dotTitle = dotTooltipOf(s);
        const name = s.name || "";
        const titleHtml = name
          ? `<span class="title">${escapeHtml(name)}</span>`
          : `<span class="title unnamed">(unnamed)</span>`;
        html += `<article class="card">`;
        html += `<div class="head">`;
        html += `<span class="dot ${color}" title="${escapeHtml(dotTitle)}"></span>`;
        html += titleHtml;
        html += `<span class="agent-pill">${escapeHtml(s.agent || "?")}</span>`;
        html += `</div>`;
        html += `<div class="repo" title="${escapeHtml(s.repoPath || "")}">${escapeHtml(repoBasename(s.repoPath))}</div>`;
        html += `<div class="state-row">`;
        html += `<span class="state">${escapeHtml(humanizeState(s.activityState))}</span>`;
        html += `<span class="idle" title="last activity ${escapeHtml(s.lastActivityAt || "")}">${escapeHtml(relativeTime(s.lastActivityAt))}</span>`;
        html += `</div>`;
        if (s.viewUrl) {
          html += `<a class="open-btn" href="${escapeHtml(s.viewUrl)}">Open session &rarr;</a>`;
        }
        html += `</article>`;
      }
      html += `</div>`;
    }
    html += `</section>`;
  }
  return html;
}

function renderListView(groups) {
  let html = "";
  for (const g of groups) {
    if (g.sessions.length === 0 && !g.error) continue;
    html += `<section class="machine-group">`;
    html += `<div class="machine-header">`;
    html += `<span class="name">${escapeHtml(g.name)}</span>`;
    if (g.user) html += `<span class="user">&middot; ${escapeHtml(g.user)}</span>`;
    html += `<span class="count">&middot; ${g.sessions.length} session${g.sessions.length === 1 ? "" : "s"}</span>`;
    if (g.error) html += `<span class="unreachable">&middot; unreachable: ${escapeHtml(g.error)}</span>`;
    html += `</div>`;

    if (g.sessions.length > 0) {
      html += `<table class="list">`;
      html += `<thead><tr>
        <th style="width:32px"></th>
        <th>Agent</th>
        <th>Name</th>
        <th class="repo">Repo</th>
        <th>State</th>
        <th>Idle</th>
        <th></th>
      </tr></thead><tbody>`;
      for (const s of g.sessions) {
        const color = statusColorOf(s);
        const dotTitle = dotTooltipOf(s);
        const name = s.name || "";
        const nameHtml = name
          ? `<span class="name">${escapeHtml(name)}</span>`
          : `<span class="name unnamed">(unnamed)</span>`;
        html += `<tr>`;
        html += `<td><span class="dot ${color}" title="${escapeHtml(dotTitle)}"></span></td>`;
        html += `<td><span class="agent-pill">${escapeHtml(s.agent || "?")}</span></td>`;
        html += `<td>${nameHtml}</td>`;
        html += `<td class="repo" title="${escapeHtml(s.repoPath || "")}">${escapeHtml(repoBasename(s.repoPath))}</td>`;
        html += `<td><span class="state">${escapeHtml(humanizeState(s.activityState))}</span></td>`;
        html += `<td class="idle">${escapeHtml(relativeTime(s.lastActivityAt))}</td>`;
        html += `<td>`;
        if (s.viewUrl) {
          html += `<a class="open-btn" href="${escapeHtml(s.viewUrl)}">Open</a>`;
        }
        html += `</td>`;
        html += `</tr>`;
      }
      html += `</tbody></table>`;
    }
    html += `</section>`;
  }
  return html;
}

function render() {
  renderHeader();
  const groups = groupByMachine(state.sessions);
  const content = document.getElementById("content");

  if (state.sessions.length === 0 && state.machineErrors.length === 0) {
    content.innerHTML =
      '<div class="empty">' +
        '<p>No sessions registered anywhere on the fleet.</p>' +
        '<p style="color:var(--muted-2);font-size:12px">A session will appear here when a Director starts one. Make sure the Director has <code>gateway.url</code> configured if it is running on another machine.</p>' +
      '</div>';
    return;
  }
  content.innerHTML = state.view === "cards" ? renderCardsView(groups) : renderListView(groups);
}

// ---------- data ----------

async function refresh() {
  if (inflight) { inflight.abort(); inflight = null; }
  const controller = new AbortController();
  inflight = controller;

  const err = document.getElementById("error");
  try {
    // Envelope shape gives us machineErrors. Exited sessions are hidden by default
    // at the Director level - if a session is gone, it disappears from the map.
    const url = "/sessions?envelope=true";
    const resp = await fetch(url, { credentials: "same-origin", signal: controller.signal });
    if (resp.status === 401) {
      window.location.href = "/login?next=" + encodeURIComponent(window.location.pathname);
      return;
    }
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const body = await resp.json();
    state.sessions = Array.isArray(body.sessions) ? body.sessions : [];
    state.machineErrors = Array.isArray(body.machineErrors) ? body.machineErrors : [];
    err.style.display = "none";
    render();
  } catch (e) {
    if (e.name === "AbortError") return;
    err.style.display = "block";
    err.textContent = "Failed to fetch sessions: " + (e && e.message ? e.message : e);
  } finally {
    if (inflight === controller) inflight = null;
  }
}

// ---------- wiring ----------

function setView(v) {
  state.view = v;
  localStorage.setItem("gw_view", v);
  document.getElementById("btn-cards").classList.toggle("active", v === "cards");
  document.getElementById("btn-cards").setAttribute("aria-selected", v === "cards" ? "true" : "false");
  document.getElementById("btn-list").classList.toggle("active", v === "list");
  document.getElementById("btn-list").setAttribute("aria-selected", v === "list" ? "true" : "false");
  render();
}

document.getElementById("btn-cards").addEventListener("click", () => setView("cards"));
document.getElementById("btn-list").addEventListener("click", () => setView("list"));

// Initial view setup.
setView(state.view);
refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
