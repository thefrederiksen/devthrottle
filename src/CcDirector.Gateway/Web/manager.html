<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CC Director - Gateway</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --border: #3c3c3c;
    --text: #dddddd;
    --muted: #888888;
    --accent: #0e639c;
    --accent-hover: #1177bb;
    --idle: #4ec9b0;
    --working: #569cd6;
    --waiting: #dcdcaa;
    --perm: #ce9178;
    --failed: #f44747;
    --starting: #9cdcfe;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  header {
    padding: 10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    font-size: 13px;
    margin: 0;
    color: var(--text);
    letter-spacing: 0.5px;
    font-weight: 700;
    flex-shrink: 0;
  }
  header .stats { color: var(--muted); font-size: 12px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  header .spacer { flex: 1; }
  header .info { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  header .info code { background: var(--bg); padding: 2px 6px; border-radius: 3px; color: var(--text); font-family: "Cascadia Code", Consolas, monospace; }
  header a {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    min-height: 44px;
    min-width: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
    border-radius: 6px;
  }
  header a:hover { background: rgba(14,99,156,0.15); }

  main { padding: 12px 14px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }

  .director-block { margin-bottom: 18px; }
  .director-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 4px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .director-header .name { font-weight: 600; flex-shrink: 0; }
  .director-header .machine {
    background: var(--panel);
    color: var(--muted);
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 11px;
  }
  .director-header .open-link {
    margin-left: auto;
    color: var(--accent);
    font-size: 12px;
    text-decoration: none;
    min-height: 36px;
    min-width: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 8px;
    border-radius: 6px;
  }
  .director-header .open-link:hover, .director-header .open-link:active { background: rgba(14,99,156,0.15); }

  .sessions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    transition: background 0.08s, border-color 0.08s;
  }
  .card:hover, .card:active { background: #2d2d2e; border-color: #4a4a4a; }
  .card.state-Idle           { border-left: 4px solid var(--idle); }
  .card.state-Working        { border-left: 4px solid var(--working); }
  .card.state-WaitingForInput{ border-left: 4px solid var(--waiting); animation: pulse 1.6s ease-in-out infinite; }
  .card.state-WaitingForPerm { border-left: 4px solid var(--perm); animation: pulse 1.6s ease-in-out infinite; }
  .card.state-Starting       { border-left: 4px solid var(--starting); }
  .card.state-Exited, .card.state-Failed { border-left: 4px solid var(--failed); opacity: 0.7; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,220,170,0.0); }
    50%      { box-shadow: 0 0 0 4px rgba(220,220,170,0.18); }
  }
  .card .row { display: flex; align-items: center; gap: 8px; }
  .card .name { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .repo { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .agent { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    color: #1e1e1e;
    flex-shrink: 0;
  }
  .badge.Idle           { background: var(--idle); }
  .badge.Working        { background: var(--working); }
  .badge.WaitingForInput{ background: var(--waiting); }
  .badge.WaitingForPerm { background: var(--perm); }
  .badge.Starting       { background: var(--starting); }
  .badge.Exited, .badge.Failed { background: var(--failed); }
  .meta { color: var(--muted); font-size: 12px; }

  /* ===== Detail view ===== */
  .detail {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 920px;
    margin: 0 auto;
  }
  .detail .top-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .btn-back {
    background: #3c3c3c; color: var(--text); border: 0;
    padding: 0 14px; border-radius: 6px; cursor: pointer;
    font-size: 13px; min-height: 36px;
  }
  .btn-back:hover, .btn-back:active { background: #4a4a4a; }

  .detail .header-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .detail .header-panel.state-Idle           { border-left: 4px solid var(--idle); }
  .detail .header-panel.state-Working        { border-left: 4px solid var(--working); }
  .detail .header-panel.state-WaitingForInput{ border-left: 4px solid var(--waiting); }
  .detail .header-panel.state-WaitingForPerm { border-left: 4px solid var(--perm); }
  .detail .header-panel.state-Starting       { border-left: 4px solid var(--starting); }
  .detail .header-panel.state-Exited, .detail .header-panel.state-Failed { border-left: 4px solid var(--failed); }

  .name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .name-display { font-size: 20px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .name-edit { flex: 1; min-width: 0; }
  .name-edit input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 700;
    box-sizing: border-box;
    min-height: 40px;
  }
  .btn-icon {
    background: #3c3c3c; color: var(--text); border: 0;
    padding: 0 12px; border-radius: 6px; cursor: pointer;
    font-size: 12px; min-height: 36px;
  }
  .btn-icon:hover, .btn-icon:active { background: #4a4a4a; }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 18px;
    align-items: center;
    color: var(--muted);
    font-size: 12px;
  }
  .meta-row .repo-path { font-family: "Cascadia Code", Consolas, monospace; font-size: 11px; word-break: break-all; }
  .meta-row .agent-tag { text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; color: var(--text); }

  .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-row a, .action-row button {
    background: #3c3c3c; color: var(--text); border: 0;
    padding: 8px 14px; border-radius: 6px;
    font-size: 12px; text-decoration: none;
    min-height: 36px; cursor: pointer;
    display: inline-flex; align-items: center;
  }
  .action-row a:hover, .action-row a:active,
  .action-row button:hover, .action-row button:active { background: #4a4a4a; }

  .recap-panel, .send-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .recap-panel h2, .send-panel h2 {
    margin: 0 0 4px 0; font-size: 13px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;
  }
  .recap-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .recap-body { font-size: 14px; line-height: 1.5; }
  .recap-body h3 { font-size: 14px; margin: 12px 0 6px 0; color: var(--text); font-weight: 700; text-transform: none; letter-spacing: 0; }
  .recap-body h3:first-child { margin-top: 0; }
  .recap-body ul { margin: 4px 0 8px 0; padding-left: 22px; }
  .recap-body li { margin: 2px 0; }
  .recap-body p { margin: 6px 0; }
  .recap-empty { color: var(--muted); font-style: italic; font-size: 13px; }
  .recap-stale { color: var(--waiting); font-size: 11px; font-weight: 600; }

  .send-panel textarea {
    width: 100%;
    min-height: 80px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 16px;
    resize: vertical;
    box-sizing: border-box;
  }
  .send-panel .send-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .send-panel .send-row .spacer { flex: 1; }
  .send-panel button {
    background: var(--accent); color: white; border: 0;
    padding: 0 18px; border-radius: 8px; cursor: pointer;
    font-weight: 600; font-size: 15px; min-height: 44px; min-width: 80px;
  }
  .send-panel button:hover:not(:disabled), .send-panel button:active:not(:disabled) { background: var(--accent-hover); }
  .send-panel button:disabled { opacity: 0.5; cursor: not-allowed; }
  .send-feedback { color: var(--muted); font-size: 12px; min-height: 16px; }
  .send-feedback.error { color: var(--failed); }
  .send-feedback.ok { color: var(--idle); }

  .empty { color: var(--muted); text-align: center; padding: 32px; }

  .btn-new {
    background: var(--accent);
    color: white;
    border: 0;
    padding: 0 14px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    min-height: 36px;
    flex-shrink: 0;
  }
  .btn-new:hover, .btn-new:active { background: var(--accent-hover); }

  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 12px;
  }
  .modal-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .modal-close {
    background: transparent; border: 0; color: var(--muted);
    font-size: 28px; cursor: pointer;
    width: 44px; height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 8px;
    line-height: 1;
  }
  .modal-close:hover, .modal-close:active { background: var(--bg); color: var(--text); }
  .modal-panel label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
  .modal-panel input[type=text], .modal-panel select {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 16px;
    box-sizing: border-box;
    min-height: 44px;
  }
  .modal-error {
    background: #4d1f1f;
    color: #ffaaaa;
    border: 1px solid #663030;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    margin-top: 8px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  .btn-primary {
    background: var(--accent); color: white; border: 0;
    padding: 0 18px; border-radius: 8px; cursor: pointer; font-weight: 600;
    font-size: 15px; min-height: 44px; min-width: 72px;
  }
  .btn-primary:hover:not(:disabled), .btn-primary:active:not(:disabled) { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: #3c3c3c; color: var(--text); border: 0;
    padding: 0 18px; border-radius: 8px; cursor: pointer;
    font-size: 15px; min-height: 44px; min-width: 72px;
  }
  .btn-secondary:hover, .btn-secondary:active { background: #4a4a4a; }

  .repo-list {
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    max-height: 240px;
    overflow-y: auto;
    margin-top: 4px;
  }
  .repo-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(14,99,156,0.4);
  }
  .repo-item:last-child { border-bottom: 0; }
  .repo-item:hover, .repo-item:active, .repo-item.selected {
    background: rgba(14,99,156,0.22);
  }
  .repo-item .name { font-weight: 600; }
  .repo-item .path { color: var(--muted); font-size: 11px; word-break: break-all; }
  .repo-item .when { color: var(--muted); font-size: 11px; float: right; }
  .repo-empty { padding: 16px; color: var(--muted); text-align: center; font-size: 12px; }
  .repo-custom {
    padding: 10px 12px;
    background: rgba(78,201,176,0.10);
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
  }
  .repo-custom .name { color: var(--idle); font-weight: 600; }

  @media (max-width: 520px) {
    header { padding: 8px 12px; padding-top: max(8px, env(safe-area-inset-top)); gap: 8px; }
    header h1 { font-size: 12px; flex: 0 0 auto; }
    header .info { display: none; }
    header .stats {
      order: 99;
      flex-basis: 100%;
      margin-top: -2px;
      font-size: 11px;
    }
    .sessions { grid-template-columns: 1fr; gap: 8px; }
    .card { padding: 10px; }
    main { padding: 10px 12px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    .director-header { padding: 6px 2px; gap: 6px; }
    .director-header .open-link { font-size: 11px; padding: 0 6px; min-height: 32px; }
    .name-display { font-size: 17px; }
  }
</style>
</head>
<body>
<header>
  <h1>CC DIRECTOR - GATEWAY</h1>
  <span class="stats" id="stats">Loading...</span>
  <span class="spacer"></span>
  <span class="info">Gateway <code id="gwVersion">...</code></span>
  <button id="newSessionBtn" class="btn-new">+ New Session</button>
  <a href="/logout" __LOGOUT_VISIBILITY__>Logout</a>
</header>

<!-- New Session modal -->
<div id="newSessionModal" class="modal" style="display:none">
  <div class="modal-panel">
    <div class="modal-header">
      <strong>New Session</strong>
      <button class="modal-close" id="newSessionClose">&times;</button>
    </div>

    <label for="directorSelect">On Director</label>
    <select id="directorSelect"></select>

    <label for="repoSearch">Repository</label>
    <input type="text" id="repoSearch" placeholder="Search or paste an absolute path..." autocomplete="off" autocapitalize="off" autocorrect="off" />

    <div id="repoList" class="repo-list">
      <div class="repo-empty">Pick a Director first.</div>
    </div>

    <label for="agentSelect">Agent</label>
    <select id="agentSelect">
      <option value="ClaudeCode" selected>Claude Code</option>
      <option value="Pi">Pi</option>
      <option value="Codex">Codex</option>
      <option value="Gemini">Gemini</option>
    </select>

    <div class="modal-error" id="newSessionError" style="display:none"></div>

    <div class="modal-actions">
      <button id="newSessionCancel" class="btn-secondary">Cancel</button>
      <button id="newSessionCreate" class="btn-primary">Start</button>
    </div>
  </div>
</div>

<main>
  <!-- List mode -->
  <div id="listMode">
    <div id="directors"></div>
    <div id="empty" class="empty" style="display:none">No Directors running. Start CC Director on this or any Tailscale-connected machine.</div>
  </div>

  <!-- Detail mode -->
  <div id="detailMode" class="detail" style="display:none">
    <div class="top-bar">
      <button class="btn-back" id="backBtn">&larr; Back to sessions</button>
    </div>

    <div id="detailHeader" class="header-panel">
      <div class="name-row">
        <div class="name-display" id="nameDisplay"></div>
        <div class="name-edit" id="nameEdit" style="display:none"><input type="text" id="nameInput" maxlength="80" /></div>
        <button class="btn-icon" id="renameBtn">Rename</button>
        <button class="btn-icon" id="renameSaveBtn" style="display:none">Save</button>
        <button class="btn-icon" id="renameCancelBtn" style="display:none">Cancel</button>
        <span class="badge" id="detailBadge"></span>
      </div>
      <div class="meta-row">
        <span><span class="agent-tag" id="detailAgent"></span></span>
        <span id="detailElapsed"></span>
        <span class="repo-path" id="detailRepo"></span>
      </div>
      <div class="action-row">
        <a id="detailRawLink" target="_blank" rel="noopener">Open raw view</a>
        <button id="interruptBtn">Interrupt</button>
      </div>
    </div>

    <div class="recap-panel">
      <h2>What was done <span id="recapStale" class="recap-stale" style="display:none">(stale)</span></h2>
      <div class="recap-controls">
        <button class="btn-icon" id="recapRefreshBtn">Refresh recap</button>
        <span class="meta" id="recapMeta"></span>
      </div>
      <div class="recap-body" id="recapBody"><div class="recap-empty">Loading...</div></div>
    </div>

    <div class="send-panel">
      <h2>Send next command</h2>
      <textarea id="detailPrompt" placeholder="Type a prompt to send to this session..."></textarea>
      <div class="send-row">
        <span class="send-feedback" id="sendFeedback"></span>
        <span class="spacer"></span>
        <button id="detailSendBtn">Send</button>
      </div>
    </div>
  </div>
</main>

<script>
(function () {
  const listMode = document.getElementById('listMode');
  const detailMode = document.getElementById('detailMode');
  const directorsEl = document.getElementById('directors');
  const emptyEl = document.getElementById('empty');
  const statsEl = document.getElementById('stats');
  const gwVersionEl = document.getElementById('gwVersion');

  // Detail view elements
  const backBtn = document.getElementById('backBtn');
  const detailHeader = document.getElementById('detailHeader');
  const nameDisplay = document.getElementById('nameDisplay');
  const nameEdit = document.getElementById('nameEdit');
  const nameInput = document.getElementById('nameInput');
  const renameBtn = document.getElementById('renameBtn');
  const renameSaveBtn = document.getElementById('renameSaveBtn');
  const renameCancelBtn = document.getElementById('renameCancelBtn');
  const detailBadge = document.getElementById('detailBadge');
  const detailAgent = document.getElementById('detailAgent');
  const detailRepo = document.getElementById('detailRepo');
  const detailElapsed = document.getElementById('detailElapsed');
  const detailRawLink = document.getElementById('detailRawLink');
  const interruptBtn = document.getElementById('interruptBtn');
  const recapBody = document.getElementById('recapBody');
  const recapStale = document.getElementById('recapStale');
  const recapMeta = document.getElementById('recapMeta');
  const recapRefreshBtn = document.getElementById('recapRefreshBtn');
  const detailPrompt = document.getElementById('detailPrompt');
  const detailSendBtn = document.getElementById('detailSendBtn');
  const sendFeedback = document.getElementById('sendFeedback');

  // App state
  const directors = new Map();  // directorId -> { dto, blockEl, cards: Map<sid, el> }
  let selectedSessionId = null;  // null = list mode
  let selectedDirectorId = null;
  let selectedSessionDto = null;
  let renameInFlight = false;
  let recapInFlight = false;

  function fmtElapsed(iso) {
    if (!iso) return '';
    const t = new Date(iso).getTime();
    const s = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s/60) + 'm';
    return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
  }

  function repoFolder(p) {
    if (!p) return '';
    const parts = p.replace(/\\$/, '').replace(/\/$/, '').split(/[\\/]/);
    return parts[parts.length-1];
  }

  function displayName(s) {
    if (s && s.name && s.name.trim()) return s.name.trim();
    return repoFolder(s ? s.repoPath : '') || (s && s.sessionId ? s.sessionId.slice(0,8) : '');
  }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // Tiny markdown-to-HTML for recap output. Handles: "## heading", "- bullet",
  // blank-line paragraph separation. Not a general parser; recap output is constrained.
  function renderRecapMarkdown(md) {
    if (!md || !md.trim()) return '<div class="recap-empty">Empty recap.</div>';
    const lines = md.replace(/\r\n/g, '\n').split('\n');
    let html = '';
    let inList = false;
    let inPara = false;
    function closeList() { if (inList) { html += '</ul>'; inList = false; } }
    function closePara() { if (inPara) { html += '</p>'; inPara = false; } }
    for (const raw of lines) {
      const line = raw.trim();
      if (line.startsWith('## ')) {
        closeList(); closePara();
        html += '<h3>' + escapeHtml(line.substring(3).trim()) + '</h3>';
      } else if (line.startsWith('- ') || line.startsWith('* ')) {
        closePara();
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + escapeHtml(line.substring(2).trim()) + '</li>';
      } else if (line === '') {
        closeList(); closePara();
      } else {
        closeList();
        if (!inPara) { html += '<p>'; inPara = true; }
        html += escapeHtml(line) + ' ';
      }
    }
    closeList(); closePara();
    return html;
  }

  function directorPortFromEndpoint(endpoint) {
    try {
      const u = new URL(endpoint);
      return u.port || '7879';
    } catch { return '7879'; }
  }

  function directorHtmlUrl(d) {
    return window.location.protocol + '//' + window.location.hostname + ':' + directorPortFromEndpoint(d.controlEndpoint) + '/';
  }

  function getOrCreateDirectorBlock(d) {
    let entry = directors.get(d.directorId);
    if (entry) return entry;

    const block = document.createElement('div');
    block.className = 'director-block';
    block.dataset.directorId = d.directorId;
    block.innerHTML = `
      <div class="director-header">
        <span class="name"></span>
        <span class="machine"></span>
        <a class="open-link" target="_blank" rel="noopener">Open Director &rarr;</a>
      </div>
      <div class="sessions"></div>
    `;
    directorsEl.appendChild(block);
    entry = { dto: d, blockEl: block, cards: new Map() };
    directors.set(d.directorId, entry);
    updateDirectorHeader(entry);
    return entry;
  }

  function updateDirectorHeader(entry) {
    const d = entry.dto;
    const h = entry.blockEl.querySelector('.director-header');
    h.querySelector('.name').textContent = 'Director ' + d.directorId.slice(0,8);
    h.querySelector('.machine').textContent = d.machineName || '';
    h.querySelector('.open-link').href = directorHtmlUrl(d);
  }

  function renderCard(entry, s) {
    let card = entry.cards.get(s.sessionId);
    if (!card) {
      card = document.createElement('div');
      card.dataset.sid = s.sessionId;
      card.innerHTML = `
        <div class="row">
          <span class="name"></span>
          <span class="badge"></span>
        </div>
        <div class="row meta">
          <span class="agent"></span>
          <span class="spacer" style="flex:1"></span>
          <span class="elapsed"></span>
        </div>
        <div class="repo"></div>
      `;
      card.addEventListener('click', () => enterDetailMode(s.sessionId, entry.dto.directorId));
      entry.blockEl.querySelector('.sessions').appendChild(card);
      entry.cards.set(s.sessionId, card);
    }
    card.className = 'card state-' + (s.activityState || 'Unknown');
    card.querySelector('.name').textContent = displayName(s);
    card.querySelector('.repo').textContent = s.repoPath || '';
    const badge = card.querySelector('.badge');
    badge.textContent = s.activityState;
    badge.className = 'badge ' + s.activityState;
    card.querySelector('.agent').textContent = s.agent;
    card.querySelector('.elapsed').textContent = 'started ' + fmtElapsed(s.createdAt) + ' ago';
  }

  async function refresh() {
    try {
      const dRes = await fetch('/directors', { credentials: 'same-origin' });
      if (!dRes.ok) { statsEl.textContent = 'Refresh failed: HTTP ' + dRes.status; return; }
      const dirList = await dRes.json();

      const sRes = await fetch('/sessions', { credentials: 'same-origin' });
      if (!sRes.ok) { statsEl.textContent = 'Refresh failed: HTTP ' + sRes.status; return; }
      const sessList = await sRes.json();

      // Drop directors that are gone
      const seenDir = new Set(dirList.map(d => d.directorId));
      for (const [did, entry] of directors) {
        if (!seenDir.has(did)) {
          entry.blockEl.remove();
          directors.delete(did);
        }
      }
      // Sync director header data
      dirList.forEach(d => {
        const e = getOrCreateDirectorBlock(d);
        e.dto = d;
        updateDirectorHeader(e);
      });

      // Render sessions
      const seenSid = new Set();
      sessList.forEach(s => {
        seenSid.add(s.sessionId);
        const e = directors.get(s.directorId);
        if (e) renderCard(e, s);
      });
      // Remove disappeared session cards
      directors.forEach(entry => {
        for (const [sid, card] of entry.cards) {
          if (!seenSid.has(sid)) { card.remove(); entry.cards.delete(sid); }
        }
      });

      emptyEl.style.display = dirList.length === 0 ? '' : 'none';

      const idle = sessList.filter(s => s.activityState === 'Idle').length;
      const working = sessList.filter(s => s.activityState === 'Working').length;
      const waiting = sessList.filter(s => s.activityState === 'WaitingForInput' || s.activityState === 'WaitingForPerm').length;
      statsEl.textContent = dirList.length + ' director' + (dirList.length===1?'':'s') + ', ' +
        sessList.length + ' session' + (sessList.length===1?'':'s') +
        ' (' + idle + ' idle, ' + working + ' working, ' + waiting + ' waiting)';

      // If we are in detail mode, refresh the selected session header from the list
      if (selectedSessionId) {
        const sel = sessList.find(s => s.sessionId === selectedSessionId);
        if (sel) {
          selectedSessionDto = sel;
          selectedDirectorId = sel.directorId;
          paintDetailHeader(sel);
        } else {
          // Session disappeared - drop back to list mode
          exitDetailMode();
        }
      }
    } catch (e) {
      statsEl.textContent = 'Refresh error: ' + e.message;
    }
  }

  async function loadHealth() {
    try {
      const r = await fetch('/healthz');
      const h = await r.json();
      gwVersionEl.textContent = h.version || '?';
    } catch { gwVersionEl.textContent = '?'; }
  }

  // ====== Detail mode ======
  function enterDetailMode(sid, did) {
    selectedSessionId = sid;
    selectedDirectorId = did;
    selectedSessionDto = null;
    nameEdit.style.display = 'none';
    nameDisplay.style.display = '';
    renameBtn.style.display = '';
    renameSaveBtn.style.display = 'none';
    renameCancelBtn.style.display = 'none';
    detailPrompt.value = '';
    sendFeedback.textContent = '';
    sendFeedback.className = 'send-feedback';
    recapBody.innerHTML = '<div class="recap-empty">Loading...</div>';
    recapStale.style.display = 'none';
    recapMeta.textContent = '';
    listMode.style.display = 'none';
    detailMode.style.display = '';
    window.scrollTo({ top: 0, behavior: 'auto' });
    // Pull session info + recap right away
    refresh();
    loadRecap(/* forceGenerate= */ false);
  }

  function exitDetailMode() {
    selectedSessionId = null;
    selectedDirectorId = null;
    selectedSessionDto = null;
    detailMode.style.display = 'none';
    listMode.style.display = '';
  }

  function paintDetailHeader(s) {
    detailHeader.className = 'header-panel state-' + (s.activityState || 'Unknown');
    nameDisplay.textContent = displayName(s);
    detailBadge.textContent = s.activityState;
    detailBadge.className = 'badge ' + s.activityState;
    detailAgent.textContent = s.agent;
    detailRepo.textContent = s.repoPath || '';
    detailElapsed.textContent = 'started ' + fmtElapsed(s.createdAt) + ' ago';

    // Open raw view points at the owning Director's per-session HTML page.
    const dir = directors.get(s.directorId);
    if (dir) {
      detailRawLink.href = directorHtmlUrl(dir.dto) + 'sessions/' + s.sessionId + '/view';
    } else {
      detailRawLink.removeAttribute('href');
    }
  }

  backBtn.addEventListener('click', exitDetailMode);

  // Rename flow
  renameBtn.addEventListener('click', () => {
    if (!selectedSessionDto) return;
    nameInput.value = selectedSessionDto.name || '';
    nameDisplay.style.display = 'none';
    nameEdit.style.display = '';
    renameBtn.style.display = 'none';
    renameSaveBtn.style.display = '';
    renameCancelBtn.style.display = '';
    setTimeout(() => { nameInput.focus(); nameInput.select(); }, 30);
  });
  renameCancelBtn.addEventListener('click', () => {
    nameDisplay.style.display = '';
    nameEdit.style.display = 'none';
    renameBtn.style.display = '';
    renameSaveBtn.style.display = 'none';
    renameCancelBtn.style.display = 'none';
  });
  renameSaveBtn.addEventListener('click', saveName);
  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveName(); }
    else if (e.key === 'Escape') { e.preventDefault(); renameCancelBtn.click(); }
  });

  async function saveName() {
    if (!selectedSessionId || renameInFlight) return;
    renameInFlight = true;
    renameSaveBtn.disabled = true;
    try {
      const newName = nameInput.value.trim();
      const r = await fetch('/sessions/' + selectedSessionId, {
        method: 'PATCH',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName }),
      });
      if (!r.ok) {
        const body = await r.text();
        alert('Rename failed: ' + r.status + ' ' + body);
        return;
      }
      const dto = await r.json();
      selectedSessionDto = dto;
      paintDetailHeader(dto);
      renameCancelBtn.click();
    } catch (e) {
      alert('Rename error: ' + e.message);
    } finally {
      renameInFlight = false;
      renameSaveBtn.disabled = false;
    }
  }

  // Interrupt
  interruptBtn.addEventListener('click', async () => {
    if (!selectedSessionId) return;
    interruptBtn.disabled = true;
    try {
      const r = await fetch('/sessions/' + selectedSessionId + '/interrupt', {
        method: 'POST', credentials: 'same-origin'
      });
      sendFeedback.textContent = r.ok ? 'Interrupt sent.' : ('Interrupt failed: ' + r.status);
      sendFeedback.className = 'send-feedback ' + (r.ok ? 'ok' : 'error');
    } catch (e) {
      sendFeedback.textContent = 'Interrupt error: ' + e.message;
      sendFeedback.className = 'send-feedback error';
    } finally {
      interruptBtn.disabled = false;
    }
  });

  // Send prompt
  detailSendBtn.addEventListener('click', sendPrompt);
  detailPrompt.addEventListener('keydown', (e) => {
    // Ctrl/Cmd+Enter to send
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      sendPrompt();
    }
  });

  async function sendPrompt() {
    if (!selectedSessionId) return;
    const text = detailPrompt.value;
    if (!text.trim()) {
      sendFeedback.textContent = 'Type something to send.';
      sendFeedback.className = 'send-feedback error';
      return;
    }
    detailSendBtn.disabled = true;
    sendFeedback.textContent = 'Sending...';
    sendFeedback.className = 'send-feedback';
    try {
      const r = await fetch('/sessions/' + selectedSessionId + '/prompt', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, appendEnter: true, waitForIdle: false, timeoutMs: 60000 }),
      });
      if (!r.ok) {
        const body = await r.text();
        sendFeedback.textContent = 'Send failed: ' + r.status + ' ' + body;
        sendFeedback.className = 'send-feedback error';
        return;
      }
      detailPrompt.value = '';
      sendFeedback.textContent = 'Prompt sent.';
      sendFeedback.className = 'send-feedback ok';
      refresh();
    } catch (e) {
      sendFeedback.textContent = 'Send error: ' + e.message;
      sendFeedback.className = 'send-feedback error';
    } finally {
      detailSendBtn.disabled = false;
    }
  }

  // Recap
  recapRefreshBtn.addEventListener('click', () => loadRecap(true));

  async function loadRecap(forceGenerate) {
    if (!selectedSessionId || recapInFlight) return;
    recapInFlight = true;
    recapRefreshBtn.disabled = true;
    const targetSid = selectedSessionId;
    try {
      if (forceGenerate) {
        recapBody.innerHTML = '<div class="recap-empty">Generating recap... (10-60s)</div>';
        recapMeta.textContent = '';
        recapStale.style.display = 'none';
      }
      const url = '/sessions/' + targetSid + '/recap';
      const r = await fetch(url, {
        method: forceGenerate ? 'POST' : 'GET',
        credentials: 'same-origin',
      });
      if (targetSid !== selectedSessionId) return; // user navigated away
      if (!r.ok) {
        recapBody.innerHTML = '<div class="recap-empty">Recap failed: HTTP ' + r.status + '</div>';
        return;
      }
      const data = await r.json();
      paintRecap(data, forceGenerate);
    } catch (e) {
      if (targetSid === selectedSessionId) {
        recapBody.innerHTML = '<div class="recap-empty">Recap error: ' + escapeHtml(e.message) + '</div>';
      }
    } finally {
      recapInFlight = false;
      recapRefreshBtn.disabled = false;
    }
  }

  function paintRecap(data, wasGenerated) {
    if (data.status === 'not_cached') {
      recapBody.innerHTML = '<div class="recap-empty">No recap yet. Click "Refresh recap" to generate one (uses Haiku, takes 10-60s).</div>';
      recapMeta.textContent = '';
      recapStale.style.display = 'none';
      return;
    }
    if (data.status !== 'ok') {
      recapBody.innerHTML = '<div class="recap-empty">Recap unavailable: ' + escapeHtml(data.error || data.status) + '</div>';
      recapMeta.textContent = '';
      recapStale.style.display = 'none';
      return;
    }
    recapBody.innerHTML = renderRecapMarkdown(data.recap || '');
    recapStale.style.display = data.isStale ? '' : 'none';
    const ts = data.generatedAt ? new Date(data.generatedAt).toLocaleString() : '';
    const ms = data.elapsedMs ? (data.elapsedMs/1000).toFixed(1) + 's' : '';
    const model = data.model || '';
    recapMeta.textContent = [
      ts ? ('generated ' + ts) : '',
      model ? ('model ' + model) : '',
      ms ? ('took ' + ms) : '',
      'at turn ' + data.atTurnCount + ' of ' + data.currentTurnCount,
    ].filter(Boolean).join(' · ');
  }

  // ====== New Session modal ======
  const newSessionBtn = document.getElementById('newSessionBtn');
  const newSessionModal = document.getElementById('newSessionModal');
  const newSessionClose = document.getElementById('newSessionClose');
  const newSessionCancel = document.getElementById('newSessionCancel');
  const newSessionCreate = document.getElementById('newSessionCreate');
  const directorSelect = document.getElementById('directorSelect');
  const repoSearch = document.getElementById('repoSearch');
  const repoList = document.getElementById('repoList');
  const agentSelect = document.getElementById('agentSelect');
  const newSessionError = document.getElementById('newSessionError');

  let allRepos = [];
  let selectedRepo = null;

  function fmtElapsedShort(iso) {
    if (!iso) return '';
    const t = new Date(iso).getTime();
    if (!t || isNaN(t)) return '';
    const s = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
  }
  function looksLikeAbsolutePath(s) {
    if (!s) return false;
    if (/^[a-zA-Z]:[\\/]/.test(s)) return true;
    if (s.startsWith('/') || s.startsWith('\\\\')) return true;
    return false;
  }

  function renderRepoList(query) {
    repoList.innerHTML = '';
    const q = (query || '').trim().toLowerCase();
    const matched = q
      ? allRepos.filter(r => r.name.toLowerCase().includes(q) || r.path.toLowerCase().includes(q))
      : allRepos.slice();

    if (q && looksLikeAbsolutePath(query) && !allRepos.some(r => r.path.toLowerCase() === query.toLowerCase())) {
      const custom = document.createElement('div');
      custom.className = 'repo-custom';
      custom.innerHTML = '<div class="name">Use this path</div><div class="path"></div>';
      custom.querySelector('.path').textContent = query;
      custom.addEventListener('click', () => selectRepo({ path: query, name: 'custom', custom: true }));
      repoList.appendChild(custom);
    }

    if (matched.length === 0 && !q) {
      repoList.innerHTML = '<div class="repo-empty">No registered repos on this Director.</div>';
      return;
    }
    if (matched.length === 0) {
      const note = document.createElement('div');
      note.className = 'repo-empty';
      note.textContent = 'No matches.';
      repoList.appendChild(note);
      return;
    }

    matched.forEach(repo => {
      const item = document.createElement('div');
      item.className = 'repo-item';
      if (selectedRepo && selectedRepo.path === repo.path) item.classList.add('selected');
      item.innerHTML = '<span class="when"></span><div class="name"></div><div class="path"></div>';
      item.querySelector('.when').textContent = fmtElapsedShort(repo.lastUsed);
      item.querySelector('.name').textContent = repo.name;
      item.querySelector('.path').textContent = repo.path;
      item.addEventListener('click', () => selectRepo(repo));
      repoList.appendChild(item);
    });
  }

  function selectRepo(repo) {
    selectedRepo = repo;
    repoSearch.value = repo.path;
    renderRepoList(repo.path);
  }

  async function loadDirectorsForModal() {
    try {
      const r = await fetch('/directors', { credentials: 'same-origin' });
      if (!r.ok) return [];
      const list = await r.json();
      directorSelect.innerHTML = '';
      list.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.directorId;
        opt.textContent = 'Director ' + d.directorId.slice(0,8) + ' on ' + (d.machineName || '');
        directorSelect.appendChild(opt);
      });
      return list;
    } catch { return []; }
  }

  async function loadRepos() {
    const dirId = directorSelect.value;
    if (!dirId) { allRepos = []; renderRepoList(''); return; }
    try {
      const r = await fetch('/directors/' + dirId + '/repos', { credentials: 'same-origin' });
      if (!r.ok) { allRepos = []; renderRepoList(''); return; }
      allRepos = await r.json();
      renderRepoList(repoSearch.value || '');
    } catch {
      allRepos = [];
      renderRepoList('');
    }
  }

  async function openNewSession() {
    newSessionError.style.display = 'none';
    selectedRepo = null;
    repoSearch.value = '';
    newSessionModal.style.display = '';
    await loadDirectorsForModal();
    await loadRepos();
    setTimeout(() => repoSearch.focus(), 50);
  }
  function closeNewSession() { newSessionModal.style.display = 'none'; }

  newSessionBtn.addEventListener('click', openNewSession);
  newSessionClose.addEventListener('click', closeNewSession);
  newSessionCancel.addEventListener('click', closeNewSession);
  directorSelect.addEventListener('change', () => { selectedRepo = null; loadRepos(); });
  repoSearch.addEventListener('input', () => { selectedRepo = null; renderRepoList(repoSearch.value); });
  repoSearch.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); newSessionCreate.click(); }
  });

  newSessionCreate.addEventListener('click', async () => {
    const path = (selectedRepo?.path || repoSearch.value || '').trim();
    const dirId = directorSelect.value;
    if (!dirId) {
      newSessionError.textContent = 'Pick a Director.';
      newSessionError.style.display = '';
      return;
    }
    if (!path) {
      newSessionError.textContent = 'Pick a repo or type a path.';
      newSessionError.style.display = '';
      return;
    }
    newSessionCreate.disabled = true;
    newSessionError.style.display = 'none';
    try {
      const r = await fetch('/directors/' + dirId + '/sessions', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repoPath: path, agent: agentSelect.value })
      });
      if (!r.ok) {
        let msg = 'HTTP ' + r.status;
        try { const body = await r.json(); if (body && body.error) msg = body.error; else if (body && body.detail) msg = body.detail; } catch {}
        newSessionError.textContent = msg;
        newSessionError.style.display = '';
        return;
      }
      closeNewSession();
      refresh();
    } catch (e) {
      newSessionError.textContent = e.message;
      newSessionError.style.display = '';
    } finally {
      newSessionCreate.disabled = false;
    }
  });

  loadHealth();
  refresh();
  setInterval(refresh, 1500);
})();
</script>
</body>
</html>
