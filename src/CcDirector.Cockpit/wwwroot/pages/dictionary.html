<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dictionary - CC Director Gateway</title>
<link rel="stylesheet" href="/pages/tool-nav.css" />
<script defer src="/pages/tool-nav.js"></script>
<style>
  :root{--bg:#0B1020;--panel:#141B2E;--panel2:#1B2540;--ink:#E6EAF2;--muted:#8A93A6;
        --line:#27324d;--green:#5FD08A;--blue:#5B8DEF;--amber:#E8B339;--red:#E5484D;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
  .wrap{max-width:900px;margin:0 auto;padding:28px 20px 80px}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  h1{font-size:26px;margin:0}
  a.back{color:var(--blue);text-decoration:none;font-size:14px}
  /* tab strip shared with the Transcripts page */
  .tabs{display:flex;gap:8px;border-bottom:1px solid var(--line);margin:6px 0 18px}
  .tab{padding:8px 16px;border:1px solid var(--line);border-bottom:none;border-radius:10px 10px 0 0;
       color:var(--muted);text-decoration:none;font-size:14px;background:transparent;transform:translateY(1px)}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink);background:var(--panel);border-color:var(--line)}
  .saverow{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
  .sub{color:var(--muted);font-size:14px;margin:0;max-width:640px}
  .savemsg{color:var(--green);font-size:12.5px}
  button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer}
  button:hover{border-color:var(--blue)}
  button.save{background:#1f7a47;border-color:#2a9c5b;color:#fff}
  button.save:disabled{opacity:.5;cursor:default}
  .section{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:14px 0}
  .section h2{font-size:15px;margin:0 0 2px}
  .section .hint{color:var(--muted);font-size:12.5px;margin:0 0 12px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);
        border-radius:999px;padding:4px 6px 4px 12px;font-size:13px}
  .chip .x{cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:15px;padding:0 4px;line-height:1}
  .chip .x:hover{color:var(--red)}
  .addbox{background:#0B1020;color:var(--ink);border:1px dashed var(--line);border-radius:999px;
          padding:5px 12px;font-size:13px;min-width:180px}
  .addbox:focus{outline:none;border-color:var(--blue);border-style:solid}
  .mrow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--line)}
  .mrow:first-of-type{border-top:none}
  .mterm{display:flex;align-items:center;gap:7px;min-width:160px;padding-top:5px}
  .mterm .arrow{color:var(--muted)}
  .mterm .name{font-weight:600;font-size:13.5px}
  .mterm .x{cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:14px}
  .mterm .x:hover{color:var(--red)}
  .mvariants{flex:1}
  .profiles{display:flex;flex-wrap:wrap;gap:12px}
  .pcard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;min-width:220px;flex:1}
  .pcard .pname{font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:space-between}
  .pcard .pname .x{cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:14px}
  .pcard .pname .x:hover{color:var(--red)}
  .pcard label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-top:10px}
  .pcard textarea{width:100%;margin-top:8px;background:#0B1020;color:var(--ink);border:1px solid var(--line);
                  border-radius:8px;padding:7px 9px;font-size:13px;font-family:inherit;min-height:46px;resize:vertical}
  .pcard textarea:focus{outline:none;border-color:var(--blue)}
  .addprofile{margin-top:12px;display:flex;gap:8px;align-items:center}
  .empty{color:var(--muted);font-size:13px;padding:6px 0}
  .loading{color:var(--muted);text-align:center;padding:60px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Voice Recorder</h1>
    <a class="back" href="/">&larr; Dashboard</a>
  </div>
  <div class="tabs">
    <a class="tab" href="/transcripts">Transcripts</a>
    <a class="tab active" href="/dictionary">Dictionary</a>
  </div>

  <div id="page"><p class="loading">Loading dictionary...</p></div>
</div>

<script>
  // Working copy of the dictionary. Shape mirrors GET /ingest/dictionary.
  let dict = null;

  function markDirty(){
    const btn = document.getElementById('savebtn');
    if (btn) btn.disabled = false;
    const msg = document.getElementById('savemsg');
    if (msg) msg.textContent = '';
  }

  function render(){
    const page = document.getElementById('page');
    page.innerHTML = `
      <div class="saverow">
        <p class="sub">The Gateway is the single source of truth for this glossary. It is used by phone-recording transcription and by live desktop dictation/Speak on every Director connected to this Gateway. Edits apply on the next recording or dictation - no file copying.</p>
        <div style="display:flex;align-items:center;gap:12px;white-space:nowrap">
          <span class="savemsg" id="savemsg"></span>
          <button class="save" id="savebtn" disabled>Save</button>
        </div>
      </div>

      <div class="section">
        <h2>Vocabulary</h2>
        <p class="hint">Terms biased into speech-to-text.</p>
        <div class="chips" id="vocab"></div>
      </div>

      <div class="section">
        <h2>Common mistranscriptions</h2>
        <p class="hint">Correct term &larr; wrong spellings seen in practice. Fed to the cleanup pass.</p>
        <div id="mistrans"></div>
        <div style="margin-top:12px">
          <input class="addbox" id="add-term" placeholder="+ add a term to correct" style="min-width:240px">
        </div>
      </div>

      <div class="section">
        <h2>Profiles</h2>
        <p class="hint">Cleanup behavior per context.</p>
        <div class="profiles" id="profiles"></div>
        <div class="addprofile">
          <input class="addbox" id="add-profile" placeholder="+ new profile name">
        </div>
      </div>`;

    document.getElementById('savebtn').addEventListener('click', save);
    renderVocab();
    renderMistrans();
    renderProfiles();

    bindAdd('add-term', name => {
      if (!dict.commonMistranscriptions[name]) dict.commonMistranscriptions[name] = [];
      renderMistrans(); markDirty();
    });
    bindAdd('add-profile', name => {
      if (!dict.profiles[name]) dict.profiles[name] = { cleanupEnabled: true };
      renderProfiles(); markDirty();
    });
  }

  // Wire an "add" input: commits the trimmed value on Enter, then clears.
  function bindAdd(id, onAdd){
    const el = document.getElementById(id);
    el.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const v = el.value.trim();
      if (!v) return;
      el.value = '';
      onAdd(v);
    });
  }

  function chip(text, onRemove){
    const c = document.createElement('span');
    c.className = 'chip';
    c.append(document.createTextNode(text));
    const x = document.createElement('button');
    x.className = 'x'; x.type = 'button'; x.textContent = 'x'; x.title = 'Remove';
    x.addEventListener('click', onRemove);
    c.appendChild(x);
    return c;
  }

  function renderVocab(){
    const host = document.getElementById('vocab');
    host.innerHTML = '';
    dict.vocabulary.forEach((term, i) => {
      host.appendChild(chip(term, () => { dict.vocabulary.splice(i,1); renderVocab(); markDirty(); }));
    });
    const add = document.createElement('input');
    add.className = 'addbox'; add.placeholder = '+ add term';
    add.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const v = add.value.trim();
      if (!v) return;
      if (!dict.vocabulary.includes(v)) dict.vocabulary.push(v);
      renderVocab(); markDirty();
    });
    host.appendChild(add);
  }

  function renderMistrans(){
    const host = document.getElementById('mistrans');
    host.innerHTML = '';
    const terms = Object.keys(dict.commonMistranscriptions);
    if (!terms.length){ host.innerHTML = '<p class="empty">No correction patterns yet.</p>'; return; }
    for (const term of terms){
      const row = document.createElement('div');
      row.className = 'mrow';

      const left = document.createElement('div');
      left.className = 'mterm';
      const x = document.createElement('button');
      x.className = 'x'; x.type = 'button'; x.textContent = 'x'; x.title = 'Remove term';
      x.addEventListener('click', () => { delete dict.commonMistranscriptions[term]; renderMistrans(); markDirty(); });
      const name = document.createElement('span'); name.className = 'name'; name.textContent = term;
      const arrow = document.createElement('span'); arrow.className = 'arrow'; arrow.innerHTML = '&larr;';
      left.append(x, name, arrow);

      const right = document.createElement('div');
      right.className = 'mvariants';
      const chips = document.createElement('div');
      chips.className = 'chips';
      const variants = dict.commonMistranscriptions[term];
      variants.forEach((vrt, i) => {
        chips.appendChild(chip(vrt, () => { variants.splice(i,1); renderMistrans(); markDirty(); }));
      });
      const add = document.createElement('input');
      add.className = 'addbox'; add.placeholder = '+ wrong spelling'; add.style.minWidth = '150px';
      add.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        const v = add.value.trim();
        if (!v) return;
        if (!variants.includes(v)) variants.push(v);
        renderMistrans(); markDirty();
      });
      chips.appendChild(add);
      right.appendChild(chips);

      row.append(left, right);
      host.appendChild(row);
    }
  }

  function renderProfiles(){
    const host = document.getElementById('profiles');
    host.innerHTML = '';
    const names = Object.keys(dict.profiles);
    if (!names.length){ host.innerHTML = '<p class="empty">No profiles. A "default" profile is created automatically on save.</p>'; }
    for (const pname of names){
      const p = dict.profiles[pname];
      const card = document.createElement('div');
      card.className = 'pcard';

      const head = document.createElement('div');
      head.className = 'pname';
      head.append(document.createTextNode(pname));
      if (pname.toLowerCase() !== 'default'){
        const x = document.createElement('button');
        x.className = 'x'; x.type = 'button'; x.textContent = 'x'; x.title = 'Remove profile';
        x.addEventListener('click', () => { delete dict.profiles[pname]; renderProfiles(); markDirty(); });
        head.appendChild(x);
      }

      const lbl = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.checked = !!p.cleanupEnabled;
      cb.addEventListener('change', () => { p.cleanupEnabled = cb.checked; markDirty(); });
      lbl.append(cb, document.createTextNode('apply dictionary corrections'));

      const note = document.createElement('p');
      note.className = 'empty';
      note.textContent = 'When enabled, only dictionary terms are corrected. Your words are never reworded, summarized, or edited.';

      card.append(head, lbl, note);
      host.appendChild(card);
    }
  }

  async function save(){
    const btn = document.getElementById('savebtn');
    const msg = document.getElementById('savemsg');
    btn.disabled = true; msg.textContent = 'saving...';
    try {
      const r = await fetch('/ingest/dictionary', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dict),
      });
      if (r.ok){
        dict = await r.json();
        msg.textContent = 'Saved';
        render();
        document.getElementById('savebtn').disabled = true;
        document.getElementById('savemsg').textContent = 'Saved';
        setTimeout(() => { const m = document.getElementById('savemsg'); if (m) m.textContent = ''; }, 4000);
      } else {
        const e = await r.json().catch(() => ({}));
        msg.textContent = 'save failed: ' + (e.error || r.status);
        btn.disabled = false;
      }
    } catch (e){
      msg.textContent = 'save failed: ' + e;
      btn.disabled = false;
    }
  }

  fetch('/ingest/dictionary')
    .then(r => r.json())
    .then(d => {
      dict = {
        vocabulary: d.vocabulary || [],
        commonMistranscriptions: d.commonMistranscriptions || {},
        profiles: d.profiles || {},
      };
      render();
    })
    .catch(() => {
      document.getElementById('page').innerHTML = '<p class="loading">Failed to load. Is the Gateway running?</p>';
    });
</script>
</body>
</html>
