<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>API Keys - CC Director Gateway</title>
<link rel="stylesheet" href="/pages/tool-nav.css" />
<script defer src="/pages/tool-nav.js"></script>
<style>
  :root{--bg:#0B1020;--panel:#141B2E;--panel2:#1B2540;--ink:#E6EAF2;--muted:#8A93A6;
        --line:#27324d;--green:#5FD08A;--blue:#5B8DEF;--amber:#E8B339;--red:#E5484D;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
  .wrap{max-width:760px;margin:0 auto;padding:28px 20px 80px}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  h1{font-size:26px;margin:0}
  a.back{color:var(--blue);text-decoration:none;font-size:14px}
  .sub{color:var(--muted);font-size:14px;margin:6px 0 18px;max-width:640px}
  .section{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:14px 0}
  .section h2{font-size:16px;margin:0 0 2px}
  .section .hint{color:var(--muted);font-size:12.5px;margin:0 0 14px}
  .status{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;margin-bottom:14px}
  .dot{width:9px;height:9px;border-radius:999px;display:inline-block}
  .dot.set{background:var(--green)} .dot.unset{background:var(--amber)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  input[type=password],input[type=text]{flex:1;min-width:240px;background:#0B1020;color:var(--ink);
        border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:14px;font-family:ui-monospace,Consolas,monospace}
  input:focus{outline:none;border-color:var(--blue)}
  button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer}
  button:hover{border-color:var(--blue)}
  button.save{background:#1f7a47;border-color:#2a9c5b;color:#fff}
  button.save:disabled{opacity:.5;cursor:default}
  button.danger{color:var(--red);border-color:#5a2a2d}
  button.danger:hover{border-color:var(--red)}
  .msg{font-size:12.5px;margin-top:12px;min-height:16px}
  .msg.ok{color:var(--green)} .msg.err{color:var(--red)}
  label.show{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:13px}
  .loading{color:var(--muted);text-align:center;padding:60px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>API Keys</h1>
    <a class="back" href="/">&larr; Dashboard</a>
  </div>
  <p class="sub">Keys are stored once here on the Gateway and pulled on demand by every Director connected to it. They are never shown back in this page and never written to a Director's disk.</p>

  <div id="page"><p class="loading">Loading...</p></div>
</div>

<script>
  const KEY = 'OPENAI_API_KEY';

  function setMsg(text, ok){
    const m = document.getElementById('msg');
    if (!m) return;
    m.textContent = text || '';
    m.className = 'msg ' + (ok ? 'ok' : 'err');
  }

  function render(isSet){
    const page = document.getElementById('page');
    page.innerHTML = `
      <div class="section">
        <h2>OpenAI</h2>
        <p class="hint">Used by the Speak / dictation feature (OpenAI transcription). Required for dictation on any Director attached to this Gateway.</p>
        <div class="status">
          <span class="dot ${isSet ? 'set' : 'unset'}"></span>
          <span>${isSet ? 'OPENAI_API_KEY is set' : 'OPENAI_API_KEY is not set'}</span>
        </div>
        <div class="row">
          <input id="keybox" type="password" placeholder="${isSet ? 'Enter a new key to replace it' : 'sk-...'}" autocomplete="off" spellcheck="false">
          <button class="save" id="savebtn">Save</button>
          ${isSet ? '<button class="danger" id="delbtn">Remove key</button>' : ''}
        </div>
        <div style="margin-top:10px">
          <label class="show"><input type="checkbox" id="showbox"> Show what I type</label>
        </div>
        <div class="msg" id="msg"></div>
      </div>`;

    document.getElementById('savebtn').addEventListener('click', save);
    const del = document.getElementById('delbtn');
    if (del) del.addEventListener('click', removeKey);
    document.getElementById('showbox').addEventListener('change', e => {
      document.getElementById('keybox').type = e.target.checked ? 'text' : 'password';
    });
  }

  async function load(){
    try {
      const r = await fetch('/vault/keys');
      if (!r.ok) throw new Error(r.status);
      const d = await r.json();
      render((d.names || []).includes(KEY));
    } catch (e) {
      document.getElementById('page').innerHTML = '<p class="loading">Failed to load. Is the Gateway running?</p>';
    }
  }

  async function save(){
    const box = document.getElementById('keybox');
    const btn = document.getElementById('savebtn');
    const value = box.value.trim();
    if (!value){ setMsg('Enter a key first.', false); return; }
    btn.disabled = true; setMsg('Saving...', true);
    try {
      const r = await fetch('/vault/keys/' + KEY, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value }),
      });
      if (r.ok){
        await load();
        setMsg('Saved. Directors will pick it up on their next dictation.', true);
      } else {
        const e = await r.json().catch(() => ({}));
        setMsg('Save failed: ' + (e.error || r.status), false);
        btn.disabled = false;
      }
    } catch (e){
      setMsg('Save failed: ' + e, false);
      btn.disabled = false;
    }
  }

  async function removeKey(){
    setMsg('Removing...', true);
    try {
      const r = await fetch('/vault/keys/' + KEY, { method: 'DELETE' });
      if (r.ok){ await load(); setMsg('Key removed.', true); }
      else { setMsg('Remove failed: ' + r.status, false); }
    } catch (e){
      setMsg('Remove failed: ' + e, false);
    }
  }

  load();
</script>
</body>
</html>
