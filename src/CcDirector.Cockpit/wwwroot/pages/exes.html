<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CC Director - Exes</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --panel-2: #2d2d2e;
    --border: #3c3c3c;
    --text: #dddddd;
    --muted: #888888;
    --muted-2: #6a6a6a;
    --accent: #0e639c;
    --accent-hover: #1177bb;
    --red: #ef4444;
    --yellow: #eab308;
    --green: #22c55e;
    --blue: #3b82f6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  a { color: inherit; }

  header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--panel);
    position: sticky; top: 0; z-index: 10;
    flex-wrap: wrap;
  }
  header h1 { font-size: 14px; margin: 0; letter-spacing: 0.5px; font-weight: 700; }
  header .stats { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  header a.link { color: var(--accent); text-decoration: none; font-size: 13px; padding: 6px 10px; border-radius: 6px; }
  header a.link:hover { background: rgba(14,99,156,0.15); }
  header a.link-accent { background: var(--accent); color: white; font-weight: 600; }
  header a.link-accent:hover { background: var(--accent-hover); }

  main { padding: 16px 14px 40px; max-width: 1100px; margin: 0 auto; }

  .error {
    margin: 0 0 14px 0; padding: 10px 12px;
    background: rgba(244,71,71,0.10);
    border: 1px solid rgba(244,71,71,0.4);
    border-radius: 6px; color: var(--red); font-size: 13px;
    white-space: pre-wrap;
  }
  .notice {
    margin: 0 0 14px 0; padding: 10px 12px;
    background: rgba(234,179,8,0.10);
    border: 1px solid rgba(234,179,8,0.4);
    border-radius: 6px; color: var(--yellow); font-size: 13px;
  }

  h2.section {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--muted); font-weight: 700;
    margin: 22px 0 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .repo-root { color: var(--muted-2); font-size: 12px; font-family: "Cascadia Code", Consolas, monospace; }

  /* Director cards */
  .dir {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .dir .head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge {
    background: var(--accent); color: white;
    border-radius: 6px; padding: 2px 9px;
    font-size: 12px; font-weight: 700;
  }
  .badge.gray { background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); }
  .dir .meta { color: var(--muted); font-size: 12px; }
  .dir .meta b { color: var(--text); font-weight: 600; }
  .dir .exe {
    margin-top: 6px; color: var(--muted-2); font-size: 11px;
    font-family: "Cascadia Code", Consolas, monospace;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .spacer { flex: 1; }

  .btn {
    display: inline-flex; align-items: center;
    border: 0; border-radius: 6px; cursor: pointer;
    padding: 6px 12px; font-size: 12px; font-weight: 600;
    color: white; background: var(--accent);
    text-decoration: none;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn.danger { background: var(--red); }
  .btn.danger:hover { background: #dc2626; }
  .btn:disabled { opacity: 0.5; cursor: default; }

  .sessions { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  .sessions .none { color: var(--muted-2); font-size: 12px; font-style: italic; }
  .sess {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; font-size: 13px;
  }
  .dot { flex-shrink: 0; width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(255,255,255,0.06); }
  .dot.red { background: var(--red); } .dot.yellow { background: var(--yellow); }
  .dot.green { background: var(--green); } .dot.blue { background: var(--blue); }
  .dot.unknown { background: var(--muted-2); }
  .sess .sname { font-weight: 600; }
  .sess .sname.unnamed { font-style: italic; color: var(--muted); font-weight: 500; }
  .sess .sstate { color: var(--muted); font-size: 12px; }
  .sess .agent-pill {
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 10px; padding: 1px 7px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
  }

  /* Slots */
  .slots { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .slot {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .slot .shead { display: flex; align-items: center; gap: 8px; }
  .slot .stitle { font-weight: 700; font-size: 14px; }
  .slot .status { font-size: 12px; }
  .slot .status.built { color: var(--green); }
  .slot .status.running { color: var(--blue); }
  .slot .status.missing { color: var(--muted-2); }
  .slot .sub { color: var(--muted); font-size: 11px; }
  .slot .actions { display: flex; gap: 8px; margin-top: 4px; }

  .empty { margin-top: 10px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>CC DIRECTOR &middot; EXES</h1>
  <span class="stats" id="stats">loading...</span>
  <span class="spacer"></span>
  <a class="link link-accent" href="/">sessions</a>
  <a class="link link-accent" href="/transcripts">transcripts</a>
</header>

<main>
  <div id="error" class="error" style="display:none"></div>
  <div id="repoNotice"></div>
  <div id="content"></div>
</main>

<script>
const REFRESH_MS = 3000;
const state = { data: null, busy: false };
let inflight = null;

// ---------- helpers ----------
function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function relativeTime(iso) {
  if (!iso) return "-";
  const t = new Date(iso).getTime();
  if (Number.isNaN(t)) return "-";
  const sec = Math.max(0, Math.floor((Date.now() - t) / 1000));
  if (sec < 60) return sec + "s";
  const m = Math.floor(sec / 60);
  if (m < 60) return m + "m";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h " + (m % 60) + "m";
  return Math.floor(h / 24) + "d";
}
function portOf(endpoint) {
  if (!endpoint) return "?";
  const m = String(endpoint).match(/:(\d+)\/?$/);
  return m ? m[1] : "?";
}
function repoBasename(p) {
  if (!p) return "(no repo)";
  const norm = String(p).replace(/\\/g, "/").replace(/\/+$/, "");
  const i = norm.lastIndexOf("/");
  return i >= 0 ? norm.slice(i + 1) : norm;
}
function statusColorOf(s) {
  const c = (s.statusColor || "").toLowerCase();
  if (c === "red" || c === "yellow" || c === "green" || c === "blue") return c;
  return "unknown";
}
function humanizeState(s) {
  switch (s) {
    case "WaitingForInput": return "Waiting for input";
    case "WaitingForPerm": return "Waiting for permission";
    case "Idle": return "Idle";
    case "Working": return "Working";
    case "Starting": return "Starting";
    case "Exited": return "Exited";
    default: return s || "-";
  }
}
function fmtSize(bytes) {
  if (!bytes) return "0 B";
  const mb = bytes / (1024 * 1024);
  if (mb >= 1) return mb.toFixed(1) + " MB";
  return Math.round(bytes / 1024) + " KB";
}

// ---------- rendering ----------
function render() {
  const d = state.data;
  if (!d) return;

  document.getElementById("stats").textContent =
    `${d.directors.length} director${d.directors.length === 1 ? "" : "s"} on ${d.machineName}`;

  const notice = document.getElementById("repoNotice");
  notice.innerHTML = d.repoRoot
    ? ""
    : `<div class="notice">Slot management is unavailable: the Gateway is not running from inside the cc-director repo, so build scripts and local_builds cannot be located.</div>`;

  let html = "";

  // ----- running directors -----
  html += `<h2 class="section">Running directors on this computer`;
  if (d.repoRoot) html += ` <span class="repo-root">&middot; ${escapeHtml(d.repoRoot)}</span>`;
  html += `</h2>`;

  if (d.directors.length === 0) {
    html += `<div class="empty">No Director processes are running on this computer.</div>`;
  } else {
    for (const dir of d.directors) {
      const slotLabel = dir.slot ? `slot ${dir.slot}` : "no slot";
      html += `<div class="dir">`;
      html += `<div class="head">`;
      html += `<span class="badge${dir.slot ? "" : " gray"}">${escapeHtml(slotLabel)}</span>`;
      html += `<span class="meta">PID <b>${dir.pid}</b> &middot; port <b>${escapeHtml(portOf(dir.controlEndpoint))}</b> &middot; v${escapeHtml(dir.version || "?")} &middot; up ${escapeHtml(relativeTime(dir.startedAt))}</span>`;
      html += `<span class="spacer"></span>`;
      if (dir.directorUrl) html += `<a class="btn" href="${escapeHtml(dir.directorUrl)}">Director &rarr;</a>`;
      html += `<button class="btn danger" onclick="killDirector('${escapeHtml(dir.directorId)}', ${dir.slot || 0}, ${dir.pid})">Kill</button>`;
      html += `</div>`;
      if (dir.exePath) html += `<div class="exe" title="${escapeHtml(dir.exePath)}">${escapeHtml(dir.exePath)}</div>`;

      html += `<div class="sessions">`;
      if (dir.sessionError) {
        html += `<div class="none">sessions unavailable: ${escapeHtml(dir.sessionError)}</div>`;
      } else if (!dir.sessions || dir.sessions.length === 0) {
        html += `<div class="none">No sessions.</div>`;
      } else {
        for (const s of dir.sessions) {
          const color = statusColorOf(s);
          const name = s.name || "";
          html += `<div class="sess">`;
          html += `<span class="dot ${color}"></span>`;
          html += name ? `<span class="sname">${escapeHtml(name)}</span>` : `<span class="sname unnamed">(unnamed)</span>`;
          html += `<span class="agent-pill">${escapeHtml(s.agent || "?")}</span>`;
          html += `<span class="sstate">${escapeHtml(repoBasename(s.repoPath))} &middot; ${escapeHtml(humanizeState(s.activityState))}</span>`;
          html += `</div>`;
        }
      }
      html += `</div>`; // sessions
      html += `</div>`; // dir
    }
  }

  // ----- build slots -----
  html += `<h2 class="section">Build slots (1-4)</h2>`;
  if (!d.repoRoot) {
    html += `<div class="empty">Unavailable (see notice above).</div>`;
  } else {
    html += `<div class="slots">`;
    for (const sl of d.slots) {
      const running = !!sl.running;
      let statusCls = "missing", statusTxt = "not built";
      if (running) { statusCls = "running"; statusTxt = "running (PID " + sl.running.pid + ")"; }
      else if (sl.exists) { statusCls = "built"; statusTxt = "built, stopped"; }

      html += `<div class="slot">`;
      html += `<div class="shead"><span class="stitle">Slot ${sl.slot}</span><span class="spacer"></span><span class="status ${statusCls}">${escapeHtml(statusTxt)}</span></div>`;
      if (sl.exists) {
        html += `<div class="sub">${escapeHtml(fmtSize(sl.sizeBytes))} &middot; built ${escapeHtml(relativeTime(sl.lastBuiltUtc))} ago</div>`;
      } else {
        html += `<div class="sub">no exe in local_builds</div>`;
      }
      html += `<div class="actions">`;
      html += `<button class="btn" id="bs-${sl.slot}" onclick="buildStart(${sl.slot})"${running ? " disabled" : ""}>Build &amp; start</button>`;
      html += `<button class="btn danger" onclick="deleteSlot(${sl.slot})"${(!sl.exists || running) ? " disabled" : ""}>Delete</button>`;
      html += `</div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  document.getElementById("content").innerHTML = html;
}

// ---------- data ----------
async function refresh() {
  if (state.busy) return;            // never refresh over an in-flight build
  if (inflight) { inflight.abort(); inflight = null; }
  const controller = new AbortController();
  inflight = controller;
  const err = document.getElementById("error");
  try {
    const resp = await fetch("/exes/list", { credentials: "same-origin", signal: controller.signal });
    if (resp.status === 401) { window.location.href = "/login?next=" + encodeURIComponent(location.pathname); return; }
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    state.data = await resp.json();
    err.style.display = "none";
    render();
  } catch (e) {
    if (e.name === "AbortError") return;
    err.style.display = "block";
    err.textContent = "Failed to load: " + (e && e.message ? e.message : e);
  } finally {
    if (inflight === controller) inflight = null;
  }
}

// ---------- actions ----------
async function killDirector(id, slot, pid) {
  const label = slot ? ("slot " + slot) : ("PID " + pid);
  if (!confirm(`Kill Director ${label} (PID ${pid})?\n\nThis terminates the process and ALL of its running sessions. Unsaved work in those sessions will be lost.`)) return;
  try {
    const resp = await fetch("/directors/" + encodeURIComponent(id), {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      credentials: "same-origin",
      body: JSON.stringify({ force: true }),
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
  } catch (e) {
    alert("Kill failed: " + (e && e.message ? e.message : e));
  } finally {
    setTimeout(refresh, 600);
  }
}

async function deleteSlot(n) {
  if (!confirm(`Delete the slot ${n} build?\n\nThis removes local_builds/cc-director${n}.exe from disk. You can rebuild it with "Build & start".`)) return;
  try {
    const resp = await fetch("/exes/slots/" + n, { method: "DELETE", credentials: "same-origin" });
    if (!resp.ok) {
      const body = await resp.json().catch(() => null);
      throw new Error(body && body.error ? body.error : "HTTP " + resp.status);
    }
  } catch (e) {
    alert("Delete failed: " + (e && e.message ? e.message : e));
  } finally {
    refresh();
  }
}

async function buildStart(n) {
  if (!confirm(`Build slot ${n} and launch it?\n\nThis runs the build script (about a minute) and then starts cc-director${n}.exe. The slot must not already be running.`)) return;
  const btn = document.getElementById("bs-" + n);
  state.busy = true;
  if (btn) { btn.disabled = true; btn.textContent = "Building..."; }
  try {
    const resp = await fetch("/exes/slots/" + n + "/build-start", { method: "POST", credentials: "same-origin" });
    const body = await resp.json().catch(() => null);
    if (!resp.ok) throw new Error(body && (body.detail || body.error) ? (body.detail || body.error) : "HTTP " + resp.status);
    alert(`Slot ${n} built and started (PID ${body.pid}).`);
  } catch (e) {
    alert("Build & start failed:\n\n" + (e && e.message ? e.message : e));
  } finally {
    state.busy = false;
    if (btn) { btn.textContent = "Build & start"; }
    refresh();
  }
}

// ---------- wiring ----------
refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
